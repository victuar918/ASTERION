<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure Code Index</title>

<!-- ▼ 공통 JS -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #2b1e08;
  background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.title-img {
  width: 95%;
  margin: 20px auto 0;
  display: block;
}

/* 입력 영역 — 화면 중앙 */
.input-group {
  position: absolute;
  top: 42%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  width: 35vw;
  min-width: 260px;
}

.input-group input {
  font-size: 18px;
  padding: 12px;
  border: 2px solid #d8ad3c;
  border-radius: 6px;
  text-align: center;
  letter-spacing: 2px;
  background: rgba(255,255,255,0.6);
  outline: none;
}

.input-group input:focus {
  border-color: #b8860b;
  background: rgba(255,255,255,0.9);
}

/* 하단 버튼 */
.bottom-nav {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
}

.bottom-nav img {
  width: 90px;
  cursor: pointer;
  transition: transform 0.15s;
}

.bottom-nav img:hover { transform: scale(1.08); }
</style>
</head>

<body>

<img src="images/ttl_codeindex.png" alt="Structure Code Index" class="title-img">

<div class="input-group">
  <!-- S-00000-000000 형식 자동 포맷 -->
  <input type="text" id="codeInput" placeholder="S-00000-000000" maxlength="14">
</div>

<div class="bottom-nav">
  <img src="images/btn_go_home.png" alt="홈"     onclick="goHome()">
  <img src="images/btn_as.png"      alt="A/S 등록" onclick="setAS()">
  <img src="images/btn_select.png"  alt="선택"   onclick="selectCode()">
</div>

<script>
// ── 입력 포맷: S-00000-000000 자동 변환 ────────────────────────
const codeInput = document.getElementById("codeInput");

codeInput.addEventListener("input", function () {
  // 대문자 + 숫자만 허용
  let raw = codeInput.value.toUpperCase().replace(/[^0-9A-Z\-]/g, "");

  // 하이픈을 제거하고 순수 문자만 추출
  const chars = raw.replace(/-/g, "");

  // S 보장
  const s   = chars.length > 0 ? chars[0] : "";
  const mid = chars.slice(1, 6);   // 최대 5자리
  const end = chars.slice(6, 12);  // 최대 6자리

  let formatted = s || "";
  if (mid.length > 0) formatted += "-" + mid;
  if (end.length > 0) formatted += "-" + end;

  codeInput.value = formatted;
});

// ── A/S 등록 ──────────────────────────────────────────────────
// [B1 FIX] /exec 포함된 CONFIG.API_BASE 사용
// [B2 FIX] api.js apiPost → Content-Type: text/plain
// [B3 FIX] A/S → Code.gs VALID_STATUSES에 추가됨
// [B4 FIX] setStructureCode → worksdesk 이동 시 state 유지
async function setAS() {
  const code = codeInput.value.trim();
  if (!code) { alert("StructureCode를 입력해주세요."); return; }

  try {
    showLoading("A/S 상태 변경 중...");
    // api.js apiPost 사용 — CONFIG.API_BASE 자동 참조
    const result = await apiPost({
      action: "updateStatus",
      code  : code,      // Code.gs: payload.code || payload.structureCode
      status: "A/S",     // Code.gs: payload.status || payload.newStatus
    });

    if (result.success) {
      alert(code + " → A/S 상태로 변경되었습니다.");
    } else {
      alert("변경 실패: " + (result.error || "알 수 없는 오류"));
    }
  } catch (err) {
    alert("오류: " + err.message);
  } finally {
    hideLoading();
  }
}

// ── 코드 선택 → worksdesk 이동 ────────────────────────────────
function selectCode() {
  const code = codeInput.value.trim();
  if (!code) { alert("StructureCode를 입력해주세요."); return; }

  // [B4 FIX] state.js setStructureCode → worksdesk에서 getStructureCode로 읽음
  setStructureCode(code);
  location.href = "worksdesk.html?code=" + encodeURIComponent(code);
}
</script>

</body>
</html>
