<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
      min-height: 100vh;
      color: #2b1e08;
    }

    /* 타이틀 */
    .title-img {
      width: 95%;
      display: block;
      margin: 20px auto;
    }

    /* 원석 리스트 영역 */
    .stone-container {
      max-width: 600px;
      margin: 10px auto;
      padding: 10px;
      background-color: rgba(255, 255, 255, 0);
      overflow-y: auto;
      max-height: calc(100vh - 200px);
    }

    .stone-item {
      padding: 10px 15px;
      margin-bottom: 5px;
      border-radius: 6px;
      background-color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    .stone-item:hover {
      background-color: rgba(255, 255, 255, 0.4);
    }

    /* 하단 버튼 */
    .bottom-nav {
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 1000;
    }

    .bottom-nav img {
      width: 60px;
      cursor: pointer;
      object-fit: contain;
      transition: transform 0.2s;
    }

    .bottom-nav img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <img src="images/ttl_inventory.png" alt="Inventory" class="title-img">

  <!-- 원석 리스트 -->
  <div class="stone-container" id="stoneListContainer">
    <!-- JS에서 동적으로 등록 -->
  </div>

  <!-- 하단 버튼 -->
  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()">
    <img src="images/btn_management.png" onclick="goManage()">
    <img src="images/btn_information.png" onclick="goInformation()">
    <img src="images/btn_stonelisting.png" onclick="goNewListing()">
  </div>

  <script>
    // ✅ 최신 배포 URL 적용
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxCuGnpk6WfSqQoGUUBUDe_Gc4exr95DNi-RuvDdmKJzXHPgIBB2j3m08Sf7roBPEThtA/exec";

    const stoneListContainer = document.getElementById("stoneListContainer");

    async function loadStones() {
      try {
        const res = await fetch(`${WEBAPP_URL}?action=getStones`);
        const data = await res.json();

        if (data.success && data.stones && data.stones.length > 0) {
          stoneListContainer.innerHTML = "";
          data.stones.forEach(stone => {
            const div = document.createElement("div");
            div.className = "stone-item";
            div.textContent = `${stone.NameKr} (${stone.NameEng || "-"})`;
            div.onclick = () => {
              sessionStorage.setItem("selectedNameKr", stone.NameKr);
              sessionStorage.setItem("selectedNameEng", stone.NameEng || "");
              sessionStorage.setItem("selectedExp", stone.Exp || "");
              sessionStorage.setItem("selectedImage", stone.Image); // ← 이 줄만 추가
            };
            stoneListContainer.appendChild(div);
          });
        } else {
          stoneListContainer.innerHTML = "<p style='text-align:center; opacity:0.6;'>등록된 원석이 없습니다.</p>";
        }
      } catch (err) {
        console.error("원석 불러오기 오류:", err);
        stoneListContainer.innerHTML = "<p style='text-align:center; color:red;'>원석 데이터를 불러올 수 없습니다.</p>";
      }
    }

    // 화면 이동
    function goHome() {
      window.location.href = "index.html";
    }

    function goManage() {
      const selected = sessionStorage.getItem("selectedNameKr");
      if (!selected) return alert("원석을 선택해주세요.");
      window.location.href = "invenmanage.html";
    }

    function goInformation() {
      const selected = sessionStorage.getItem("selectedNameKr");
      if (!selected) return alert("원석을 선택해주세요.");
      window.location.href = "stoneinfo.html";
    }

    function goNewListing() {
      window.location.href = "newlisting.html";
    }

    window.onload = loadStones;
  </script>

</body>

</html>
