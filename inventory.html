<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1e08;
      background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
      height: 100vh;
    }

    /* 타이틀 이미지 */
    .title-img {
      width: 95%;
      display: block;
      margin: 20px auto 20px auto;
    }

    /* 리스트 영역 */
    .list-container {
      max-width: 90%;
      margin: 0 auto;
      overflow-y: auto;
      max-height: 70vh;
      padding: 10px;
      background-color: rgba(255, 255, 255, 0.15); /* 투명 배경 */
      border-radius: 4px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 14px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      cursor: default;
    }

    .row:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .namekr {
      flex: 1;
      font-weight: 600;
    }

    .size {
      flex: 0.5;
      text-align: center;
    }

    .stock {
      flex: 0.5;
      text-align: right;
    }

    /* 하단 네비게이션 버튼 */
    .bottom-nav {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .bottom-nav img {
      width: 90px;
      cursor: pointer;
      transition: 0.2s;
    }

    .bottom-nav img:hover {
      transform: scale(1.08);
    }
  </style>
</head>

<body>
  <!-- 타이틀 이미지 -->
  <img src="images/ttl_inventory.png" alt="Inventory" class="title-img">

  <!-- 리스트 영역 -->
  <div class="list-container" id="inventoryList">
    <!-- 스크립트로 채워짐 -->
  </div>

  <!-- 하단 버튼 -->
  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()">
    <img src="images/btn_select.png" onclick="goSelect()">
    <img src="images/btn_stonelisting.png" onclick="goStoneListing()">
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwg_iBSvNw9a-8unK-VgD9G8oD39ljcMTcY0Wxu0vBW7fx9YXBYcgOdhuTF7ZZaGxDH/exec?action=getInventoryList";

    async function loadInventory() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        const container = document.getElementById("inventoryList");
        container.innerHTML = ""; // 초기화

        data.forEach(item => {
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML = `
            <div class="namekr">${item.NameKr}</div>
            <div class="size">${item.Size}</div>
            <div class="stock">${item.Stock}</div>
          `;
          container.appendChild(row);
        });

      } catch (err) {
        console.error("API error", err);
        const container = document.getElementById("inventoryList");
        container.innerHTML = "<div style='color:red;padding:10px;'>Inventory 불러오기 실패</div>";
      }
    }

    function goHome() {
      window.location.href = "index.html";
    }

    function goSelect() {
      window.location.href = "inventoryinfo.html";
    }

    function goStoneListing() {
      window.location.href = "newlisting.html";
    }

    loadInventory();
  </script>
</body>

</html>
