<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Tasking</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1e08;
      background: linear-gradient(
        135deg,
        #fff6da 0%,
        #f5d97a 40%,
        #eac45a 70%,
        #d8ad3c 100%
      );
      height: 100vh;
    }

    .container {
      padding: 20px 40px 40px 40px; /* 상단 여백 조금 조정 */
    }

    /* 상단 타이틀 이미지 */
    .title-img {
    display: block;
    width: 95%;      /* 좌우 95% */
    max-width: 1400px; /* 화면이 크면 최대폭 제한 가능 */
    margin: 10px auto; /* 상단 여백 + 중앙 정렬 */
    }

    .row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 10px 0;
      cursor: pointer;
    }

    .row:hover {
      opacity: 0.6;
    }

    .code {
      font-weight: 600;
    }

    .status {
      opacity: 0.8;
    }

    .bottom-nav {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
    }

    .bottom-nav img {
      width: 90px;
      cursor: pointer;
      transition: 0.2s;
    }

    .bottom-nav img:hover {
      transform: scale(1.08);
    }
  </style>
</head>

<body>

   <!-- 타이틀 이미지를 container 밖으로 -->
  <img src="images/ttl_selecttasking.png" class="title-img" alt="Select Tasking">

  <div class="container">
    <div id="taskList"></div>
  </div>

  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()">
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyU-RnnxMeQlDxoCE2n93IkAYAsA-_1Ic8otqSwtDawiug-U50_nEg4DVIbzW6_t-EFqw/exec?action=getTaskingList";

    async function loadTasking() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        const list = document.getElementById("taskList");

        data.forEach(item => {
          const row = document.createElement("div");
          row.className = "row";

          row.innerHTML = `<div class="code">${item.StructureCode}</div>
                           <div class="status">${item.Status}</div>`;

          row.onclick = function () {
            goStructure(item.StructureCode);
          };

          list.appendChild(row);
        });
      } catch (err) {
        console.error("API error", err);
      }
    }

    function goStructure(code) {
      window.location.href = "structuredesign.html?code=" + code;
    }

    function goHome() {
      window.location.href = "index.html";
    }

    loadTasking();
  </script>

</body>

</html>
