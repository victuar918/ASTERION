<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ASTERION – Stock Management</title>
<script src="config.js"></script><script src="api_contract.js"></script>
<script src="state.js"></script><script src="api.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
  font-family:'Arial',sans-serif;color:#fff;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;overflow:hidden;
}
.ttl{width:240px;max-width:86vw;display:block;margin:10px auto 3px;flex-shrink:0}
/* NameKr:테이블 = 35%:65% */
.content{flex:1;width:100%;max-width:400px;display:flex;flex-direction:column;min-height:0;padding:0 14px}
.zone-name{flex:3.5;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nk-text{font-size:15px;color:rgba(220,188,128,.9);letter-spacing:1.5px;text-align:center}
.zone-table{flex:6.5;display:flex;flex-direction:column;min-height:0;overflow-y:auto}
.zone-table::-webkit-scrollbar{width:3px}
.zone-table::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
/* 헤더 행 */
.tbl-header{display:flex;gap:8px;align-items:center;justify-content:center;padding:4px 0;flex-shrink:0}
.hdr-size{font-size:10px;letter-spacing:1.2px;color:rgba(255,255,255,.45);width:80px;text-align:center}
.hdr-unit{font-size:10px;color:rgba(255,255,255,.3);width:24px}
.hdr-stock{font-size:10px;letter-spacing:1.2px;color:rgba(255,255,255,.45);width:80px;text-align:center}
.hdr-pcs{font-size:10px;color:rgba(255,255,255,.3);width:24px}
/* 데이터 행 */
.tbl-row{display:flex;gap:8px;align-items:center;justify-content:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
/* Size 드롭다운 */
.size-select{
  width:80px;padding:7px 4px;text-align:center;
  background:rgba(0,0,0,.40);border:1px solid rgba(255,255,255,.18);border-radius:6px;
  color:#fff;font-size:13px;outline:none;cursor:pointer;
  -webkit-appearance:none;appearance:none;
}
.size-select:focus{border-color:rgba(210,170,100,.65)}
.unit-label{width:24px;font-size:11px;color:rgba(255,255,255,.45);text-align:left}
/* Stock 입력 */
.stock-input{
  width:80px;padding:7px 6px;text-align:center;
  background:rgba(0,0,0,.40);border:1px solid rgba(255,255,255,.18);border-radius:6px;
  color:#fff;font-size:13px;outline:none;
}
.stock-input:focus{border-color:rgba(210,170,100,.65)}
.st-msg{flex-shrink:0;font-size:12px;text-align:center;min-height:18px;padding:2px 0}
.st-err{color:rgba(220,80,80,.9)}.st-ok{color:rgba(100,220,130,.9)}
.nav-bar{flex-shrink:0;width:100%;max-width:400px;display:flex;justify-content:space-around;padding:6px 8px env(safe-area-inset-bottom,8px);background:rgba(5,4,2,.92);border-top:1px solid rgba(255,255,255,.07)}
.nav-bar img{height:44px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
.ld-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.ld-ov.show{display:flex}
.ld-txt{font-size:12px;letter-spacing:2.5px;color:rgba(220,188,128,1)}
</style>
</head>
<body>
<img class="ttl" src="images/ttl_stockmanage.png" alt="Stock Management"/>
<div class="content">
  <div class="zone-name"><div class="nk-text" id="nk-text">—</div></div>
  <div class="zone-table">
    <div class="tbl-header">
      <span class="hdr-size">Size</span><span class="hdr-unit">  </span>
      <span class="hdr-stock">Stock</span><span class="hdr-pcs">  </span>
    </div>
    <div id="rows-container"></div>
  </div>
</div>
<div class="st-msg" id="st-msg"></div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"   id="b-home"/>
  <img src="images/btn_go_before.png" id="b-back"/>
  <img src="images/btn_addsize.png"   id="b-add"/>
  <img src="images/btn_update.png"    id="b-update"/>
</div>
<div class="ld-ov" id="ld-ov"><div class="ld-txt">UPDATING...</div></div>
<script>
"use strict";
var nk=null, allSizes=[];

document.addEventListener("DOMContentLoaded", async function(){
  nk=requireNameKr(); if(!nk) return;
  document.getElementById("nk-text").textContent=nk;
  document.getElementById("b-home").onclick  =function(){ clearAndGoFromInventory("index.html"); };
  document.getElementById("b-back").onclick  =function(){ clearAndGoFromInventory("inventory.html"); };
  document.getElementById("b-add").onclick   =addRow;
  document.getElementById("b-update").onclick=onUpdate;
  await loadData();
});

async function loadData(){
  try {
    allSizes=await apiGetSizes();
    var inv=await apiGetStoneInventory(nk);
    var container=document.getElementById("rows-container");
    container.innerHTML="";
    if(inv&&inv.length){
      inv.forEach(function(row){ addRow(row.size||row.Size, row.stock||row.Stock||0); });
    } else {
      addRow();
    }
  } catch(err){
    setStatus("로드 실패: "+err.message,"err");
    addRow();
  }
}

function addRow(preSize, preStock){
  var container=document.getElementById("rows-container");
  var row=document.createElement("div"); row.className="tbl-row";

  // Size 드롭다운
  var sel=document.createElement("select"); sel.className="size-select";
  var optEmpty=document.createElement("option"); optEmpty.value=""; optEmpty.textContent="—"; sel.appendChild(optEmpty);
  allSizes.forEach(function(sz){
    var opt=document.createElement("option"); opt.value=sz; opt.textContent=sz;
    if(sz===(preSize||"")) opt.selected=true;
    sel.appendChild(opt);
  });
  var mmLabel=document.createElement("span"); mmLabel.className="unit-label"; mmLabel.textContent="mm";

  // Stock 입력
  var inp=document.createElement("input"); inp.type="number"; inp.className="stock-input";
  inp.min="0"; inp.placeholder="0";
  if(preStock!==undefined&&preStock!==null) inp.value=preStock;
  var pcsLabel=document.createElement("span"); pcsLabel.className="unit-label"; pcsLabel.textContent="pcs";

  row.appendChild(sel); row.appendChild(mmLabel);
  row.appendChild(inp); row.appendChild(pcsLabel);
  container.appendChild(row);
}

async function onUpdate(){
  var rows=document.querySelectorAll("#rows-container .tbl-row");
  var data=[];
  rows.forEach(function(row){
    var sz=row.querySelector(".size-select").value;
    var st=parseInt(row.querySelector(".stock-input").value,10);
    if(sz&&!isNaN(st)&&st>=0) data.push({size:sz,stock:st});
  });
  if(!data.length){ setStatus("Size와 Stock을 입력하세요","err"); return; }
  document.getElementById("ld-ov").classList.add("show");
  try {
    await apiUpdateStock(nk, data);
    document.getElementById("ld-ov").classList.remove("show");
    setStatus("업데이트 완료!","ok");
    setTimeout(function(){ setStatus("",""); },2500);
  } catch(err){
    document.getElementById("ld-ov").classList.remove("show");
    setStatus("실패: "+err.message,"err");
  }
}

function setStatus(msg,type){
  var el=document.getElementById("st-msg"); el.textContent=msg;
  el.className="st-msg "+(type==="err"?"st-err":type==="ok"?"st-ok":"");
}
</script>
</body>
</html>
