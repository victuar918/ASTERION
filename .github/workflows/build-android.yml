name: Android APK Build

on:
  push:
    paths:
      - 'android/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: 서비스 계정 키 APK에 주입
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p android/app/src/main/assets
          if [ -n "$SERVICE_ACCOUNT_JSON" ]; then
            echo "$SERVICE_ACCOUNT_JSON" > android/app/src/main/assets/service_account.json
            echo "✅ service_account.json 주입 완료"
          else
            echo "⚠ SERVICE_ACCOUNT_JSON secret 없음 — GitHub Settings → Secrets에 등록 필요"
          fi

      - name: Gradle Wrapper 생성
        run: |
          cd android
          gradle wrapper --gradle-version 8.6

      # ── sherpa-onnx AAR 준비 ────────────────────────────────────────────────
      # JitPack 미사용 이유: jitpack.yml에 LIBSHERPA_VERSION=v1.12.40 하드코딩되어
      # v1.13.2 요청 시 잘못된 버전 AAR이 설치됨.
      # GitHub Releases에서 직접 다운로드하는 방식이 안전하고 확실함.
      - name: sherpa-onnx AAR 캐시 확인
        id: cache-sherpa-aar
        uses: actions/cache@v4
        with:
          path: android/app/libs/sherpa-onnx-1.13.2.aar
          key: sherpa-onnx-aar-1.13.2

      - name: sherpa-onnx Android AAR 다운로드 (v1.13.2)
        if: steps.cache-sherpa-aar.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/libs
          echo "⬇ sherpa-onnx v1.13.2 AAR 다운로드 중..."
          wget -q \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.2/sherpa-onnx-1.13.2.aar" \
            -O android/app/libs/sherpa-onnx-1.13.2.aar

          FILE_SIZE=$(stat -c%s "android/app/libs/sherpa-onnx-1.13.2.aar" 2>/dev/null || echo 0)
          echo "AAR 크기: ${FILE_SIZE} bytes"

          # 최소 50MB 검증 (다운로드 실패 시 HTML 오류 페이지가 저장되는 경우 방어)
          if [ "$FILE_SIZE" -lt 50000000 ]; then
            echo "❌ AAR 크기 이상 (${FILE_SIZE}B < 50MB) — 다운로드 실패"
            echo "파일 앞부분:"
            head -c 200 android/app/libs/sherpa-onnx-1.13.2.aar || true
            exit 1
          fi
          echo "✅ sherpa-onnx v1.13.2 AAR 준비 완료 (${FILE_SIZE} bytes)"

      # ── APK 빌드 ────────────────────────────────────────────────────────────
      - name: APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/build_log.txt
          exit ${PIPESTATUS[0]}

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: asterion-video-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 7

      - name: 빌드 로그 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build_log.txt
          retention-days: 3
