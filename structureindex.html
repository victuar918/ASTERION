<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Listing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1e08;
      background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
      min-height: 100vh;
    }

    .container {
      padding: 20px 40px 100px 40px;
    }

    /* 타이틀 이미지 */
    .title-img {
      width: 95%;
      display: block;
      margin: 20px auto 30px auto;
    }

    /* 텍스트 입력 */
    .input-group {
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: 0 auto 20px auto;
    }

    .input-group input {
      font-size: 16px;
      padding: 10px;
      margin-bottom: 10px;
      border: 2px solid #d8ad3c;
      border-radius: 4px;
    }

    /* 사이즈+Stock 라인 */
    .stone-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .stone-line select {
      padding: 8px;
      border: 2px solid #d8ad3c;
      border-radius: 4px;
      font-size: 14px;
    }

    .stone-line input.stock-input {
      width: 25%;
      padding: 8px;
      border: 2px solid #d8ad3c;
      border-radius: 4px;
      font-size: 14px;
    }

    .stone-line .pcs-label {
      font-size: 14px;
    }

    .stone-line button.add-line {
      padding: 6px 10px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background-color: #d8ad3c;
      color: white;
      transition: 0.2s;
    }

    .stone-line button.add-line:hover {
      opacity: 0.8;
    }

    /* 하단 네비게이션 */
    .bottom-nav {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px; /* 간격 좁힘 */
    }

    .bottom-nav img {
      width: 63px; /* 기존 90px → 70% */
      max-width: 100%;
      cursor: pointer;
      transition: 0.2s;
    }

    .bottom-nav img:hover {
      transform: scale(1.08);
    }
  </style>
</head>

<body>

  <!-- 타이틀 이미지 (컨테이너 밖) -->
  <img src="images/ttl_gemstonelist.png" alt="New Listing" class="title-img">

  <div class="container">
    <!-- Name 입력 -->
    <div class="input-group">
      <input type="text" id="nameEng" placeholder="Name">
      <input type="text" id="nameKr" placeholder="원석명">
    </div>

    <!-- 사이즈/Stock 라인 -->
    <div id="stoneLines">
      <div class="stone-line">
        <select class="size-select">
          <option value="4mm">4mm</option>
          <option value="5mm">5mm</option>
          <option value="6mm">6mm</option>
          <option value="8mm">8mm</option>
          <option value="10mm">10mm</option>
          <option value="12mm">12mm</option>
        </select>
        <input type="number" class="stock-input" placeholder="Stock" min="0">
        <span class="pcs-label">PCS</span>
        <button class="add-line">+</button>
      </div>
    </div>

  </div>

  <!-- 하단 버튼 -->
  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()">
    <img src="images/btn_go_before.png" onclick="goBack()">
    <img src="images/btn_stonelisting.png" onclick="submitListing()">
    <img src="images/btn_imageupload.png" onclick="uploadImage()">
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzjX-kWbDv9P5f-tyNV8Txa6mqzzW7xbPX-GYbCwxH7yL7B80UohJkmaPGdhmjQWGo1sw/exec";

    // + 버튼 클릭 시 라인 추가
    const stoneLines = document.getElementById("stoneLines");
    stoneLines.addEventListener("click", function (e) {
      if (e.target.classList.contains("add-line")) {
        const newLine = e.target.parentElement.cloneNode(true);
        newLine.querySelector("input").value = "";
        newLine.querySelector("select").selectedIndex = 0;
        stoneLines.appendChild(newLine);
      }
    });

    function goHome() {
      window.location.href = "index.html";
    }

    function goBack() {
      window.location.href = "inventory.html"; // J화면으로 이동
    }

    function uploadImage() {
      alert("이미지 업로드 기능 준비중...");
      // 이후 구글 드라이브 업로드 폼 연결 예정
    }

    async function submitListing() {
      const nameEng = document.getElementById("nameEng").value.trim();
      const nameKr = document.getElementById("nameKr").value.trim();
      if (!nameEng || !nameKr) return alert("NameEng와 NameKr를 입력해주세요.");

      const stones = [];
      document.querySelectorAll(".stone-line").forEach(line => {
        const size = line.querySelector(".size-select").value;
        const stock = line.querySelector(".stock-input").value.trim();
        const stockNum = Number(stock);
        if (stock === "" || isNaN(stockNum) || stockNum < 0) return;
        stones.push({ NameEng: nameEng, NameKr: nameKr, Size: size, Stock: stockNum });
      });

      if (stones.length === 0) return alert("적어도 한 개의 사이즈+Stock을 입력해야 합니다.");

      try {
        const res = await fetch(WEBAPP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "addNewStones", stones })
        });
        const result = await res.json();
        if (result.success) {
          alert(result.message);
          document.getElementById("nameEng").value = "";
          document.getElementById("nameKr").value = "";
          document.querySelectorAll(".stock-input").forEach(inp => inp.value = "");
        } else {
          alert("Error: " + result.error);
        }
      } catch (err) {
        console.error(err);
        alert("서버 호출 중 오류가 발생했습니다.");
      }
    }
  </script>

</body>

</html>
