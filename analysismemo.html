<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASTERION – Analysis & Memo</title>

<script src="config.js"></script>
<script src="state.js"></script>
<script src="api.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:url('images/bg_main.jpg') center/cover no-repeat fixed;
font-family:Arial;
color:white;

height:100vh;
display:flex;
flex-direction:column;
align-items:center;

padding-bottom:110px;

}

#title{
margin-top:20px;
margin-bottom:10px;
}

#title img{
width:280px;
}

#container{

width:92%;
max-width:520px;

flex:1;

display:flex;
flex-direction:column;

}

.section-title{

text-align:center;
margin-top:10px;
margin-bottom:6px;
font-size:16px;

}

.textbox{

width:100%;
flex:1;

background:rgba(0,0,0,0.6);

border:none;

color:white;

padding:10px;

resize:none;

overflow-y:auto;

}

#memo-box{
height:100%;
}

#analysis-box{
height:100%;
}

.section{

flex:1;

display:flex;
flex-direction:column;

margin-bottom:10px;

}

#nav{

position:fixed;

bottom:0;
left:0;
right:0;

display:flex;

justify-content:space-around;

padding:10px;

background:rgba(0,0,0,0.8);

}

#nav img{
height:48px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="title">
<img src="images/ttl_analysisnmemo.png">
</div>

<div id="container">

<div class="section">

<div class="section-title">
Internal Memo
</div>

<textarea id="memo-box" class="textbox"></textarea>

</div>

<div class="section">

<div class="section-title">
Analysis
</div>

<textarea id="analysis-box" class="textbox"></textarea>

</div>

</div>

<div id="nav">

<img src="images/btn_go_home.png" id="btn-home">

<img src="images/btn_go_before.png" id="btn-before">

<img src="images/btn_save.png" id="btn-save">

<img src="images/btn_productimage.png" id="btn-next">

</div>

<script>

let structureCode=null;

document.addEventListener("DOMContentLoaded",init);

function init(){

structureCode=requireStructureCode();

if(!structureCode)return;

document.getElementById("btn-home").onclick=()=>{
location.href="index.html";
}

document.getElementById("btn-before").onclick=()=>{
goPage("design.html");
}

document.getElementById("btn-next").onclick=()=>{
goPage("productimage.html");
}

document.getElementById("btn-save").onclick=saveData;

}

async function saveData(){

let memo=document.getElementById("memo-box").value.trim();
let analysis=document.getElementById("analysis-box").value.trim();

try{

await apiUpdateAnalysisMemo(structureCode,analysis,memo);

alert("Saved");

}catch(e){

alert("Save Failed");

}

}

</script>

</body>
</html>
