<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ASTERION – Booklet</title>
<script src="config.js"></script><script src="api_contract.js"></script>
<script src="state.js"></script><script src="api.js"></script><script src="ui.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
  font-family:'Arial',sans-serif;color:#fff;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;overflow:hidden;
}
.ttl{width:240px;max-width:86vw;display:block;margin:12px auto 3px;flex-shrink:0}
.code-disp{font-size:12px;color:rgba(220,188,128,.85);letter-spacing:1.5px;text-align:center;padding:2px 0 5px;flex-shrink:0}
/* 콘텐츠: 좌(버튼 7개) + 우(미리보기) */
.content{flex:1;width:100%;max-width:540px;display:flex;min-height:0;padding:0 8px;gap:8px}
/* 좌측 페이지 버튼 세로 7개 */
.page-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;padding:2px 0}
.pg-btn{
  width:36px;height:36px;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.2);border-radius:6px;
  color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;-webkit-tap-highlight-color:transparent;
}
.pg-btn.active{background:rgba(170,130,75,.5);border-color:rgba(210,170,100,.9);color:#fff}
/* 미리보기 창 */
.preview-wrap{flex:1;min-height:0;overflow-y:auto;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(0,0,0,.3)}
.preview-wrap::-webkit-scrollbar{width:3px}
.preview-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
/* 각 미리보기 페이지 (B5 가로 비율 약 1.41:1 → 높이를 너비의 71%) */
.preview-page{display:none;padding:14px;min-height:200px}
.preview-page.active{display:block}
.pg-title{font-size:10px;letter-spacing:1.5px;color:rgba(220,188,128,.6);margin-bottom:8px}
.pg-content{font-size:12px;line-height:1.8;color:rgba(255,255,255,.8);white-space:pre-wrap}
.pg-img{max-width:100%;border-radius:8px;margin-top:8px;display:none}
.pg-img.show{display:block}
.stone-block{margin-bottom:10px}
.stone-block .s-name{font-size:13px;font-weight:bold;color:rgba(220,188,128,.9)}
.stone-block .s-eng{font-size:11px;color:rgba(255,255,255,.55)}
.stone-block .s-exp{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}

.st-msg{flex-shrink:0;font-size:12px;text-align:center;min-height:18px;padding:2px 0;color:rgba(220,80,80,.9)}
.nav-bar{flex-shrink:0;width:100%;max-width:540px;display:flex;justify-content:space-around;padding:6px 8px env(safe-area-inset-bottom,8px);background:rgba(5,4,2,.92);border-top:1px solid rgba(255,255,255,.07)}
.nav-bar img{height:44px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
.ld-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.ld-ov.show{display:flex}
.ld-txt{font-size:12px;letter-spacing:2.5px;color:rgba(220,188,128,1)}
</style>
</head>
<body>
<img class="ttl" src="images/ttl_booklet.png" alt="Booklet"/>
<div class="code-disp" id="code-disp">—</div>

<div class="content">
  <!-- 좌: 페이지 선택 버튼 7개 -->
  <div class="page-btns" id="page-btns">
    <button class="pg-btn active" data-pg="1">1</button>
    <button class="pg-btn" data-pg="2">2</button>
    <button class="pg-btn" data-pg="3">3</button>
    <button class="pg-btn" data-pg="4">4</button>
    <button class="pg-btn" data-pg="5">5</button>
    <button class="pg-btn" data-pg="6">6</button>
    <button class="pg-btn" data-pg="7">7</button>
  </div>
  <!-- 우: 미리보기 -->
  <div class="preview-wrap" id="preview-wrap">
    <div id="pg1" class="preview-page active"><div class="pg-title">PAGE 1 — Cover</div><div class="pg-content" id="pg1-content">Loading...</div></div>
    <div id="pg2" class="preview-page"><div class="pg-title">PAGE 2 — Stone Info</div><div class="pg-content" id="pg2-content"></div></div>
    <div id="pg3" class="preview-page"><div class="pg-title">PAGE 3 — Product Image</div><img class="pg-img" id="pg3-img" src="" alt=""/></div>
    <div id="pg4" class="preview-page"><div class="pg-title">PAGE 4 — Layout Summary</div><div class="pg-content" id="pg4-content"></div></div>
    <div id="pg5" class="preview-page"><div class="pg-title">PAGE 5 — Analysis</div><div class="pg-content" id="pg5-content"></div></div>
    <div id="pg6" class="preview-page"><div class="pg-title">PAGE 6 — Memo</div><div class="pg-content" id="pg6-content"></div></div>
    <div id="pg7" class="preview-page"><div class="pg-title">PAGE 7 — Sign / Name</div><div class="pg-content" id="pg7-content"></div></div>
  </div>
</div>

<div class="st-msg" id="st-msg"></div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"    id="b-home"/>
  <img src="images/btn_go_before.png"  id="b-back"/>
  <img src="images/btn_createpdf.png"  id="b-pdf"/>
</div>
<div class="ld-ov" id="ld-ov"><div class="ld-txt">CREATING PDF...</div></div>

<script src="booklet.js"></script>
</body>
</html>
