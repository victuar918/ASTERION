<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Tasking</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom right, #fff8e1, #ffe082); /* 밝은 골드 그라데이션 */
  }

  /* 상단 타이틀 이미지 */
  .title-img {
    display: block;
    width: 95%;      /* 좌우 95% */
    max-width: 1400px; /* 화면이 크면 최대폭 제한 가능 */
    margin: 10px auto; /* 상단 여백 + 중앙 정렬 */
  }

  /* 목록 스타일 */
  #list {
    margin: 20px auto;
    width: 95%;
    max-width: 1400px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    padding: 8px 12px;
    margin-bottom: 6px;
    background: rgba(255, 255, 255, 0.2); /* 반투명 */
    cursor: pointer;
    font-size: 0.5rem; /* 텍스트 크기 50%로 감소 */
  }

  .buttons {
    position: fixed;
    bottom: 16.66%; /* 화면 하단 5/6 지점 */
    width: 95%;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-around;
  }

  .buttons img {
    height: 60px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- 상단 타이틀 이미지 -->
<img src="images/ttl_selecttasking.png" alt="Select Tasking" class="title-img">

<!-- StructureCode / Status 목록 -->
<div id="list"></div>

<!-- 하단 버튼 -->
<div class="buttons">
  <img src="images/btn_go_before.png" alt="Before" onclick="goBefore()">
  <img src="images/btn_go_home.png" alt="Home" onclick="goHome()">
  <img src="images/btn_go_next.png" alt="Next" onclick="goNext()">
</div>

<script>
async function loadTasking() {
  try {
    const res = await fetch('YOUR_APPS_SCRIPT_URL?action=getTaskingList');
    const data = await res.json();
    const list = document.getElementById('list');
    list.innerHTML = '';

    data.forEach(item => {
      const row = document.createElement('div');
      row.className = 'row';
      row.textContent = `${item.StructureCode} - ${item.Status}`;
      row.onclick = () => goStructure(item.StructureCode);
      list.appendChild(row);
    });
  } catch(err) {
    console.error("API error", err);
  }
}

function goStructure(code) {
  window.location.href = "structuredesign.html?code=" + code;
}

function goHome() {
  window.location.href = "index.html";
}

function goBefore() {
  window.history.back();
}

function goNext() {
  // 다음 화면 이동 로직 필요 시 작성
}

loadTasking();
</script>

</body>
</html>
