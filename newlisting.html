<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Listing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1e08;
      background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
      min-height: 100vh;
    }

    .container {
      padding: 20px 40px 160px 40px;
    }

    .title-img {
      width: 95%;
      display: block;
      margin: 20px auto 30px auto;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: 0 auto 20px auto;
      font-size: 13px;
    }

    .input-group input,
    .input-group textarea {
      font-size: 13px;
      padding: 8px;
      margin-bottom: 10px;
      border: 2px solid #d8ad3c;
      border-radius: 4px;
      background-color: rgba(255, 255, 255, 0.6);
      width: 100%;
      box-sizing: border-box;
    }

    #expInput {
      min-height: 300px;
      resize: vertical;
      overflow-y: auto;
    }

    .autocomplete-items {
      position: absolute;
      border: 1px solid #d8ad3c;
      border-bottom: none;
      border-top: none;
      z-index: 99;
      background: #fff;
      max-height: 150px;
      overflow-y: auto;
    }

    .autocomplete-items div {
      padding: 8px;
      cursor: pointer;
    }

    .autocomplete-items div:hover {
      background-color: #eac45a;
    }

    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 1000;
    }

    .bottom-nav img {
      width: 70px;
      cursor: pointer;
      transition: transform 0.2s;
      object-fit: contain;
    }

    .bottom-nav img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <img src="images/ttl_gemstonelist.png" alt="New Listing" class="title-img">

  <div class="container">

    <div class="input-group" style="position:relative;">
      <input type="text" id="nameEng" placeholder="Name">
      <input type="text" id="nameKr" placeholder="원석명">
      <div id="nameKrList" class="autocomplete-items"></div>
    </div>

    <div class="input-group">
      <textarea id="expInput" placeholder="원석에 대한 해설"></textarea>
    </div>

    <input type="file" id="imageFileInput" style="display:none">
  </div>

  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()">
    <img src="images/btn_go_before.png" onclick="goBack()">
    <img src="images/btn_imageupload.png" onclick="uploadImage()">
    <img src="images/btn_stonelisting.png" onclick="submitListing()">
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxD2CfRJ2SgwKB19wj9P-gYTGP2SOWxPNbepaDOClUiNdfUZdXP0HIOYwZlnwHMr2NzdA/exec";

    function goHome() { window.location.href = "index.html"; }
    function goBack() { window.location.href = "inventory.html"; }

    // ----------------- NameKr 자동완성 -----------------
    const nameKrInput = document.getElementById("nameKr");
    const nameKrListDiv = document.getElementById("nameKrList");

    nameKrInput.addEventListener("input", async () => {
      const val = nameKrInput.value.trim();
      nameKrListDiv.innerHTML = "";
      if (!val) return;

      try {
        const res = await fetch(`${WEBAPP_URL}?action=searchNameKr&query=${encodeURIComponent(val)}`);
        const data = await res.json();
        data.results?.forEach(item => {
          const div = document.createElement("div");
          div.textContent = item;
          div.addEventListener("click", () => {
            nameKrInput.value = item;
            nameKrListDiv.innerHTML = "";
          });
          nameKrListDiv.appendChild(div);
        });
      } catch (err) {
        console.error(err);
      }
    });

    document.addEventListener("click", (e) => {
      if (e.target !== nameKrInput) nameKrListDiv.innerHTML = "";
    });

    // ----------------- 이미지 업로드 -----------------
    function uploadImage() {
      const nameKr = nameKrInput.value.trim();
      if (!nameKr) return alert("먼저 원석명을 입력하세요.");
      document.getElementById("imageFileInput").click();
    }

    document.getElementById("imageFileInput").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      const nameKr = nameKrInput.value.trim();
      if (!file || !nameKr) return alert("원석명을 먼저 입력하고 파일을 선택하세요.");

      try {
        const uploadUrl = `${WEBAPP_URL}?nameKr=${encodeURIComponent(nameKr)}`;
        const res = await fetch(uploadUrl, { method: "POST", body: file });
        const result = await res.json();
        if (result.success) alert("이미지 업로드 성공!");
        else alert("업로드 실패: " + result.error);
      } catch (err) {
        console.error(err);
        alert("업로드 중 오류가 발생했습니다.");
      }
    });

    // ----------------- 원석 등록 -----------------
    async function submitListing() {
      const nameEng = document.getElementById("nameEng").value.trim();
      const nameKr = nameKrInput.value.trim();
      const expText = document.getElementById("expInput").value.trim();
      if (!nameEng || !nameKr) return alert("NameEng와 NameKr를 입력해주세요.");

      const stones = [{ nameEng, nameKr, exp: expText }];

      try {
        const res = await fetch(WEBAPP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "addStones", data: stones })
        });

        const result = await res.json();
        if (result.success) {
          alert(`등록 성공: ${result.inserted}개`);
          document.getElementById("nameEng").value = "";
          nameKrInput.value = "";
          document.getElementById("expInput").value = "";
        } else if (result.partialSuccess) {
          alert(`부분 등록: ${result.inserted}개\n오류: ${result.errors.map(e => e.error).join(", ")}`);
        } else {
          alert(`오류: ${result.errors?.map(e => e.error).join(", ") || result.error || "알 수 없는 오류"}`);
        }
      } catch (err) {
        console.error(err);
        alert("서버 호출 중 오류가 발생했습니다.");
      }
    }
  </script>
</body>

</html>
