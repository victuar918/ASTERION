<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Info</title>

<!-- ▼ 공통 JS -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
  text-align: center;
}

.title { width: 90%; margin-top: 20px; }

.image-area { margin-top: 40px; }

.stone-img {
  width: 200px;
  height: 200px;
  object-fit: contain;
}

.btn-select { width: 200px; cursor: pointer; }

input, textarea {
  width: 80%;
  margin-top: 10px;
  padding: 8px;
  font-size: 14px;
  border-radius: 6px;
  border: none;
  box-sizing: border-box;
  background: rgba(255,255,255,0.5);
}

textarea { height: 100px; resize: none; }

.bottom {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.bottom img {
  width: 60px;
  cursor: pointer;
  transition: opacity 0.2s;
}

/* 업로드 버튼 dim (이미지 미선택 시) */
#uploadBtn          { opacity: 0.35; pointer-events: none; }
#uploadBtn.ready    { opacity: 1;    pointer-events: auto; }
</style>
</head>

<body>

<img src="images/ttl_gemstoneinfo.png" class="title" alt="Stone Info">

<div class="image-area">
  <img id="stoneImage" class="stone-img" alt="원석 이미지"
       onerror="this.onerror=null; this.src='images/btn_gemimageselec.png';">
  <br>
  <img src="images/btn_gemimageselec.png" class="btn-select" id="selectBtn" alt="이미지 선택">
  <input type="file" id="imageInput"
         accept="image/jpeg,image/jpg,image/png,image/webp,image/gif"
         style="display:none">
</div>

<br>
<input id="nameEng" placeholder="영문명 (NameEng)">
<br>
<input id="nameKr"  placeholder="한글명 (NameKr) *필수">
<br>
<textarea id="exp"  placeholder="설명 (Exp)"></textarea>

<div class="bottom">
  <img src="images/btn_go_home.png"     alt="홈"          onclick="goHome()">
  <img src="images/btn_go_before.png"   alt="뒤로"        onclick="goBefore()">
  <img src="images/btn_imageupload.png" alt="이미지업로드" id="uploadBtn" onclick="uploadImage()">
  <img src="images/btn_update.png"  alt="업데이트"    onclick="updateInfo()">
</div>

<script>
// ── 상수 ──────────────────────────────────────────────────────
const MAX_RAW_SIZE  = 50 * 1024 * 1024; // 원본 50MB 초과 차단
const MAX_COMP_SIZE =  4 * 1024 * 1024; // 압축 후 4MB 초과 차단
const COMP_MAX_PX   = 1200;
const COMP_QUALITY  = 0.82;

// ── 초기화 ─────────────────────────────────────────────────────
let selectedFile = null;

window.onload = function () {
  // 이미지 선택 버튼 연결
  document.getElementById("selectBtn").onclick = function () {
    document.getElementById("imageInput").click();
  };

  // state.js getSelectedStone()으로 원석 정보 읽기
  const s = getSelectedStone();
  document.getElementById("nameKr").value  = s.nameKr;
  document.getElementById("nameEng").value = s.nameEng;
  document.getElementById("exp").value     = s.exp;

  const imgEl = document.getElementById("stoneImage");
  if (s.image) {
    imgEl.src = s.image;
  } else {
    imgEl.style.display = "none";
  }
};

// ── 파일 선택 ─────────────────────────────────────────────────
document.getElementById("imageInput").onchange = function () {
  const file = this.files[0];
  if (!file) {
    selectedFile = null;
    document.getElementById("uploadBtn").classList.remove("ready");
    return;
  }

  if (file.size > MAX_RAW_SIZE) {
    alert("파일이 너무 큽니다 (50MB 초과).");
    this.value = "";
    selectedFile = null;
    document.getElementById("uploadBtn").classList.remove("ready");
    return;
  }

  selectedFile = file;
  document.getElementById("uploadBtn").classList.add("ready"); // dim 해제

  // 로컬 미리보기
  const reader = new FileReader();
  reader.onload = function (e) {
    const imgEl = document.getElementById("stoneImage");
    imgEl.style.display = "";
    imgEl.src = e.target.result;
  };
  reader.onerror = function () {
    alert("미리보기 실패. 다시 선택해 주세요.");
    selectedFile = null;
    document.getElementById("imageInput").value = "";
    document.getElementById("uploadBtn").classList.remove("ready");
  };
  reader.readAsDataURL(file);
};

// ── 이미지 압축 (Canvas → JPEG) ──────────────────────────────
function compressImage(file) {
  return new Promise(function (resolve, reject) {
    const reader = new FileReader();
    reader.onerror = function () { reject(new Error("파일 읽기 실패")); };
    reader.onload  = function (e) {
      const imgEl = new Image();
      imgEl.onerror = function () { reject(new Error("이미지 로드 실패")); };
      imgEl.onload  = function () {
        let w = imgEl.naturalWidth, h = imgEl.naturalHeight;
        if (!w || !h) { reject(new Error("이미지 크기 읽기 실패")); return; }
        if (w > COMP_MAX_PX || h > COMP_MAX_PX) {
          const r = Math.min(COMP_MAX_PX / w, COMP_MAX_PX / h);
          w = Math.round(w * r); h = Math.round(h * r);
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        if (!ctx) { reject(new Error("Canvas 사용 불가")); return; }
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(imgEl, 0, 0, w, h);
        canvas.toBlob(function (blob) {
          if (!blob) { reject(new Error("압축 실패")); return; }
          resolve(blob);
        }, "image/jpeg", COMP_QUALITY);
      };
      imgEl.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── 이미지 업로드 ─────────────────────────────────────────────
async function uploadImage() {
  const nameKr = getSelectedStone().nameKr;
  if (!nameKr)       { alert("원석 정보가 없습니다. 목록으로 돌아가세요."); return; }
  if (!selectedFile) { alert("이미지를 선택하세요."); return; }

  try {
    showLoading("이미지 압축 중...");
    const blob = await compressImage(selectedFile);

    if (blob.size > MAX_COMP_SIZE) {
      alert("압축 후에도 4MB를 초과합니다. 더 작은 이미지를 사용해 주세요.");
      return;
    }

    showLoading("이미지 업로드 중...");
    const buffer    = await blob.arrayBuffer();
    const byteArray = Array.from(new Uint8Array(buffer));
    const fileName  = selectedFile.name.replace(/\.[^.]+$/, "") + ".jpg";

    // api.js apiPost → CONFIG.API_BASE, Content-Type: text/plain (CORS 해결)
    const data = await apiPost({
      action   : "uploadImage",
      nameKr   : nameKr,
      fileName : fileName,
      mimeType : "image/jpeg",
      byteArray: byteArray,
    });

    if (data.success) {
      // state.js로 image URL 갱신
      const s = getSelectedStone();
      setSelectedStone({ ...s, image: data.url });
      alert("이미지 업로드 완료 ✓");
      location.reload();
    } else {
      alert("업로드 실패: " + (data.error || "알 수 없는 오류"));
    }
  } catch (err) {
    alert("업로드 오류: " + err.message);
  } finally {
    hideLoading();
  }
}

// ── 원석 정보 업데이트 ────────────────────────────────────────
async function updateInfo() {
  const oldNameKr = getSelectedStone().nameKr;
  if (!oldNameKr) { alert("원석 정보가 없습니다. 목록으로 돌아가세요."); return; }

  const newNameKr = document.getElementById("nameKr").value.trim();
  const nameEng   = document.getElementById("nameEng").value.trim();
  const exp       = document.getElementById("exp").value.trim();

  if (!newNameKr) { alert("원석명(NameKr)은 필수입니다."); document.getElementById("nameKr").focus(); return; }

  try {
    showLoading("정보 업데이트 중...");
    const data = await apiPost({
      action: "updateStoneInfo",
      data  : { oldNameKr, nameKr: newNameKr, nameEng, exp },
    });

    if (data.success) {
      setSelectedStone({ nameKr: newNameKr, nameEng, exp, image: getSelectedStone().image });
      alert("정보 업데이트 완료 ✓");
    } else {
      alert("업데이트 실패: " + (data.error || "알 수 없는 오류"));
    }
  } catch (err) {
    alert("업데이트 오류: " + err.message);
  } finally {
    hideLoading();
  }
}

function goBefore() { location.href = "inventory.html"; }
</script>

</body>
</html>
