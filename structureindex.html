<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Structure Code Index</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1e08;
      background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 타이틀 이미지 */
    .title-img {
      width: 95%;
      margin: 20px auto 30px auto; /* 상단 여백 + 아래 간격 */
      display: block;
    }

    /* 입력 영역 */
    .input-group {
      display: flex;
      flex-direction: column;
      width: 400px;
      margin-top: auto;
      margin-bottom: auto; /* 화면 중간 배치 */
    }

    .input-group input {
      font-size: 16px;
      padding: 10px;
      margin-bottom: 10px;
      border: 2px solid #d8ad3c;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* 하단 네비게이션 버튼 */
    .bottom-nav {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .bottom-nav img {
      width: 90px;
      cursor: pointer;
      transition: 0.2s;
    }

    .bottom-nav img:hover {
      transform: scale(1.08);
    }
  </style>
</head>

<body>

  <!-- 타이틀 이미지 (컨테이너 밖) -->
  <img src="images/ttl_codeindex.png" alt="Structure Code Index" class="title-img">

<!-- 입력창 -->
  <div class="input-group">
    <input type="text" id="structureCode" placeholder="S-00000-000000">
  </div>

  <style>
    .input-group {
      display: flex;
      flex-direction: column;
      width: 35vw; /* 화면 가로의 35% */
      margin: 0 auto;
      position: absolute;
      top: 40%; /* 화면 세로 기준 3/6 지점 */
      transform: translateY(-50%);
    }
  </style>

  <!-- 하단 버튼 -->
  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()">
    <img src="images/btn_as.png" onclick="setAS()">
    <img src="images/btn_select.png" onclick="selectCode()">
  </div>

  <script>
    const API_URL = https://script.google.com/macros/s/AKfycbxHIwm4XKlANkJLpbkaHN6kPG2z0C6ad3FbagTR_qyAdTUU9M40-R4-sr1E_vXoh_wYNQ";

    const input = document.getElementById("structureCode");

    // 자동 대문자 + S-00000-000000 형식
    input.addEventListener("input", function () {
      let val = input.value.toUpperCase().replace(/[^0-9A-Z]/g, '');

      if (!val.startsWith('S')) val = 'S' + val.slice(1);

      if (val.length > 1) val = val.slice(0, 1) + '-' + val.slice(1);
      if (val.length > 7) val = val.slice(0, 7) + '-' + val.slice(7);
      if (val.length > 14) val = val.slice(0, 14);

      input.value = val;
    });

    async function setAS() {
      const code = input.value;
      if (!code) return alert("StructureCode를 입력해주세요.");

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "updateStatus", structureCode: code, newStatus: "A/S" })
        });
        const result = await res.json();
        if (result.success) {
          alert(code + " 상태가 A/S로 변경되었습니다.");
        } else {
          alert("Error: " + result.error);
        }
      } catch (err) {
        console.error(err);
        alert("API 호출 중 오류가 발생했습니다.");
      }
    }

    function selectCode() {
      const code = input.value;
      if (!code) return alert("StructureCode를 입력해주세요.");
      window.location.href = "structuredesign.html?code=" + code;
    }

    function goHome() {
      window.location.href = "index.html";
    }
  </script>

</body>

</html>
