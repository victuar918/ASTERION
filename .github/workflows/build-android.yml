name: Android APK Build

on:
  push:
    paths:
      - 'android/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: sherpa-onnx AAR 추출 (tar.bz2 → AAR)
        run: |
          mkdir -p android/app/libs
          echo "=== sherpa-onnx 1.10.31 다운로드 ==="
          wget -q "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.10.31/sherpa-onnx-v1.10.31-android.tar.bz2" \
               -O /tmp/sherpa-onnx-android.tar.bz2
          mkdir -p /tmp/sherpa-extract
          tar -xjf /tmp/sherpa-onnx-android.tar.bz2 -C /tmp/sherpa-extract
          AAR=$(find /tmp/sherpa-extract -name "*.aar" | grep -i "arm64\|full\|android" | head -1)
          if [ -z "$AAR" ]; then
            AAR=$(find /tmp/sherpa-extract -name "*.aar" | head -1)
          fi
          if [ -n "$AAR" ]; then
            cp "$AAR" android/app/libs/sherpa-onnx-android.aar
            echo "✅ sherpa-onnx: $AAR"
          else
            echo "⚠ sherpa-onnx AAR 없음"
          fi

      - name: FFmpeg AAR 추출 (pub.dev Flutter 패키지)
        run: |
          mkdir -p android/app/libs android/temp_ffmpeg
          echo "=== pub.dev ffmpeg_kit_flutter_full-6.0.3 다운로드 ==="
          curl -L --max-time 120 \
            -o android/temp_ffmpeg/archive.tar.gz \
            "https://pub.dev/api/archives/ffmpeg_kit_flutter_full-6.0.3.tar.gz"
          echo "크기: $(du -sh android/temp_ffmpeg/archive.tar.gz)"

          echo "=== 압축 해제 ==="
          tar -xzf android/temp_ffmpeg/archive.tar.gz -C android/temp_ffmpeg/

          echo "=== AAR 파일 검색 ==="
          find android/temp_ffmpeg -name "*.aar" | tee /tmp/ffmpeg_aar_list.txt
          AAR_COUNT=$(wc -l < /tmp/ffmpeg_aar_list.txt)
          echo "발견된 AAR: ${AAR_COUNT}개"

          if [ "$AAR_COUNT" -gt 0 ]; then
            FULL_AAR=$(grep -i "full\|ffmpeg-kit" /tmp/ffmpeg_aar_list.txt | head -1)
            if [ -z "$FULL_AAR" ]; then
              FULL_AAR=$(head -1 /tmp/ffmpeg_aar_list.txt)
            fi
            cp "$FULL_AAR" android/app/libs/ffmpeg-kit-full.aar
            echo "✅ FFmpeg AAR: $FULL_AAR ($(du -sh android/app/libs/ffmpeg-kit-full.aar))"
          else
            echo "⚠ AAR 없음 — 패키지 내부 구조:"
            find android/temp_ffmpeg -type f | head -30
          fi

          rm -rf android/temp_ffmpeg
          echo "=== libs 최종 목록 ==="
          ls -lh android/app/libs/

      - name: Gradle Wrapper 생성
        run: |
          cd android
          gradle wrapper --gradle-version 8.6

      - name: APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build_log.txt
          exit ${PIPESTATUS[0]}

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: asterion-video-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: 빌드 로그 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build_log.txt
          retention-days: 3
