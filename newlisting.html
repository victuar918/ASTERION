<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ASTERION – Inventory</title>
<script src="config.js"></script><script src="api_contract.js"></script>
<script src="state.js"></script><script src="api.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
  font-family:'Arial',sans-serif;color:#fff;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;overflow:hidden;
}
.ttl{width:240px;max-width:86vw;display:block;margin:12px auto 6px;flex-shrink:0}
/* 100% 투명 스크롤 창 */
#stone-list{
  flex:1;width:100%;max-width:480px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0;min-height:0;
}
#stone-list::-webkit-scrollbar{width:3px}
#stone-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
.s-row{
  padding:13px 16px;font-size:14px;text-align:center;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.07);
  transition:background .15s;-webkit-tap-highlight-color:transparent;
}
.s-row.selected{background:rgba(255,255,255,.40)}
.s-row:active{background:rgba(255,255,255,.15)}
.empty{padding:32px;text-align:center;font-size:13px;color:rgba(255,255,255,.3)}
.nav-bar{flex-shrink:0;width:100%;max-width:480px;display:flex;justify-content:space-around;padding:6px 8px env(safe-area-inset-bottom,8px);background:rgba(5,4,2,.92);border-top:1px solid rgba(255,255,255,.07)}
.nav-bar img{height:44px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
</style>
</head>
<body>
<img class="ttl" src="images/ttl_inventory.png" alt="Inventory"/>
<div id="stone-list"><div class="empty">Loading...</div></div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"   id="b-home"/>
  <img src="images/btn_stonelisting.png" id="b-new"/>
  <img src="images/btn_information.png"  id="b-info"/>
  <img src="images/btn_management.png"   id="b-stock"/>
</div>
<script>
"use strict";
var selName=null;

document.addEventListener("DOMContentLoaded", async function(){
  document.getElementById("b-home").onclick =function(){ clearAndGoFromInventory("index.html"); };
  document.getElementById("b-new").onclick  =function(){ clearAndGoFromInventory("newlisting.html"); };
  document.getElementById("b-info").onclick =function(){
    if(!selName){ alert("원석을 선택하세요"); return; }
    setCurrentNameKr(selName); goPageWithName("stoneinfo.html",selName);
  };
  document.getElementById("b-stock").onclick=function(){
    if(!selName){ alert("원석을 선택하세요"); return; }
    setCurrentNameKr(selName); goPageWithName("invenmanage.html",selName);
  };
  await loadStones();
});

async function loadStones(){
  var el=document.getElementById("stone-list");
  try {
    var stones=await apiGetAllStones(); // nameKr만 필요
    if(!stones||!stones.length){ el.innerHTML='<div class="empty">등록된 원석 없음</div>'; return; }
    el.innerHTML="";
    stones.forEach(function(s){
      var name=s.nameKr||s;
      var row=document.createElement("div"); row.className="s-row";
      row.textContent=name;
      row.setAttribute("data-name",name);
      row.addEventListener("click",function(){
        if(selName===name){
          selName=null; row.classList.remove("selected");
        } else {
          document.querySelectorAll(".s-row.selected").forEach(function(r){ r.classList.remove("selected"); });
          selName=name; row.classList.add("selected");
        }
      });
      el.appendChild(row);
    });
  } catch(err){
    el.innerHTML='<div class="empty" style="color:rgba(220,80,80,.8)">로드 실패: '+esc(err.message)+'</div>';
  }
}
</script>
</body>
</html>
