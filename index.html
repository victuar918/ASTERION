<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION</title>
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ASTERION"/>
<meta name="theme-color" content="#0a0807"/>
<link rel="apple-touch-icon" href="images/btn_icon.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:url('images/bg_home.jpg') center/cover no-repeat fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  min-height:100vh;
}
#btn-grid{
  width:100%;
  max-width:480px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  padding:0 28px 22% 28px;
  justify-items:center;
}
#btn-grid img{
  /* 기존 대비 30% 축소: 그리드 셀의 70%만 사용 */
  width:70%;
  height:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s, transform .15s;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.55));
}
#btn-grid img:active{opacity:.7;transform:scale(.95)}
</style>
</head>
<body>
<div id="btn-grid">
  <img src="images/btn_worksdesk.png"    alt="Works Desk"       id="btn-wd"/>
  <img src="images/btn_go_index.png"     alt="Index"            id="btn-si"/>
  <img src="images/btn_go_inventory.png" alt="Inventory"        id="btn-inv"/>
  <img src="images/btn_neworder.png"     alt="New Registration" id="btn-no"/>
</div>
<script>
document.getElementById("btn-wd").onclick  = function(){ location.href="worksdesk.html"; };
document.getElementById("btn-si").onclick  = function(){ location.href="structureindex.html"; };
document.getElementById("btn-inv").onclick = function(){ location.href="inventory.html"; };
document.getElementById("btn-no").onclick  = function(){ location.href="neworder.html"; };
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){ reg.update(); });
    });
    navigator.serviceWorker.register("sw.js")
      .then(function(reg){ console.log("[SW] 등록:", reg.scope); })
      .catch(function(err){ console.warn("[SW] 실패:", err); });
  });
}
</script>
</body>
</html>
