<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Tasking</title>

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:#2b1e08;
  background:linear-gradient(
    135deg,
    #fff6da 0%,
    #f5d97a 40%,
    #eac45a 70%,
    #d8ad3c 100%
  );
  height:100vh;
}

/* 타이틀 */
.title-img{
  display:block;
  width:95%;
  max-width:1400px;
  margin:10px auto;
}

/* 리스트 영역 */
.container{
  padding:20px 40px 40px 40px;
  max-height:65vh;
  overflow-y:auto;
}

/* 한 행 */
.row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  padding:10px 0;
  cursor:pointer;
  transition:0.2s;
}

.row:hover{
  opacity:0.6;
}

/* 선택된 row */
.row.selected{
  background:rgba(255,255,255,0.25);
}

/* 코드 */
.code{
  font-weight:600;
}

/* 상태 */
.status{
  opacity:0.8;
}

/* 빈 목록 안내 */
.empty-msg{
  font-size:13px;
  opacity:0.6;
  padding:20px 0;
}

/* 하단 버튼 */
.bottom-nav{
  position:absolute;
  bottom:10%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:30px;
}

.bottom-nav img{
  width:90px;
  cursor:pointer;
  transition:0.2s;
}

.bottom-nav img:hover{
  transform:scale(1.08);
}

</style>
</head>

<body>

<img src="images/ttl_selecttasking.png" class="title-img" alt="Select Tasking">

<div class="container">
  <div id="taskList"></div>
</div>

<div class="bottom-nav">
  <img src="images/btn_go_home.png" alt="홈"    onclick="goHome()">
  <img src="images/btn_select.png"  alt="선택"  onclick="goWorkDesk()">
</div>

<script>

// ── 상수 ─────────────────────────────────────────────────────
// [FIX-D1] 다른 HTML들과 동일한 WEBAPP_URL로 통일
// [FIX-D5] 엔드포인트와 파라미터 분리 — URL 상수에 쿼리 파라미터 미포함
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzUjpvmz-qPPGXX-xhm0Bl36ajSgilgCkvvs0TAWgvzFdhPKaKccB3hWugpQYOatcZFFQ/exec";

// ── 상태 ─────────────────────────────────────────────────────
// [FIX-D11] selectedCode는 loadTasking 진입 시마다 초기화
let selectedCode = null;

// ── 초기 로드 ─────────────────────────────────────────────────
// [FIX-D7] window.onload 안에서 실행 — 다른 HTML과 일관성 유지
window.onload = function () {
  loadTasking();
};

// ── Tasking 목록 로드 ─────────────────────────────────────────
// [FIX-D1] action:"getTaskingList" → Code.gs doGet 케이스 일치
// [FIX-D2] Array.isArray() 로 빈 배열/객체 구분 → || 연산자 제거
// [FIX-D3] Array 여부 검증 후 forEach 호출
// [FIX-D9] res.ok HTTP 레벨 오류 체크 추가
// [FIX-D11] 로드 시작 시 selectedCode 초기화
async function loadTasking() {

  // [FIX-D11] 재로드 시 이전 선택 초기화
  selectedCode = null;

  const listEl = document.getElementById("taskList");
  listEl.innerHTML = "";

  // [FIX-D8] 로딩 표시
  const loadingEl = document.createElement("div");
  loadingEl.className = "empty-msg";
  loadingEl.textContent = "불러오는 중...";
  listEl.appendChild(loadingEl);

  try {
    // [FIX-D1][FIX-D5] 파라미터 분리 — URL에 action만 추가
    const res = await fetch(WEBAPP_URL + "?action=getTaskingList");

    // [FIX-D9] HTTP 레벨 오류 체크
    if (!res.ok) throw new Error("서버 응답 오류: HTTP " + res.status);

    const json = await res.json();

    // [FIX-D3] 서버 success 확인
    if (!json.success) {
      throw new Error(json.error || "목록을 불러오지 못했습니다.");
    }

    // [FIX-D2][FIX-D3] Array.isArray로 정확히 배열 여부 검증
    const data = Array.isArray(json.data) ? json.data : [];

    listEl.innerHTML = "";

    // [FIX-D10] 빈 목록 안내
    if (data.length === 0) {
      const emptyEl = document.createElement("div");
      emptyEl.className = "empty-msg";
      emptyEl.textContent = "조회된 Structure가 없습니다.";
      listEl.appendChild(emptyEl);
      return;
    }

    const filtered = data.filter(item =>
      item.Status === "Tasking" ||
      item.Status === "Forwarding" ||
      item.Status === "A/S"
    );
    
    filtered.forEach(function (item) {
      const row = document.createElement("div");
      row.className = "row";

      // [FIX-D4] innerHTML 대신 textContent 사용 → XSS 방지
      const codeEl   = document.createElement("div");
      const statusEl = document.createElement("div");
      codeEl.className   = "code";
      statusEl.className = "status";
      codeEl.textContent   = item.StructureCode || "";
      statusEl.textContent = item.Status        || "";

      row.appendChild(codeEl);
      row.appendChild(statusEl);

      row.onclick = function () {
        document.querySelectorAll(".row").forEach(function (r) {
          r.classList.remove("selected");
        });
        row.classList.add("selected");
        selectedCode = item.StructureCode;
      };

      listEl.appendChild(row);
    });

  } catch (err) {
    listEl.innerHTML = "";
    const errEl = document.createElement("div");
    errEl.className   = "empty-msg";
    errEl.textContent = "목록 로드 실패: " + err.message;
    listEl.appendChild(errEl);
  }
}

// ── WorksDesk 이동 ────────────────────────────────────────────
// [FIX-D6] sessionStorage로 code 전달 — 다른 HTML과 방식 통일
//          URL 쿼리스트링도 병행 전달 → worksdesk.html 양쪽 지원
function goWorkDesk() {
  if (!selectedCode) {
    alert("Structure를 선택하세요.");
    return;
  }

  // sessionStorage 저장 (다른 페이지와 동일한 방식)
  sessionStorage.setItem("selectedStructureCode", selectedCode);

  // URL 파라미터 병행 전달 (worksdesk.html이 URLSearchParams 사용 시 호환)
  window.location.href = "worksdesk.html?code=" + encodeURIComponent(selectedCode);
}

// ── 페이지 이동 ───────────────────────────────────────────────
function goHome() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
