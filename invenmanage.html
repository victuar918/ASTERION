<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Stock Management</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
}
body{background:url('images/bg_all.jpg') center/cover no-repeat fixeddisplay:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
.ttl{width:360px;max-width:92vw;display:block;margin:14px auto 4px;flex-shrink:0}

/* NameKr 35% / 테이블 65% */
.content{flex:1;width:100%;max-width:400px;display:flex;flex-direction:column;min-height:0;padding:0 14px}
.zone-name{flex:3.5;display:flex;align-items:center;justify-content:center}
.nk-text{font-size:15px;color:rgba(220,188,128,.9);letter-spacing:1.5px;text-align:center}
.zone-table{flex:6.5;display:flex;flex-direction:column;min-height:0;overflow-y:auto}
.zone-table::-webkit-scrollbar{width:3px}
.zone-table::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

/* 헤더 */
.tbl-header{display:flex;gap:8px;align-items:center;justify-content:center;padding:4px 0;flex-shrink:0}
.hdr{font-size:10px;letter-spacing:1.2px;color:rgba(255,255,255,.45)}
.hdr-size{width:80px;text-align:center}
.hdr-u{width:28px}
.hdr-stock{width:80px;text-align:center}

/* 데이터 행 */
.tbl-row{display:flex;gap:8px;align-items:center;justify-content:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}

.size-select{width:80px;padding:7px 4px;text-align:center;background:rgba(0,0,0,.60);border:1px solid rgba(255,255,255,.18);border-radius:6px;color:#fff;font-size:13px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}
.size-select:focus{border-color:rgba(210,170,100,.65)}
.size-select.dup-warn{border-color:rgba(220,80,80,.8);background:rgba(60,0,0,.4)}

.unit{width:28px;font-size:11px;color:rgba(255,255,255,.45);text-align:left}

.stock-input{width:80px;padding:7px 6px;text-align:center;background:rgba(0,0,0,.60);border:1px solid rgba(255,255,255,.18);border-radius:6px;color:#fff;font-size:13px;outline:none}
.stock-input:focus{border-color:rgba(210,170,100,.65)}

.nav-bar{flex-shrink:0;width:100%;max-width:400px;display:flex;justify-content:space-around;align-items:center;padding:8px;background:transparent;border-top:none}
.nav-bar img{height:88px;object-fit:contain;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
</style>
</head>
<body>
<div class="app-wrap">
<img class="ttl" src="images/ttl_stockmanage.png" alt="Stock Management"/>
<div class="content">
  <div class="zone-name"><div class="nk-text" id="nk-text">—</div></div>
  <div class="zone-table">
    <div class="tbl-header">
      <span class="hdr hdr-size">Size</span><span class="hdr hdr-u"></span>
      <span class="hdr hdr-stock">Stock</span><span class="hdr hdr-u"></span>
    </div>
    <div id="rows-container"></div>
  </div>
</div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"   alt="Home"    id="b-home"/>
  <img src="images/btn_go_before.png" alt="Before"  id="b-back"/>
  <img src="images/btn_addsize.png"   alt="AddSize" id="b-add"/>
  <img src="images/btn_update.png"    alt="Update"  id="b-update"/>
</div>
<script>
"use strict";
var nk=null,allSizes=[];
document.addEventListener("DOMContentLoaded",async function(){
  nk=requireNameKr();if(!nk)return;
  document.getElementById("nk-text").textContent=nk;
  document.getElementById("b-home").onclick  =function(){clearAndGoFromInventory("index.html");};
  document.getElementById("b-back").onclick  =function(){clearAndGoFromInventory("inventory.html");};
  document.getElementById("b-add").onclick   =function(){addRow();};
  document.getElementById("b-update").onclick=onUpdate;
  showLoading("LOADING...");
  try{
    allSizes=await apiGetSizes();
    var inv=await apiGetStoneInventory(nk);
    hideLoading();
    var c=document.getElementById("rows-container");c.innerHTML="";
    if(inv&&inv.length){inv.forEach(function(r){addRow(r.size||r.Size,r.stock||r.Stock||0);});}
    else{addRow();}
  }catch(err){hideLoading();toastErr("로드 실패: "+err.message);addRow();}
});
function addRow(preSize,preStock){
  var c=document.getElementById("rows-container");
  var row=document.createElement("div");row.className="tbl-row";
  var sel=document.createElement("select");sel.className="size-select";
  var opt0=document.createElement("option");opt0.value="";opt0.textContent="—";sel.appendChild(opt0);
  allSizes.forEach(function(sz){var opt=document.createElement("option");opt.value=sz;opt.textContent=sz;if(sz===(preSize||""))opt.selected=true;sel.appendChild(opt);});
  sel.addEventListener("change",checkDups);
  var mm=document.createElement("span");mm.className="unit";mm.textContent="mm";
  var inp=document.createElement("input");inp.type="number";inp.className="stock-input";inp.min="0";inp.placeholder="0";
  if(preStock!==undefined&&preStock!==null)inp.value=preStock;
  var pcs=document.createElement("span");pcs.className="unit";pcs.textContent="pcs";
  row.appendChild(sel);row.appendChild(mm);row.appendChild(inp);row.appendChild(pcs);c.appendChild(row);
}
function checkDups(){
  var sels=document.querySelectorAll("#rows-container .size-select"),seen={};
  sels.forEach(function(s){if(s.value)seen[s.value]=(seen[s.value]||0)+1;});
  sels.forEach(function(s){if(s.value&&seen[s.value]>1)s.classList.add("dup-warn");else s.classList.remove("dup-warn");});
}
async function onUpdate(){
  var rows=document.querySelectorAll("#rows-container .tbl-row"),data=[],sset=new Set(),hasDup=false;
  rows.forEach(function(row){
    var sz=row.querySelector(".size-select").value;
    var st=parseInt(row.querySelector(".stock-input").value,10);
    if(!sz||isNaN(st)||st<0)return;
    if(sset.has(sz)){hasDup=true;return;}
    sset.add(sz);data.push({size:sz,stock:st});
  });
  if(hasDup){toastErr("중복된 Size가 있습니다");return;}
  if(!data.length){toastErr("Size와 Stock을 입력하세요");return;}
  showLoading("UPDATING...");
  try{await apiUpdateStock(nk,data);hideLoading();toastOk("업데이트 완료!");}
  catch(err){hideLoading();toastErr("실패: "+err.message);}
}
</script>
</div>
</body>
</html>
