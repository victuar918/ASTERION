<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Check Stock</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
}

/* ── 검색 바 ───────────────────────────────────── */
.search-bar{
  width:100%;
  max-width:480px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 16px;
  flex-shrink:0;
  margin-bottom:10px;
}
.search-label{
  font-size:12px;
  color:rgba(26,46,90,.7);
  white-space:nowrap;
  letter-spacing:.5px;
}
.search-input{
  width:72px;
  padding:8px 10px;
  text-align:center;
  background:rgba(255,255,255,.55);
  border:1px solid rgba(26,46,90,.2);
  border-radius:8px;
  color:#1a2e5a;
  font-size:15px;
  font-weight:600;
  outline:none;
  -moz-appearance:textfield;
}
.search-input::-webkit-outer-spin-button,
.search-input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
.search-input:focus{ border-color:rgba(26,46,90,.5); }
.search-btn{
  padding:8px 18px;
  background:rgba(26,46,90,.75);
  border:none;
  border-radius:8px;
  color:#fff;
  font-size:12px;
  letter-spacing:1.5px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
  flex-shrink:0;
}
.search-btn:active{ opacity:.7; }
.search-unit{
  font-size:12px;
  color:rgba(26,46,90,.6);
  white-space:nowrap;
}
.search-count{
  margin-left:auto;
  font-size:11px;
  color:rgba(26,46,90,.5);
  white-space:nowrap;
}

/* ── 스크롤 목록 ───────────────────────────────── */
.list-wrap{
  flex:1;
  width:100%;
  max-width:480px;
  overflow-y:auto;
  padding:0 16px;
  min-height:0;
  -webkit-overflow-scrolling:touch;
}
.list-wrap::-webkit-scrollbar{ width:3px; }
.list-wrap::-webkit-scrollbar-track{ background:transparent; }
.list-wrap::-webkit-scrollbar-thumb{ background:rgba(26,46,90,.2); border-radius:2px; }

/* 컬럼 헤더 */
.list-header{
  display:grid;
  grid-template-columns:1fr 72px 60px;
  gap:0;
  padding:8px 14px;
  margin-bottom:2px;
  border-bottom:1px solid rgba(26,46,90,.15);
}
.list-header span{
  font-size:10px;
  letter-spacing:1.5px;
  color:rgba(26,46,90,.45);
  font-weight:600;
}
.list-header span:not(:first-child){ text-align:center; }

/* 각 행 */
.stock-item{
  display:grid;
  grid-template-columns:1fr 72px 60px;
  gap:0;
  padding:13px 14px;
  border-radius:10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .12s;
  margin-bottom:2px;
  background:rgba(255,255,255,.0);
  border:1px solid transparent;
}
.stock-item:active{ background:rgba(26,46,90,.08); }
.stock-item.selected{
  background:rgba(26,46,90,.10);
  border-color:rgba(26,46,90,.2);
}
.item-name{
  font-size:14px;
  color:#1a2e5a;
  font-weight:500;
  letter-spacing:.3px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.item-size{
  font-size:13px;
  color:rgba(26,46,90,.6);
  text-align:center;
}
.item-stock{
  font-size:14px;
  font-weight:700;
  text-align:center;
}
/* 재고량 색상 */
.item-stock.lvl-danger { color:#c0392b; }  /* 0~4   */
.item-stock.lvl-warn   { color:#e67e22; }  /* 5~9   */
.item-stock.lvl-low    { color:#f39c12; }  /* 10~19 */
.item-stock.lvl-ok     { color:#27ae60; }  /* 20+   */

.empty-msg{
  text-align:center;
  padding:48px 0;
  color:rgba(26,46,90,.4);
  font-size:13px;
  letter-spacing:.5px;
}
</style>
</head>
<body>
<div class="app-wrap">
  <img class="ttl" src="images/ttl_stock.png" alt="Check Stock"/>

  <!-- 검색 바 -->
  <div class="search-bar">
    <span class="search-label">기준</span>
    <input class="search-input" id="threshold-input" type="number"
           min="1" max="9999" value="10"/>
    <span class="search-unit">개 미만</span>
    <button class="search-btn" id="btn-search">SEARCH</button>
    <span class="search-count" id="result-count"></span>
  </div>

  <!-- 컬럼 헤더 -->
  <div style="width:100%;max-width:480px;padding:0 16px;flex-shrink:0;">
    <div class="list-header">
      <span>원석명</span>
      <span>사이즈</span>
      <span>재고</span>
    </div>
  </div>

  <!-- 스크롤 목록 -->
  <div class="list-wrap" id="stock-list">
    <div class="empty-msg">SEARCH를 눌러 조회하세요</div>
  </div>

  <!-- 하단 버튼 -->
  <div class="nav-bar">
    <img src="images/btn_go_home.png"    alt="Home"       id="b-home"/>
    <img src="images/btn_management.png" alt="Management" id="b-manage"/>
  </div>
</div>

<script>
"use strict";

var selectedItem = null;  // { nameKr, size, stock }

document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("b-home").onclick   = function(){ location.href="index.html"; };
  document.getElementById("b-manage").onclick = onManage;
  document.getElementById("btn-search").onclick = onSearch;

  // 엔터키 검색
  document.getElementById("threshold-input").addEventListener("keydown", function(e){
    if(e.key === "Enter") onSearch();
  });
});

/* ── 검색 ──────────────────────────────────────── */
async function onSearch(){
  var threshold = parseInt(document.getElementById("threshold-input").value, 10);
  if(isNaN(threshold) || threshold < 1){
    toastErr("기준 수량을 올바르게 입력하세요.");
    return;
  }

  showLoading("LOADING...");
  selectedItem = null;

  try{
    var res = await apiPost({ action: A.GET_INVENTORY });
    hideLoading();

    if(!res || !res.matrix){
      toastErr("재고 데이터를 불러올 수 없습니다.");
      return;
    }

    // matrix { nameKr: { size: stock } } → flat list
    var rows = [];
    Object.keys(res.matrix).forEach(function(nameKr){
      Object.keys(res.matrix[nameKr]).forEach(function(size){
        var stock = Number(res.matrix[nameKr][size] || 0);
        if(stock < threshold){
          rows.push({ nameKr: nameKr, size: size, stock: stock });
        }
      });
    });

    // Stock 낮은 순 정렬
    rows.sort(function(a, b){ return a.stock - b.stock; });

    renderList(rows, threshold);

  }catch(err){
    hideLoading();
    toastErr("오류: " + err.message);
  }
}

/* ── 목록 렌더링 ───────────────────────────────── */
function renderList(rows, threshold){
  var list = document.getElementById("stock-list");
  var count = document.getElementById("result-count");

  count.textContent = rows.length + "개";

  if(!rows.length){
    list.innerHTML = '<div class="empty-msg">' + threshold + '개 미만 원석이 없습니다</div>';
    return;
  }

  list.innerHTML = rows.map(function(r, i){
    var lvl = r.stock <= 4  ? "lvl-danger" :
              r.stock <= 9  ? "lvl-warn"   :
              r.stock <= 19 ? "lvl-low"    : "lvl-ok";
    return '<div class="stock-item" data-idx="' + i + '">' +
      '<span class="item-name">' + esc(r.nameKr) + '</span>' +
      '<span class="item-size">' + esc(r.size)   + '</span>' +
      '<span class="item-stock ' + lvl + '">' + r.stock + '</span>' +
    '</div>';
  }).join("");

  // 선택 이벤트
  list.querySelectorAll(".stock-item").forEach(function(el, i){
    el.addEventListener("click", function(){
      list.querySelectorAll(".stock-item").forEach(function(e){ e.classList.remove("selected"); });
      el.classList.add("selected");
      selectedItem = rows[i];
    });
  });
}

/* ── Management 이동 ───────────────────────────── */
function onManage(){
  if(!selectedItem){
    toastErr("원석을 먼저 선택하세요.");
    return;
  }
  // NameKr 값을 유지하며 invenmanage.html로 이동
  goPageWithName("invenmanage.html", selectedItem.nameKr);
}

/* ── HTML 이스케이프 ───────────────────────────── */
function esc(s){
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
