<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works Desk</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:#2b1e08;
  background:linear-gradient(
    135deg,
    #fff6da 0%,
    #f5d97a 40%,
    #eac45a 70%,
    #d8ad3c 100%
  );
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 타이틀 */
.title-img{
  display:block;
  width:95%;
  max-width:1400px;
  margin:10px auto;
}

/* Structure 리스트 영역 */
.structure-list-container{
  flex:4; /* 화면 4/5 */
  overflow-y:auto;
  padding:10px 30px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  margin-bottom:5px;
  cursor:pointer;
  font-size:16px;
  border-radius:5px;
  transition:0.2s;
  background:rgba(255,255,255,0.15);
}

.row:hover{
  opacity:0.7;
}

.row.selected{
  background:rgba(255,255,255,0.35);
  font-weight:600;
}

.code{
  font-weight:600;
}

.status{
  opacity:0.8;
}

/* 하단 버튼 영역 */
.button-area{
  flex:1; /* 화면 1/5 */
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:15px;
  padding-bottom:15px;
}

.button-row{
  display:flex;
  justify-content:center;
  gap:20px;
}

.button-row img{
  width:60px; /* 기존 대비 30% 축소 */
  cursor:pointer;
  transition:0.2s;
}

.button-row img:hover{
  transform:scale(1.1);
}

</style>
</head>

<body>

<img src="images/ttl_worksdesk.png" class="title-img" alt="Works Desk">

<!-- Structure 리스트 -->
<div class="structure-list-container" id="structureList"></div>

<!-- 버튼 영역 -->
<div class="button-area">
  <div class="button-row">
    <img src="images/btn_stoneselect.png" alt="원석선택" onclick="goPage('selectstone.html')">
    <img src="images/btn_go_design.png" alt="디자인" onclick="goPage('design.html')">
    <img src="images/btn_analysis.png" alt="분석메모" onclick="goPage('analysismemo.html')">
  </div>
  <div class="button-row">
    <img src="images/btn_productimage.png" alt="제품이미지" onclick="goPage('productimage.html')">
    <img src="images/btn_booklet.png" alt="북릿" onclick="goPage('booklet.html')">
    <img src="images/btn_forwarding.png" alt="포워딩" onclick="goPage('forwarding.html')">
    <img src="images/btn_go_home.png" alt="홈" onclick="goHome()">
  </div>
</div>

<script>
// 상수
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxCuGnpk6WfSqQoGUUBUDe_Gc4exr95DNi-RuvDdmKJzXHPgIBB2j3m08Sf7roBPEThtA/exec";

// 선택된 StructureCode
let selectedCode = null;

// 화면 로드 시 Structure 리스트 불러오기
window.onload = function() {
  loadTasking();
};

// Structure 리스트 로드
async function loadTasking() {
  const listEl = document.getElementById("structureList");
  listEl.innerHTML = "<div style='opacity:0.6;'>불러오는 중...</div>";

  try {
    const res = await fetch(WEBAPP_URL + "?action=getTaskingList");
    if(!res.ok) throw new Error("HTTP " + res.status);

    const json = await res.json();
    if(!json.success) throw new Error(json.error || "목록을 불러오지 못했습니다.");

    const data = Array.isArray(json.data) ? json.data : [];
    listEl.innerHTML = "";

    const filtered = data.filter(item =>
      item.Status === "Tasking" ||
      item.Status === "Forwarding" ||
      item.Status === "A/S"
    );

    if(filtered.length === 0){
      listEl.innerHTML = "<div style='opacity:0.6;'>조회된 Structure가 없습니다.</div>";
      return;
    }

    filtered.forEach(item => {
      const row = document.createElement("div");
      row.className = "row";

      const codeEl = document.createElement("div");
      codeEl.className = "code";
      codeEl.textContent = item.StructureCode || "";

      const statusEl = document.createElement("div");
      statusEl.className = "status";
      statusEl.textContent = item.Status || "";

      row.appendChild(codeEl);
      row.appendChild(statusEl);

      row.onclick = function(){
        document.querySelectorAll(".row").forEach(r => r.classList.remove("selected"));
        row.classList.add("selected");
        selectedCode = item.StructureCode;
      };

      listEl.appendChild(row);
    });

  } catch(err) {
    listEl.innerHTML = "<div style='opacity:0.6;'>목록 로드 실패: " + err.message + "</div>";
  }
}

// 페이지 이동
function goPage(page){
  if(!selectedCode){
    alert("Structure를 선택하세요.");
    return;
  }
  sessionStorage.setItem("selectedStructureCode", selectedCode);
  window.location.href = page + "?code=" + encodeURIComponent(selectedCode);
}

function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
