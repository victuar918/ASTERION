<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ASTERION</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ASTERION"/>
<meta name="theme-color" content="#0a0807"/>
<link rel="apple-touch-icon" href="images/btn_icon.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:url('images/bg_home.jpg') center/cover no-repeat fixed;
  font-family:'Arial',sans-serif;color:#fff;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
}
#btn-row{
  width:100%;max-width:480px;
  display:flex;justify-content:space-around;align-items:flex-end;
  padding:0 12px 32px;gap:10px;
}
#btn-row img{
  flex:1;max-width:93px;height:auto;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity .15s;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));
}
#btn-row img:active{opacity:.7;transform:scale(.97)}
</style>
</head>
<body>
<div id="btn-row">
  <img src="images/btn_worksdesk.png"    alt="Structure Design" id="btn-wd"/>
  <img src="images/btn_go_index.png"     alt="Code Index"       id="btn-si"/>
  <img src="images/btn_go_inventory.png" alt="Inventory"        id="btn-inv"/>
</div>
<script>
document.getElementById("btn-wd").onclick  = function(){ location.href="worksdesk.html"; };
document.getElementById("btn-si").onclick  = function(){ location.href="structureindex.html"; };
document.getElementById("btn-inv").onclick = function(){ location.href="inventory.html"; };
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js")
      .then(function(reg){ console.log("[SW] 등록 완료:", reg.scope); })
      .catch(function(err){ console.warn("[SW] 등록 실패:", err); });
  });
}
</script>
</body>
</html>
