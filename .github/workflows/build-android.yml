name: Android APK Build

on:
  push:
    paths:
      - 'android/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: sherpa-onnx AAR 추출 (tar.bz2 → AAR)
        run: |
          mkdir -p android/app/libs
          echo "=== tar.bz2 다운로드 ==="
          wget -q --show-progress \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.10.31/sherpa-onnx-v1.10.31-android.tar.bz2" \
            -O /tmp/sherpa-onnx-android.tar.bz2
          echo "다운로드 완료: $(du -sh /tmp/sherpa-onnx-android.tar.bz2)"

          echo "=== 압축 해제 ==="
          mkdir -p /tmp/sherpa-extract
          tar -xjf /tmp/sherpa-onnx-android.tar.bz2 -C /tmp/sherpa-extract

          echo "=== AAR 파일 검색 ==="
          find /tmp/sherpa-extract -name "*.aar" | tee /tmp/aar_list.txt
          AAR_COUNT=$(wc -l < /tmp/aar_list.txt)
          echo "발견된 AAR: $AAR_COUNT개"

          if [ "$AAR_COUNT" -gt 0 ]; then
            # arm64-v8a 우선, 없으면 첫 번째
            AAR=$(grep "arm64" /tmp/aar_list.txt | head -1 || head -1 /tmp/aar_list.txt)
            cp "$AAR" android/app/libs/sherpa-onnx-android.aar
            echo "✅ 복사 완료: $AAR → android/app/libs/sherpa-onnx-android.aar"
          else
            echo "⚠ AAR 없음 — 디렉토리 구조:"
            find /tmp/sherpa-extract -type f | head -20
          fi

          ls -lh android/app/libs/

      - name: Gradle Wrapper 생성
        run: |
          cd android
          gradle wrapper --gradle-version 8.6

      - name: APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build_log.txt
          exit ${PIPESTATUS[0]}

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: asterion-video-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: 빌드 로그 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build_log.txt
          retention-days: 3
