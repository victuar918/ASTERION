<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ASTERION – Analysis &amp; Memo</title>
<script src="config.js"></script><script src="api_contract.js"></script>
<script src="state.js"></script><script src="api.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
  font-family:'Arial',sans-serif;color:#fff;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;overflow:hidden;
}
.ttl{width:240px;max-width:86vw;display:block;margin:12px auto 4px;flex-shrink:0}
.code-disp{font-size:12px;color:rgba(220,188,128,.85);letter-spacing:1.5px;text-align:center;padding:2px 0 5px;flex-shrink:0}
/* 두 구역 1:1 */
.content{flex:1;width:100%;max-width:480px;display:flex;flex-direction:column;min-height:0;padding:0 10px;gap:6px}
.zone{flex:1;display:flex;flex-direction:column;min-height:0}
.zone-label{font-size:11px;letter-spacing:1.2px;text-align:center;color:rgba(255,255,255,.65);padding:3px 0;flex-shrink:0}
.memo-area{
  flex:1;width:100%;min-height:0;
  background:rgba(0,0,0,0.40);
  border:1px solid rgba(255,255,255,.15);border-radius:10px;
  color:#fff;font-size:13px;line-height:1.65;padding:10px 12px;
  outline:none;resize:none;overflow-y:auto;
}
.memo-area::placeholder{color:rgba(255,255,255,.3)}
.memo-area:focus{border-color:rgba(210,170,100,.65)}
.st-msg{flex-shrink:0;font-size:12px;text-align:center;min-height:18px;padding:2px 0}
.st-err{color:rgba(220,80,80,.9)}.st-ok{color:rgba(100,220,130,.9)}
.nav-bar{flex-shrink:0;width:100%;max-width:480px;display:flex;justify-content:space-around;padding:6px 8px env(safe-area-inset-bottom,8px);background:rgba(5,4,2,.92);border-top:1px solid rgba(255,255,255,.07)}
.nav-bar img{height:44px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
.ld-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.ld-ov.show{display:flex}
.ld-txt{font-size:12px;letter-spacing:2.5px;color:rgba(220,188,128,1)}
</style>
</head>
<body>
<img class="ttl" src="images/ttl_analysisnmemo.png" alt="Analysis &amp; Memo"/>
<div class="code-disp" id="code-disp">—</div>
<div class="content">
  <!-- Memo: 추가 방식 -->
  <div class="zone">
    <div class="zone-label">Internal Memo</div>
    <textarea class="memo-area" id="memo-input" placeholder="메모를 입력하세요... (기존 내용에 추가됩니다)"></textarea>
  </div>
  <!-- Analysis: 덮어쓰기 -->
  <div class="zone">
    <div class="zone-label">Analysis</div>
    <textarea class="memo-area" id="analysis-input" placeholder="분석 내용을 입력하세요..."></textarea>
  </div>
</div>
<div class="st-msg" id="st-msg"></div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"      id="b-home"/>
  <img src="images/btn_go_before.png"    id="b-back"/>
  <img src="images/btn_save.png"         id="b-save"/>
  <img src="images/btn_productimage.png" id="b-next"/>
</div>
<div class="ld-ov" id="ld-ov"><div class="ld-txt">SAVING...</div></div>
<script>
"use strict";
var sc=null;
document.addEventListener("DOMContentLoaded", async function(){
  sc=requireStructureCode(); if(!sc) return;
  document.getElementById("code-disp").textContent=sc;
  document.getElementById("b-home").onclick=function(){ clearAndGo("index.html"); };
  document.getElementById("b-back").onclick=function(){ goPage("design.html",sc); };
  document.getElementById("b-save").onclick=onSave;
  document.getElementById("b-next").onclick=function(){ goPage("productimage.html",sc); };
  // 기존 값 로드
  await loadExisting();
});

async function loadExisting(){
  try {
    var item=await apiGetArchiveItem(sc);
    if(item){
      document.getElementById("analysis-input").value=item.analysis||item.Analysis||"";
      // Memo는 기존값 표시 (사용자가 추가 내용 입력)
      document.getElementById("memo-input").placeholder="기존 메모에 추가할 내용을 입력하세요...";
    }
  } catch(e){ /* 로드 실패는 무시 */ }
}

async function onSave(){
  var memo=document.getElementById("memo-input").value.trim();
  var analysis=document.getElementById("analysis-input").value.trim();
  setStatus("","");
  document.getElementById("ld-ov").classList.add("show");
  try {
    // Memo는 appendMemo (추가), Analysis는 updateAnalysisMemo (덮어쓰기)
    if(memo) await apiAppendMemo(sc, memo);
    await apiUpdateAnalysisMemo(sc, analysis, ""); // memo는 append로 처리
    document.getElementById("ld-ov").classList.remove("show");
    document.getElementById("memo-input").value="";
    setStatus("저장 완료!","ok");
    setTimeout(function(){ setStatus("",""); },2500);
  } catch(err){
    document.getElementById("ld-ov").classList.remove("show");
    setStatus("저장 실패: "+err.message,"err");
  }
}

function setStatus(msg,type){
  var el=document.getElementById("st-msg");
  el.textContent=msg;
  el.className="st-msg "+(type==="err"?"st-err":type==="ok"?"st-ok":"");
}
</script>
</body>
</html>
