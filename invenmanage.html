<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Manage</title>

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#fff6da 0%,#f5d97a 40%,#eac45a 70%,#d8ad3c 100%);
  min-height:100vh;
  color:#2b1e08;
  text-align:center;
}

/* 타이틀 */
.title-img{
  width:95%;
  margin-top:20px;
}

/* NameKr */
.stone-name{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}

/* 테이블 영역 */
.stock-container{
  margin-top:25px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* 헤더 */
.stock-header{
  display:flex;
  width:180px;
  justify-content:space-between;
  font-size:14px;
  font-weight:bold;
}

/* 한줄 */
.stock-row{
  display:flex;
  align-items:center;
  gap30px;
}

/* size select */
.size-select{
  width:60px;
  padding:6px;
  background:rgba(255,255,255,0.3);
  border:none;
  border-radius:6px;
  text-align:center;
}

/* stock input */
.stock-input{
  width:80px;
  padding:6px;
  background:rgba(255,255,255,0.3);
  border:none;
  border-radius:6px;
  text-align:center;
}

/* 단위 */
.unit{
  font-size:12px;
  opacity:0.8;
}

/* 하단 버튼 */
.bottom-nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
}

.bottom-nav img{
  width:60px;
  cursor:pointer;
}

</style>
</head>

<body>

<img src="images/ttl_stockmanage.png" class="title-img" alt="Stock Manage">

<div class="stone-name" id="stoneName"></div>

<div class="stock-container">
  <div class="stock-header">
    <div>Size</div>
    <div>Stock</div>
  </div>
  <div id="rows"></div>
</div>

<div class="bottom-nav">
  <img src="images/btn_go_home.png"   alt="홈"     onclick="goHome()">
  <img src="images/btn_go_before.png" alt="뒤로"   onclick="goBefore()">
  <img src="images/btn_addsize.png"   alt="행추가"  onclick="addSize()">
  <img src="images/btn_update.png"    alt="업데이트" onclick="updateStock()">
</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzeXem3llunyHu17IJHpKihy2MfrFVoqkYJPQE7YNcIZCYCXZTurOb1TFeAFP1KsedVeQ/exec";

const rowsDiv   = document.getElementById("rows");
const stoneNameEl = document.getElementById("stoneName");

// [FIX-C1] null 방어 — sessionStorage 미설정 시 빈 문자열로 처리
const selectedNameKr = sessionStorage.getItem("selectedNameKr") || "";

// sizeList는 window.onload 이후 채워짐
let sizeList = [];

// ── 초기 진입 검증 + 로드 ────────────────────────────────────
// [FIX-C14] stoneName 설정을 window.onload 안에서 처리
window.onload = async function () {

  // [FIX-C1] null·빈 값 진입 방어
  if (!selectedNameKr) {
    alert("원석 정보가 없습니다. 목록으로 돌아가세요.");
    window.location.href = "inventory.html";
    return;
  }

  stoneNameEl.textContent = selectedNameKr;

  // [FIX-C2][FIX-C3] try/catch로 두 로드 함수 오류 격리
  try {
    await loadSizeMaster();
  } catch (err) {
    alert("사이즈 목록 로드 실패: " + err.message);
    return;
  }

  try {
    await loadInventory();
  } catch (err) {
    alert("재고 로드 실패: " + err.message);
  }
};

// ── SizeMaster 로드 ──────────────────────────────────────────
// [FIX-C2]  try/catch 추가
// [FIX-C6]  doGet action: "getSizes" → Code.gs getSizes() 케이스 일치
async function loadSizeMaster() {
  const res = await fetch(WEBAPP_URL + "?action=getSizes");
  if (!res.ok) throw new Error("HTTP " + res.status);

  const data = await res.json();

  // [FIX-C4] 응답 구조 검증
  if (!data.success || !Array.isArray(data.sizes)) {
    throw new Error(data.error || "sizes 데이터 없음");
  }
  if (data.sizes.length === 0) {
    throw new Error("SizeMaster가 비어있습니다. 관리자에게 문의하세요.");
  }

  sizeList = data.sizes;
}

// ── 기존 Inventory 로드 ──────────────────────────────────────
// [FIX-C3]  try/catch 추가
// [FIX-C5]  encodeURIComponent로 한글 nameKr 인코딩
// [FIX-C6]  doGet action: "getStoneInventory" → Code.gs getStoneInventory() 케이스 일치
async function loadInventory() {
  const url = WEBAPP_URL
    + "?action=getStoneInventory"
    + "&nameKr=" + encodeURIComponent(selectedNameKr); // [FIX-C5]

  const res = await fetch(url);
  if (!res.ok) throw new Error("HTTP " + res.status);

  const data = await res.json();

  // [FIX-C4] 응답 구조 검증
  if (!data.success || !Array.isArray(data.inventory)) {
    throw new Error(data.error || "inventory 데이터 없음");
  }

  if (data.inventory.length === 0) {
    addRow(); // 기존 데이터 없으면 빈 행 1개 생성
    return;
  }

  data.inventory.forEach(function (item) {
    addRow(item.Size, item.Stock);
  });
}

// ── 행 생성 ─────────────────────────────────────────────────
// [FIX-C12] sizeList 빈 배열 시 안내 처리
function addRow(size, stock) {
  // [FIX-C12] sizeList 미로드 상태 방어
  if (!sizeList.length) {
    alert("사이즈 목록이 없습니다. 페이지를 새로고침하세요.");
    return;
  }

  const row = document.createElement("div");
  row.className = "stock-row";

  // size select
  const sizeSelect = document.createElement("select");
  sizeSelect.className = "size-select";

  sizeList.forEach(function (s) {
    const op = document.createElement("option");
    op.value       = s;
    op.textContent = s;
    if (s === String(size || "")) op.selected = true;
    sizeSelect.appendChild(op);
  });

  // stock input
  const stockInput = document.createElement("input");
  stockInput.type      = "number";
  stockInput.className = "stock-input";
  stockInput.min       = "0";          // [FIX-C13] 음수 입력 HTML 수준 차단
  stockInput.step      = "1";
  stockInput.value     = (stock !== undefined && stock !== "") ? stock : "";

  row.appendChild(sizeSelect);
  row.appendChild(createUnit("mm"));
  row.appendChild(stockInput);
  row.appendChild(createUnit("pcs"));

  rowsDiv.appendChild(row);
}

// ── 단위 span 생성 ────────────────────────────────────────────
function createUnit(text) {
  const div = document.createElement("div");
  div.className   = "unit";
  div.textContent = text;
  return div;
}

// ── 행 추가 버튼 ─────────────────────────────────────────────
// [FIX-C15] 동일 size 중복 추가 방지
function addSize() {
  if (!sizeList.length) {
    alert("사이즈 목록이 없습니다. 페이지를 새로고침하세요.");
    return;
  }

  // 현재 선택된 size 목록 수집
  const usedSizes = new Set(
    Array.from(document.querySelectorAll(".stock-row .size-select"))
      .map(function (sel) { return sel.value; })
  );

  // 아직 사용되지 않은 첫 번째 size로 행 추가
  const nextSize = sizeList.find(function (s) { return !usedSizes.has(s); });

  if (!nextSize) {
    alert("모든 사이즈가 이미 추가되었습니다.");
    return;
  }

  addRow(nextSize, "");
}

// ── Stock 업데이트 ────────────────────────────────────────────
// [FIX-C7]  action: "updateStock" (Code.gs doPost case와 일치)
// [FIX-C8]  payload 구조를 Code.gs updateStock(input) 형식으로 변환
//           input = { "NameKr": { "Size": qty, ... } }
// [FIX-C9]  try/catch 추가
// [FIX-C10] Content-Type: application/json 헤더 추가
// [FIX-C11] 응답 data.success 확인 후 alert
// [FIX-C13] 음수 stock 클라이언트 추가 검증
async function updateStock() {
  const rows = document.querySelectorAll(".stock-row");
  if (!rows.length) {
    alert("업데이트할 항목이 없습니다.");
    return;
  }

  // [FIX-C8] Code.gs updateStock이 기대하는 중첩 객체 구조로 변환
  // { "자수정": { "8mm": 10, "10mm": 5 } }
  const stockMap = {};

  let hasError = false;
  rows.forEach(function (row) {
    const size  = row.querySelector("select").value;
    const rawVal = row.querySelector("input").value;

    // stock이 비어있는 행은 건너뜀
    if (rawVal === "") return;

    const qty = Number(rawVal);

    // [FIX-C13] 음수·소수·NaN 클라이언트 검증
    if (isNaN(qty) || qty < 0 || !Number.isInteger(qty)) {
      alert("유효하지 않은 수량입니다: " + rawVal + " (" + size + ")");
      hasError = true;
      return;
    }

    if (!stockMap[selectedNameKr]) {
      stockMap[selectedNameKr] = {};
    }
    stockMap[selectedNameKr][size] = qty;
  });

  if (hasError) return;

  if (!Object.keys(stockMap).length) {
    alert("수량을 입력하세요.");
    return;
  }

  try {
    // [FIX-C10] Content-Type 헤더 추가
    const res = await fetch(WEBAPP_URL, {
      method : "POST",
      headers: { "Content-Type": "application/json" },
      body   : JSON.stringify({
        action: "updateStock",  // [FIX-C7] 올바른 action명
        data  : stockMap,       // [FIX-C8] 올바른 payload 구조
      }),
    });

    if (!res.ok) throw new Error("서버 응답 오류: HTTP " + res.status);

    const data = await res.json();

    // [FIX-C11] 서버 응답 결과 확인
    if (data.success) {
      alert("Stock Updated");
    } else {
      alert("업데이트 실패: " + (data.error || "알 수 없는 오류"));
    }

  } catch (err) {
    // [FIX-C9] 네트워크/JSON 오류 표시
    alert("업데이트 오류: " + err.message);
  }
}

// ── 페이지 이동 ───────────────────────────────────────────────
function goHome()   { window.location.href = "index.html"; }
function goBefore() { window.location.href = "inventory.html"; }

</script>

</body>
</html>
