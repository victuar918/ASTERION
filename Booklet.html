<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>ASTERION – Booklet</title>
  <script src="config.js"></script>
  <script src="api_contract.js"></script>
  <script src="state.js"></script>
  <script src="api.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:url('bg_main.png') center/cover no-repeat fixed;
      font-family:'Arial',sans-serif;color:#fff;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      padding:14px 14px 100px;
    }
    #title-img{width:260px;max-width:88vw;margin:12px auto 6px;display:block}
    #code-display{font-size:12px;color:rgba(220,188,128,.8);letter-spacing:1px;text-align:center;margin-bottom:14px}

    .panel{
      width:100%;max-width:480px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:12px;padding:14px;margin-bottom:12px;
    }
    .panel-label{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.38);margin-bottom:10px}

    /* 제품 이미지 */
    #product-img-wrap{
      width:100%;max-width:480px;
      aspect-ratio:1/1; max-height:320px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:12px; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:12px;
    }
    #product-img{width:100%;height:100%;object-fit:cover;display:none}
    .no-img-text{font-size:12px;color:rgba(255,255,255,.25)}

    /* Layout 텍스트 */
    #layout-text{
      font-size:12px;color:rgba(255,255,255,.75);
      line-height:1.85;white-space:pre-wrap;word-break:break-all;
      min-height:20px;
    }

    /* Analysis / Memo */
    .text-block{
      font-size:13px;color:rgba(255,255,255,.75);
      line-height:1.7;white-space:pre-wrap;min-height:18px;
    }

    /* 상태 배지 */
    .status-badge{
      display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:bold;
    }
    .st-Pending   {background:rgba(150,150,150,.35);color:#ccc}
    .st-Approved  {background:rgba(60,160,90,.4);color:#9ef5b0}
    .st-Rejected  {background:rgba(200,60,60,.4);color:#ffaaaa}
    .st-Archived  {background:rgba(100,80,50,.4);color:#d4b97a}
    .st-Tasking   {background:rgba(60,120,200,.4);color:#a0c4ff}
    .st-Forwarding{background:rgba(160,80,200,.4);color:#d9aaff}
    .st-AS        {background:rgba(200,130,50,.4);color:#ffd59a}

    #status-msg{font-size:12px;text-align:center;min-height:18px;margin-bottom:4px;width:100%;max-width:480px}
    .err-msg{color:rgba(220,80,80,.9)}

    #nav-bar{
      position:fixed;bottom:0;left:0;right:0;
      display:flex;justify-content:space-around;align-items:center;
      padding:8px 10px env(safe-area-inset-bottom,10px);
      background:rgba(8,6,4,.88);border-top:1px solid rgba(255,255,255,0.07);z-index:50;
    }
    #nav-bar img{height:42px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
    #nav-bar img:active{opacity:.65}
  </style>
</head>
<body>
  <img id="title-img" src="ttl_booklet.png" alt="Booklet"/>
  <div id="code-display">—</div>

  <!-- 제품 이미지 -->
  <div id="product-img-wrap">
    <img id="product-img" src="" alt="Product"/>
    <div class="no-img-text" id="no-img-hint">이미지 없음</div>
  </div>

  <!-- Status -->
  <div class="panel">
    <div class="panel-label">Status</div>
    <span id="status-badge" class="status-badge">—</span>
  </div>

  <!-- Layout Summary -->
  <div class="panel">
    <div class="panel-label">Layout for PDF</div>
    <div id="layout-text">—</div>
  </div>

  <!-- Analysis -->
  <div class="panel">
    <div class="panel-label">Analysis</div>
    <div id="analysis-text" class="text-block">—</div>
  </div>

  <!-- Memo -->
  <div class="panel">
    <div class="panel-label">Memo</div>
    <div id="memo-text" class="text-block">—</div>
  </div>

  <div id="status-msg"></div>

  <div id="nav-bar">
    <img src="btn_go_home.png"    alt="Home"   id="btn-home"/>
    <img src="btn_go_before.png"  alt="Before" id="btn-before"/>
    <img src="btn_reload.png"     alt="Reload" id="btn-reload"/>
  </div>

  <script>
  "use strict";
  var structureCode = null;

  document.addEventListener("DOMContentLoaded", async function(){
    structureCode = requireStructureCode();
    if (!structureCode) return;
    document.getElementById("code-display").textContent = structureCode;

    document.getElementById("btn-home").addEventListener("click", function(){ window.location.href = "index.html"; });
    document.getElementById("btn-before").addEventListener("click", function(){ goPage("productimage.html"); });
    document.getElementById("btn-reload").addEventListener("click", loadBooklet);

    await loadBooklet();
  });

  async function loadBooklet(){
    setStatus("Loading...");
    try {
      // getTaskingList에서 해당 code 데이터 추출
      var list = await apiGetTaskingList();
      var item = null;
      for (var i=0; i<list.length; i++){
        var sc = list[i].structureCode || list[i].StructureCode || "";
        if (sc.toLowerCase() === structureCode.toLowerCase()){ item = list[i]; break; }
      }
      setStatus("");

      if (!item){ setStatus("데이터 없음"); return; }

      // Status
      var st     = item.status || item.Status || "—";
      var badge  = document.getElementById("status-badge");
      badge.textContent = st;
      badge.className   = "status-badge st-" + st.replace("/","");

      // LayoutSummary (Archive에서 직접 가져오기)
      // getTaskingList에 포함되어 있을 수 있음, 없으면 별도 조회
      var layout   = item.layoutSummary   || item.LayoutSummary   || "";
      var analysis = item.analysis        || item.Analysis        || "";
      var memo     = item.memo            || item.Memo            || "";
      var imgUrl   = item.productImage    || item.ProductImage    || "";

      document.getElementById("layout-text").textContent   = layout   || "—";
      document.getElementById("analysis-text").textContent = analysis || "—";
      document.getElementById("memo-text").textContent     = memo     || "—";

      // 제품 이미지
      if (imgUrl){
        var img = document.getElementById("product-img");
        img.src           = imgUrl;
        img.style.display = "block";
        document.getElementById("no-img-hint").style.display = "none";
      }

    } catch(err){
      setStatus("로드 실패: " + err.message);
      console.error("[booklet]", err);
    }
  }

  function setStatus(msg){
    document.getElementById("status-msg").textContent = msg;
    document.getElementById("status-msg").className = msg ? "err-msg" : "";
  }
  </script>
</body>
</html>
