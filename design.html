<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Structure Design</title>

<script src="config.js"></script>
<script src="state.js"></script>
<script src="api.js"></script>

<style>

body{
margin:0;
height:100vh;

background:url("images/bg_sub.jpg");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
align-items:center;

font-family:sans-serif;
color:white;
}

/* Title */

#title-img{
width:260px;
margin-top:10px;
}

/* Main Layout */

#main-area{

flex:1;

width:90%;
max-width:420px;

display:flex;
flex-direction:column;

}

/* Selected List */

#used-panel{

flex:4;

overflow-y:auto;

background:transparent;

}

/* Stone Row */

.stone-row{

margin-bottom:6px;

}

.stone-name{

display:inline-block;

width:90px;

}

.size-btn{

margin:2px;

padding:4px 8px;

background:rgba(255,255,255,0.15);

border-radius:4px;

cursor:pointer;

}

/* Details */

#details-panel{

flex:3;

display:flex;

flex-wrap:wrap;

align-items:center;

gap:5px;

}

/* Insert button */

.insert-btn{

width:28px;
height:28px;

border:1px dashed white;

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

}

/* Item */

.detail-item{

background:rgba(150,110,60,0.5);

padding:5px 8px;

border-radius:6px;

cursor:pointer;

}

/* Total */

#total-panel{

flex:1;

display:flex;

align-items:center;

justify-content:center;

font-weight:bold;

}

/* Layout */

#layout-panel{

flex:2;

overflow-y:auto;

}

/* Bottom Buttons */

#nav-bar{

display:flex;

justify-content:space-around;

width:100%;

padding:10px;

}

#nav-bar img{

width:70px;

cursor:pointer;

}

</style>

</head>


<body>

<img id="title-img" src="images/ttl_structuredesign.png">


<div id="main-area">

<div id="used-panel"></div>

<div id="details-panel"></div>

<div id="total-panel">Total Size 0mm</div>

<div id="layout-panel"></div>

</div>


<div id="nav-bar">

<img src="images/btn_go_home.png" onclick="location.href='index.html'">

<img src="images/btn_go_before.png" onclick="goPage('selectstone.html')">

<img src="images/btn_save.png" id="btn-save">

<img src="images/btn_analysis.png" onclick="goPage('analysismemo.html')">

</div>


<script src="design.js"></script>

</body>
</html>
