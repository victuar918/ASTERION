<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Manage</title>

<!-- ▼ 공통 JS -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
  min-height: 100vh;
  color: #2b1e08;
  text-align: center;
}

.title-img { width: 95%; margin-top: 20px; }
.stone-name {
  margin-top: 40px;
  font-size: 20px;
  font-weight: bold;
}

.stock-container {
  margin-top: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  padding-bottom: 100px;
}

.stock-header {
  display: flex;
  width: 200px;
  justify-content: space-between;
  font-size: 14px;
  font-weight: bold;
}

.stock-row {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 10px 0;
}

.size-select {
  width: 60px;
  padding: 6px;
  background: rgba(255,255,255,0.3);
  border: none;
  border-radius: 6px;
  text-align: center;
}

.stock-input {
  width: 80px;
  padding: 6px;
  background: rgba(255,255,255,0.3);
  border: none;
  border-radius: 6px;
  text-align: center;
}

.unit { font-size: 12px; opacity: 0.8; }

.bottom-nav {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 14px;
}

.bottom-nav img { width: 60px; cursor: pointer; transition: transform 0.15s; }
.bottom-nav img:hover { transform: scale(1.1); }
</style>
</head>

<body>

<img src="images/ttl_stockmanage.png" class="title-img" alt="Stock Manage">

<div class="stone-name" id="stoneName"></div>

<div class="stock-container">
  <div class="stock-header">
    <div>Size</div>
    <div>Stock</div>
  </div>
  <div id="rows"></div>
</div>

<div class="bottom-nav">
  <img src="images/btn_go_home.png"   alt="홈"      onclick="goHome()">
  <img src="images/btn_go_before.png" alt="뒤로"    onclick="goBefore()">
  <img src="images/btn_addsize.png"   alt="행추가"  onclick="addSize()">
  <img src="images/btn_update.png"    alt="업데이트" onclick="updateStock()">
</div>

<script>
// ── 초기화 ─────────────────────────────────────────────────────
// state.js getSelectedStone()으로 원석 정보 읽기
const stone = getSelectedStone();
const selectedNameKr = stone.nameKr;

let sizeList = [];

window.onload = async function () {
  if (!selectedNameKr) {
    alert("원석 정보가 없습니다. 목록으로 돌아가세요.");
    location.href = "inventory.html";
    return;
  }

  document.getElementById("stoneName").textContent = selectedNameKr;

  try {
    showLoading("사이즈 목록 불러오는 중...");
    await loadSizeMaster();
  } catch (err) {
    hideLoading();
    alert("사이즈 목록 로드 실패: " + err.message);
    return;
  }

  try {
    showLoading("재고 불러오는 중...");
    await loadInventory();
  } catch (err) {
    alert("재고 로드 실패: " + err.message);
  } finally {
    hideLoading();
  }
};

// ── SizeMaster 로드 ──────────────────────────────────────────
async function loadSizeMaster() {
  // api.js apiGet — URLSearchParams가 encodeURIComponent 자동 처리
  const data = await apiGet("getSizes");
  if (!data.success || !Array.isArray(data.sizes) || !data.sizes.length) {
    throw new Error(data.error || "SizeMaster가 비어있습니다.");
  }
  sizeList = data.sizes;
}

// ── Inventory 로드 ────────────────────────────────────────────
async function loadInventory() {
  // api.js apiGet params → URLSearchParams 자동 인코딩
  const data = await apiGet("getStoneInventory", { nameKr: selectedNameKr });
  if (!data.success || !Array.isArray(data.inventory)) {
    throw new Error(data.error || "inventory 데이터 없음");
  }

  const rowsDiv = document.getElementById("rows");
  rowsDiv.innerHTML = "";

  if (!data.inventory.length) {
    addRow(); // 최초 등록 시 빈 행 1개
    return;
  }

  data.inventory.forEach(function (item) {
    addRow(item.Size, item.Stock);
  });
}

// ── 행 생성 ──────────────────────────────────────────────────
function addRow(size, stock) {
  if (!sizeList.length) {
    alert("사이즈 목록이 없습니다. 페이지를 새로고침하세요.");
    return;
  }

  const row = document.createElement("div");
  row.className = "stock-row";

  const sel = document.createElement("select");
  sel.className = "size-select";
  sizeList.forEach(function (s) {
    const op = document.createElement("option");
    op.value = op.textContent = s;
    if (s === String(size || "")) op.selected = true;
    sel.appendChild(op);
  });

  const inp = document.createElement("input");
  inp.type      = "number";
  inp.className = "stock-input";
  inp.min       = "0";
  inp.step      = "1";
  inp.value     = (stock !== undefined && stock !== "") ? stock : "";

  row.appendChild(sel);
  row.appendChild(makeUnit("mm"));
  row.appendChild(inp);
  row.appendChild(makeUnit("pcs"));

  document.getElementById("rows").appendChild(row);
}

function makeUnit(text) {
  const d = document.createElement("div");
  d.className = "unit";
  d.textContent = text;
  return d;
}

// ── 행 추가 ──────────────────────────────────────────────────
function addSize() {
  if (!sizeList.length) { alert("사이즈 목록이 없습니다."); return; }

  const used = new Set(
    Array.from(document.querySelectorAll(".stock-row select"))
      .map(function (el) { return el.value; })
  );
  const next = sizeList.find(function (s) { return !used.has(s); });

  if (!next) { alert("모든 사이즈가 이미 추가되었습니다."); return; }
  addRow(next, "");
}

// ── Stock 업데이트 ────────────────────────────────────────────
async function updateStock() {
  const rows = document.querySelectorAll(".stock-row");
  if (!rows.length) { alert("업데이트할 항목이 없습니다."); return; }

  const stockMap = {};
  let hasError = false;

  rows.forEach(function (row) {
    const size   = row.querySelector("select").value;
    const rawVal = row.querySelector("input").value;
    if (rawVal === "") return;

    const qty = Number(rawVal);
    if (isNaN(qty) || qty < 0 || !Number.isInteger(qty)) {
      alert("유효하지 않은 수량: " + rawVal + " (" + size + ")");
      hasError = true;
      return;
    }

    if (!stockMap[selectedNameKr]) stockMap[selectedNameKr] = {};
    stockMap[selectedNameKr][size] = qty;
  });

  if (hasError) return;
  if (!Object.keys(stockMap).length) { alert("수량을 입력하세요."); return; }

  try {
    showLoading("재고 업데이트 중...");
    // api.js apiPost → Content-Type: text/plain (CORS Simple Request)
    const data = await apiPost({ action: "updateStock", data: stockMap });
    if (data.success) {
      alert("Stock Updated ✓");
      // 화면 갱신 (서버 저장값 재표시)
      await loadInventory();
    } else {
      alert("업데이트 실패: " + (data.error || "알 수 없는 오류"));
    }
  } catch (err) {
    alert("업데이트 오류: " + err.message);
  } finally {
    hideLoading();
  }
}

// goBefore 재정의 (ui.js 기본값 history.back() 유지해도 되지만 명시)
function goBefore() { location.href = "inventory.html"; }
</script>

</body>
</html>
