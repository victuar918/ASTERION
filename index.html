<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION</title>
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ASTERION"/>
<meta name="theme-color" content="#0a0807"/>
<link rel="apple-touch-icon" href="images/btn_icon.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:url('images/bg_home.jpg') center/cover no-repeat fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  min-height:100vh;
}
#btn-wrap{
  width:100%;
  max-width:480px;
  padding:0 28px 20% 28px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
/* 모든 버튼 행 공통: 간격과 배치 통일 */
.btn-row{
  display:flex;
  justify-content:center;
  gap:16px;
}
/* 2개 행 — 1행: 70% 너비 사용 */
.btn-row.two img{
  width:calc((100% - 16px) * 0.35);
  height:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s,transform .15s;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.55));
}
/* 3개 행 — 2행: 동일 사이즈, 간격만 조정 */
.btn-row.three img{
  width:calc((100% - 16px) * 0.35);
  height:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s,transform .15s;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.55));
}
.btn-row img:active{opacity:.7;transform:scale(.95)}
</style>
</head>
<body>
<div id="btn-wrap">
  <!-- 1행: 2개 -->
  <div class="btn-row two">
    <img src="images/btn_worksdesk.png"    alt="Works Desk"       id="btn-wd"/>
    <img src="images/btn_go_index.png"     alt="Index"            id="btn-si"/>
  </div>
  <!-- 2행: 3개 (동일 사이즈) -->
  <div class="btn-row three">
    <img src="images/btn_go_inventory.png" alt="Inventory"        id="btn-inv"/>
    <img src="images/btn_neworder.png"     alt="New Registration" id="btn-no"/>
    <img src="images/btn_stock.png"        alt="Stock"            id="btn-st"/>
  </div>
</div>
<script>
document.getElementById("btn-wd").onclick  = function(){ location.href="worksdesk.html"; };
document.getElementById("btn-si").onclick  = function(){ location.href="structureindex.html"; };
document.getElementById("btn-inv").onclick = function(){ location.href="inventory.html"; };
document.getElementById("btn-no").onclick  = function(){ location.href="neworder.html"; };
document.getElementById("btn-st").onclick  = function(){ location.href="checkstock.html"; };
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){ reg.update(); });
    });
    navigator.serviceWorker.register("sw.js")
      .then(function(reg){ console.log("[SW] 등록:",reg.scope); })
      .catch(function(err){ console.warn("[SW] 실패:",err); });
  });
}
</script>
</body>
</html>
