<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Works Desk</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
}
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
  font-family:'Arial',sans-serif;color:#fff;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;overflow:hidden;
}
.ttl{width:360px;max-width:92vw;display:block;margin:14px auto 8px;flex-shrink:0}

/*
 * 목록창: 타이틀 이미지 바로 아래 ~ 하단 버튼 바로 위
 * flex:1 로 남은 공간을 모두 차지, 내부 스크롤
 */
#list-wrap{
  flex:1;width:100%;max-width:480px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 0 4px;
  position:relative;   /* empty-msg 절대 위치용 */
}
#list-wrap::-webkit-scrollbar{width:3px}
#list-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15)}

.work-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  cursor:pointer;transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
/* 선택 시 투명도 60% (rgba 0.60) */
.work-row.selected{background:rgba(255,255,255,0.60)}
.work-row:active{background:rgba(255,255,255,0.15)}

.work-code{font-size:14px;font-weight:600;letter-spacing:.5px;color:#1a2e5a}
.work-status{
  font-size:10px;padding:3px 10px;border-radius:10px;font-weight:bold;letter-spacing:.5px;
}
.st-Tasking   {background:rgba(60,120,200,.4);color:#a0c4ff}
.st-AS        {background:rgba(200,130,50,.4);color:#ffd59a}
.st-Forwarding{background:rgba(160,80,200,.4);color:#d9aaff}

.empty-msg{
  text-align:center;padding:40px 16px;
  font-size:13px;color:rgba(255,255,255,.3);
  display:none;   /* JS로 제어 */
}
.err-msg{color:rgba(220,80,80,.8)!important}

/*
 * 하단 네비: 버튼 7개 → 4 + 3 두 줄
 * 1열: Home / Stone Select / Design / Analysis&Memo
 * 2열: Product Image / Booklet / Forwarding
 */
.nav-bar{
  width:100%;max-width:480px;flex-shrink:0;
  display:grid;grid-template-columns:repeat(4,1fr);gap:2px;
  padding:8px 4px;
  background:transparent;border-top:none;
}
.nav-bar .row2{
  grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
}
.nav-bar img,.nav-bar .row2 img{
  width:100%;height:88px;object-fit:contain;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;
}
.nav-bar img:active,.nav-bar .row2 img:active{opacity:.6}
</style>
</head>
<body>
<div class="app-wrap">
<img class="ttl" src="images/ttl_worksdesk.png" alt="Works Desk"/>

<div id="list-wrap">
  <div class="empty-msg" id="empty">Loading...</div>
</div>

<div class="nav-bar">
  <!-- 1열 4개 -->
  <img src="images/btn_go_home.png"     alt="Home"     id="b-home"/>
  <img src="images/btn_stoneselect.png" alt="Select"   id="b-sel"/>
  <img src="images/btn_design.png"   alt="Design"   id="b-des"/>
  <img src="images/btn_analysis.png"    alt="Analysis" id="b-ana"/>
  <!-- 2열 3개 -->
  <div class="row2">
    <img src="images/btn_productimage.png" alt="Product" id="b-pro"/>
    <img src="images/btn_booklet.png"      alt="Booklet" id="b-bkl"/>
    <img src="images/btn_forwarding.png"   alt="Forward" id="b-fwd"/>
  </div>
</div>

<script>
"use strict";
var selCode = null;

document.addEventListener("DOMContentLoaded", async function(){
  /* 네비 이벤트 */
  document.getElementById("b-home").onclick = function(){ clearAndGo("index.html"); };

  /* StructureCode 미선택 시 경고 후 차단 공통 함수 */
  function requireSel(page){
    if(!selCode){ toastErr("StructureCode를 먼저 선택하세요"); return; }
    setStructureCode(selCode);
    goPage(page, selCode);
  }
  document.getElementById("b-sel").onclick = function(){ requireSel("selectstone.html"); };
  document.getElementById("b-des").onclick = function(){ requireSel("design.html"); };
  document.getElementById("b-ana").onclick = function(){ requireSel("analysismemo.html"); };
  document.getElementById("b-pro").onclick = function(){ requireSel("productimage.html"); };
  document.getElementById("b-bkl").onclick = function(){ requireSel("booklet.html"); };
  document.getElementById("b-fwd").onclick = function(){ requireSel("forwarding.html"); };

  await loadList();
});

async function loadList(){
  var el   = document.getElementById("empty");
  var wrap = document.getElementById("list-wrap");

  /* [FIX] 재호출 시 이전 목록 중복 방지 */
  wrap.querySelectorAll(".work-row").forEach(function(r){ r.remove(); });
  selCode = null;       /* 선택 상태 초기화 */

  el.textContent = "Loading...";
  el.className   = "empty-msg";
  el.style.display = "block";

  try {
    var data = await apiGetTaskingList();

    /* Tasking / A/S / Forwarding 만 표시 */
    var filtered = data.filter(function(d){
      var s = String(d.status || d.Status || "");
      return s === STATUS.TASKING || s === STATUS.AS || s === STATUS.FORWARDING;
    });

    if(!filtered.length){
      el.textContent   = "작업 대기 중인 항목이 없습니다";
      el.style.display = "block";
      return;
    }

    el.style.display = "none";

    filtered.forEach(function(item){
      var code = String(item.structureCode || item.StructureCode || "");
      var st   = String(item.status        || item.Status        || "");
      var row  = document.createElement("div");
      row.className = "work-row";
      row.setAttribute("data-code", code);
      row.innerHTML =
        '<span class="work-code">' + esc(code) + '</span>' +
        '<span class="work-status st-' + esc(st.replace("/","")) + '">' + esc(st) + '</span>';

      row.addEventListener("click", function(){
        if(selCode === code){
          /* 같은 행 재클릭 → 선택 해제 */
          selCode = null;
          row.classList.remove("selected");
        } else {
          /* 다른 행 선택 */
          wrap.querySelectorAll(".work-row.selected").forEach(function(r){ r.classList.remove("selected"); });
          selCode = code;
          row.classList.add("selected");
        }
      });

      wrap.appendChild(row);
    });

  } catch(err){
    el.textContent   = "목록 로드 실패: " + err.message;
    el.className     = "empty-msg err-msg";
    el.style.display = "block";
  }
}
</script>
</div>
</body>
</html>
