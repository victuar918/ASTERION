<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure Design</title>

<!-- ▼ 공통 JS -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/layoutFormatter.js"></script>
<script src="js/design.js" defer></script>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#fff6da 0%,#f5d97a 40%,#eac45a 70%,#d8ad3c 100%);
  min-height: 100vh;
  color: #2b1e08;
  padding: 16px 12px 90px;
}

/* 상단 타이틀 */
#titleContainer {
  text-align: center;
  margin-bottom: 12px;
}
#titleContainer img { max-width: 180px; }

/* StructureCode 값만 중앙정렬 */
#structureCodeDisplay {
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 12px;
}

/* 원석 + Size 버튼 행 */
#stoneSelector {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}
#stoneSelector div { display: flex; align-items: center; gap: 6px; }
.stone-name { font-weight: 600; min-width: 90px; }
.size-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  background: #f5c542;
  font-weight: bold;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.size-btn:hover { opacity: 0.72; }

/* Details 영역 */
#detailsContainer {
  min-height: 50px;
  padding: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 8px;
  line-height: 2.2;
  margin-bottom: 12px;
}
.plus-btn, .detail-btn {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 5px;
  cursor: pointer;
  margin: 0 2px;
  font-size: 13px;
}
.plus-btn {
  border: 2px dashed #bbb;
  background: transparent;
  color: #888;
  font-weight: bold;
}
.plus-btn.active-plus {
  border-color: #d8ad3c;
  background: rgba(248,197,66,0.25);
  color: #2b1e08;
}
.detail-btn {
  border: none;
  background: rgba(255,255,255,0.65);
}
.detail-btn:hover { opacity: 0.6; }

/* Total / Layout */
#totalSize { font-weight: bold; margin-bottom: 8px; }
#layoutSummaryContainer {
  padding: 6px 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 6px;
  font-size: 13px;
  word-break: break-all;
  min-height: 32px;
}
#layoutSummaryContainer strong { display: block; margin-bottom: 4px; }

/* 하단 버튼 */
.bottom {
  position: fixed;
  bottom: 16px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 14px;
}
.bottom img {
  width: 50px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.bottom img:hover { opacity: 0.75; }
</style>
</head>

<body>

<!-- 타이틀 -->
<div id="titleContainer">
  <img src="images/ttl_structuredesign.png" alt="Structure Design">
</div>

<!-- StructureCode 값만 중앙 표시 -->
<div id="structureCodeDisplay"></div>

<!-- 원석 + Size 버튼 행 -->
<div id="stoneSelector"></div>

<!-- Details 영역 -->
<div id="detailsContainer"></div>

<!-- Total Size -->
<div id="totalSize">Total Size 0mm</div>

<!-- Layout Summary -->
<div id="layoutSummaryContainer">
  <strong>Layout:</strong>
  <span id="layoutSummary"></span>
</div>

<!-- 하단 버튼 -->
<div class="bottom">
  <img src="images/btn_go_home.png"   alt="홈"    onclick="goHome()">
  <img src="images/btn_go_before.png" alt="뒤로"  onclick="goBeforeDesign()">
  <img src="images/btn_analysis.png"  alt="Next"  onclick="goNextDesign()">
  <img src="images/btn_save.png"      alt="Save"  onclick="saveDesign()">
</div>

</body>
</html>
