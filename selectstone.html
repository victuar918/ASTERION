<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Gemstone Select</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
}
body{background:url('images/bg_all.jpg') center/cover no-repeat fixeddisplay:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
.ttl{width:360px;max-width:92vw;display:block;margin:14px auto 6px;flex-shrink:0}
.code-disp{font-size:13px;letter-spacing:1.5px;text-align:center;color:rgba(220,188,128,.9);padding:4px 0 6px;flex-shrink:0}
.panes{flex:1;width:100%;max-width:480px;display:flex;flex-direction:column;gap:4px;padding:0 10px;min-height:0}
.pane-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.pane-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);padding:2px 4px;flex-shrink:0}
.pane-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;background:rgba(255,255,255,.10);border-radius:8px}
.pane-sel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;background:transparent}
.pane-list::-webkit-scrollbar,.pane-sel::-webkit-scrollbar{width:3px}
.pane-list::-webkit-scrollbar-thumb,.pane-sel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
.stone-row{padding:12px 16px;font-size:14px;text-align:center;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.07);transition:background .15s;-webkit-tap-highlight-color:transparent}
.stone-row:active{background:rgba(255,255,255,.15)}
.empty-row{padding:18px;text-align:center;font-size:12px;color:rgba(255,255,255,.28)}
.nav-bar{flex-shrink:0;width:100%;max-width:480px;display:flex;justify-content:space-around;align-items:center;padding:8px;background:transparent;border-top:none}
.nav-bar img{height:88px;object-fit:contain;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
</style>
</head>
<body>
<div class="app-wrap">
<img class="ttl" src="images/ttl_stoneselect.png" alt="Gemstone Select"/>
<div class="code-disp" id="code-disp">—</div>
<div class="panes">
  <div class="pane-wrap">
    <div class="pane-label">Stone List</div>
    <div class="pane-list" id="pane-list"><div class="empty-row">Loading...</div></div>
  </div>
  <div class="pane-wrap">
    <div class="pane-label">Selected</div>
    <div class="pane-sel" id="pane-sel"><div class="empty-row">선택된 원석 없음</div></div>
  </div>
</div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"   alt="Home"   id="b-home"/>
  <img src="images/btn_go_before.png" alt="Before" id="b-back"/>
  <img src="images/btn_design.png"    alt="Design" id="b-design"/>
</div>
<script>
"use strict";
var sc=null,allStones=[],selected=[];
document.addEventListener("DOMContentLoaded",async function(){
  sc=requireStructureCode();if(!sc)return;
  document.getElementById("code-disp").textContent=sc;
  document.getElementById("b-home").onclick=function(){clearAndGo("index.html");};
  document.getElementById("b-back").onclick=function(){window._sc=null;location.href="worksdesk.html";};
  document.getElementById("b-design").onclick=onDesign;
  showLoading("LOADING...");
  try{
    allStones=await apiGetAllStones();
    try{var item=await apiGetArchiveItem(sc);if(item){var raw=String(item.usedStones||item.UsedStones||"").trim();if(raw)selected=raw.split(",").map(function(s){return s.trim();}).filter(Boolean);}}catch(e){}
    hideLoading();renderLists();
  }catch(err){hideLoading();document.getElementById("pane-list").innerHTML='<div class="empty-row" style="color:rgba(220,80,80,.8)">로드 실패: '+esc(err.message)+'</div>';}
});
function renderLists(){
  var le=document.getElementById("pane-list"),se=document.getElementById("pane-sel");
  var un=allStones.filter(function(s){return selected.indexOf(s.nameKr)===-1;});
  if(!un.length){le.innerHTML='<div class="empty-row">모두 선택됨</div>';}
  else{le.innerHTML="";un.forEach(function(s){var r=document.createElement("div");r.className="stone-row";r.textContent=s.nameKr;r.addEventListener("click",function(){selected.push(s.nameKr);renderLists();});le.appendChild(r);});}
  if(!selected.length){se.innerHTML='<div class="empty-row">선택된 원석 없음</div>';}
  else{se.innerHTML="";selected.forEach(function(name){var r=document.createElement("div");r.className="stone-row";r.textContent=name;r.addEventListener("click",function(){selected=selected.filter(function(n){return n!==name;});renderLists();});se.appendChild(r);});}
}
async function onDesign(){
  if(!selected.length){toastErr("원석을 1개 이상 선택하세요");return;}
  showLoading("SAVING...");
  try{await apiSaveUsedStones(sc,selected);hideLoading();goPage("design.html",sc);}
  catch(err){hideLoading();toastErr("저장 실패: "+err.message);}
}
</script>
</div>
</body>
</html>
