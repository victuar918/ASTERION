<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Work Desk</title>

<style>

body{
margin:0;
height:100vh;

background-image:url("images/bg_sub.jpg");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
align-items:center;

font-family:sans-serif;
color:white;
}

/* 타이틀 */

.title{
margin-top:20px;
margin-bottom:10px;
}

.title img{
width:240px;
}

/* Structure 리스트 */

.structure-window{

width:90%;
max-width:420px;

flex:1;

overflow-y:auto;

background:transparent;

padding:10px;
}

.structure-item{

padding:12px;

text-align:center;

font-size:18px;

cursor:pointer;

border-bottom:1px solid rgba(255,255,255,0.2);

}

.structure-item.selected{

background:rgba(255,255,255,0.2);

}

/* 버튼 영역 */

.button-area{

width:100%;

padding:10px;

display:flex;
flex-direction:column;
gap:10px;

}

/* 1행 4개 */

.row1{

display:flex;
justify-content:space-around;

}

/* 2행 3개 */

.row2{

display:flex;
justify-content:space-evenly;

}

/* 버튼 */

.button-area img{

width:70px;
cursor:pointer;

}

</style>

</head>


<body>

<!-- Title -->

<div class="title">
<img src="images/ttl_worksdesk.png">
</div>


<!-- Structure Scroll Window -->

<div id="structureList" class="structure-window">
</div>


<!-- Button Area -->

<div class="button-area">

<div class="row1">

<img src="images/btn_go_home.png" onclick="goPage('index.html')">

<img src="images/btn_stoneselect.png" onclick="goPage('selectstone.html')">

<img src="images/btn_go_design.png" onclick="goPage('design.html')">

<img src="images/btn_analysis.png" onclick="goPage('analysismemo.html')">

</div>


<div class="row2">

<img src="images/btn_productimage.png" onclick="goPage('productimage.html')">

<img src="images/btn_booklet.png" onclick="goPage('booklet.html')">

<img src="images/btn_forwarding.png" onclick="goPage('forwarding.html')">

</div>

</div>



<!-- 시스템 JS -->

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>


<script>

/* Structure 목록 로드 */

async function loadStructures(){

const list=document.getElementById("structureList")

if(!API || !API.getStructures) return

const data=await API.getStructures()

list.innerHTML=""

data
.filter(s =>
s.Status==="Tasking" ||
s.Status==="A/S" ||
s.Status==="Forwarding"
)
.forEach(s=>{

const div=document.createElement("div")

div.className="structure-item"

div.textContent=s.StructureCode

div.onclick=()=>selectStructure(s.StructureCode,div)

list.appendChild(div)

})

}


/* Structure 선택 */

function selectStructure(code,element){

STATE.activeStructure=code

document.querySelectorAll(".structure-item")
.forEach(i=>i.classList.remove("selected"))

element.classList.add("selected")

}


/* 페이지 이동 */

function goPage(page){

if(page==="index.html"){

location.href=page
return

}

if(!STATE.activeStructure){

alert("StructureCode를 먼저 선택하세요.")
return

}

location.href=page

}


/* 시작 */

document.addEventListener("DOMContentLoaded",loadStructures)

</script>

</body>
</html>
