<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Structure Code Index</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1e08;
      background: linear-gradient(
        135deg,
        #fff6da 0%,
        #f5d97a 40%,
        #eac45a 70%,
        #d8ad3c 100%
      );
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 타이틀 고정 */
    .title-img {
      display: block;
      width: 95%;
      max-width: 1400px;
      margin: 10px auto 35px auto; /* 상단 여백 10px, 아래 여백 35px */
    }

    /* 입력 컨테이너 */
    .input-container {
      display: flex;
      flex-direction: column;
      width: 90%;
      max-width: 500px;
      margin-bottom: 40px;
    }

    .input-container input {
      font-size: 18px;
      padding: 10px;
      margin-bottom: 20px;
      text-transform: uppercase; /* 입력 자동 대문자 처리 */
      border: 1px solid #d8ad3c;
      border-radius: 6px;
    }

    /* 버튼 하단 고정 */
    .bottom-nav {
      position: absolute;
      bottom: 10%;
      display: flex;
      gap: 20px;
      justify-content: center;
      width: 100%;
    }

    .bottom-nav img {
      width: 90px;
      cursor: pointer;
      transition: 0.2s;
    }

    .bottom-nav img:hover {
      transform: scale(1.08);
    }
  </style>
</head>

<body>

  <!-- 타이틀 이미지: 컨테이너 밖 -->
  <img src="images/ttl_codeindex.png" alt="Structure Code Index"
     style="width:95%; margin-top:20px; display:block; margin-left:auto; margin-right:auto;">

  <!-- 입력 컨테이너 -->
  <div class="input-container">
    <input id="structureCode" placeholder="Enter StructureCode [S-00000-000000]">
  </div>

  <!-- 하단 버튼 -->
  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()" alt="Home">
    <img src="images/btn_forwarding.png" onclick="updateAS()" alt="A/S">
    <img src="images/btn_go_next.png" onclick="goSelect()" alt="Select">
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwj3LYGr7Z3X7UCR6gOdZ32exbsWkxQ1zEFDEgJKop3w3nA4XPX9lSqBW8rUHv7uwZmFQ/exec";

    function goHome() {
      window.location.href = "index.html";
    }

    async function updateAS() {
      const code = document.getElementById("structureCode").value.toUpperCase();
      if (!code) return alert("StructureCode를 입력하세요.");

      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "updateStatus",
          structureCode: code,
          newStatus: "A/S"
        })
      }).then(r => r.json());

      if (res.success) {
        alert(code + " 상태가 A/S로 변경되었습니다.");
      } else {
        alert("오류: " + res.error);
      }
    }

    function goSelect() {
      const code = document.getElementById("structureCode").value.toUpperCase();
      if (!code) return alert("StructureCode를 입력하세요.");
      window.location.href = "structuredesign.html?code=" + code;
    }
  </script>

</body>

</html>
