<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Booklet</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
}

/* 콘텐츠 영역: 좌(페이지 버튼) + 우(미리보기) */
.content{
  flex:1;
  width:100%;
  max-width:560px;
  display:flex;
  min-height:0;
  padding:0 8px;
  gap:8px;
}

/* ── 좌: 페이지 버튼 7개 세로 ── */
.page-btns{
  display:flex;
  flex-direction:column;
  gap:5px;
  flex-shrink:0;
  padding:4px 0;
  justify-content:center;
}
.pg-btn{
  width:34px;height:34px;
  background:rgba(26,46,90,.12);
  border:1px solid rgba(26,46,90,.3);
  border-radius:7px;
  color:#1a2e5a;
  font-size:12px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.pg-btn.active{
  background:rgba(170,130,75,.6);
  border-color:rgba(210,170,100,.9);
  color:#fff;
}

/* ── 우: 미리보기 ── */
.preview-wrap{
  flex:1;min-height:0;
  overflow-y:auto;
  border:1px solid rgba(26,46,90,.15);
  border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.preview-wrap::-webkit-scrollbar{width:3px}
.preview-wrap::-webkit-scrollbar-thumb{background:rgba(26,46,90,.2);border-radius:3px}

.preview-page{
  display:none;
  padding:20px 18px;
  min-height:200px;
  transition:background .3s;
}
.preview-page.active{display:block}

/* ════════════════════════════
   페이지별 내부 스타일
════════════════════════════ */

/* PAGE 1: Cover */
.pg-cover{
  display:flex;flex-direction:column;
  align-items:flex-end;justify-content:center;
  min-height:200px;padding:20px 10px;
}
.pg-brand{
  font-size:28px;font-weight:300;letter-spacing:4px;
  color:#c9a84c;font-family:serif;
}
.pg-sub{
  font-size:12px;color:#555;margin-top:8px;letter-spacing:1px;
}

/* PAGE 2: Signature Archive */
.pg-sig{
  display:flex;flex-direction:column;gap:10px;
  padding:10px 0;
}
.pg-sig-title{font-size:18px;font-weight:700;color:#1a2e5a;letter-spacing:2px}
.pg-sig-sub{font-size:12px;color:#1a2e5a;letter-spacing:1px}
.pg-sig-no{font-size:13px;color:#1a2e5a;margin-top:8px}
.pg-sig-for{font-size:13px;color:#1a2e5a}
.pg-sig-quote{font-size:12px;color:#1a2e5a;font-style:italic;margin-top:16px;line-height:1.8}
.pg-sig-auth{font-size:11px;color:#1a2e5a;font-style:italic;text-align:right;margin-top:20px}

/* PAGE 3: Product Image */
.pg-product{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:200px;gap:14px;padding:10px 0;
}
.pg-product-frame{
  width:160px;height:160px;
  border:1px solid rgba(26,46,90,.15);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#f8f8f8;
}
.pg-product-img{width:100%;height:100%;object-fit:cover}
.pg-no-img{font-size:11px;color:#aaa}
.pg-product-code{font-size:12px;color:#555;letter-spacing:1px}

/* PAGE 4: Gemstone Description */
.pg-gem{padding:4px 0}
.pg-gem-title{
  font-size:16px;color:#c9a84c;
  text-align:center;letter-spacing:1px;
  margin-bottom:12px;font-family:serif;
}
.stone-table{width:100%;border-collapse:collapse}
.stone-table tr{border-bottom:1px solid rgba(26,46,90,.1)}
.stone-td-img{
  width:48px;padding:6px 4px;
  vertical-align:top;
}
.stone-img{
  width:44px;height:44px;
  object-fit:cover;border-radius:4px;
  border:1px solid rgba(26,46,90,.1);
}
.stone-img-empty{
  width:44px;height:44px;
  background:rgba(26,46,90,.05);
  border-radius:4px;
}
.stone-td-name{
  width:80px;padding:6px 6px;
  vertical-align:top;
}
.stone-kr{font-size:12px;font-weight:600;color:#1a2e5a}
.stone-eng{font-size:10px;color:#666;margin-top:2px}
.stone-td-exp{
  padding:6px 4px;
  vertical-align:top;
  font-size:10px;color:#444;line-height:1.6;
}

/* PAGE 5: Structure Design + Analysis */
.pg-struct{padding:4px 0}
.pg-section-title{
  font-size:16px;color:#c9a84c;
  text-align:center;letter-spacing:1px;
  margin-bottom:8px;font-family:serif;
}
.pg-struct-code{
  font-size:12px;color:#1a2e5a;
  text-align:center;margin-bottom:10px;
}
.pg-divider{
  border:none;border-top:1px solid #c9a84c;
  margin:12px 0;
}
.pg-analysis{
  font-size:11px;color:#333;
  line-height:1.8;white-space:pre-wrap;
}

/* PAGE 6: 철학 텍스트 */
.pg-phil{padding:4px 0}
.pg-phil p{
  font-size:12px;color:#333;
  line-height:1.9;margin-bottom:14px;
}

/* PAGE 7: 슬로건 (금색 배경) */
.pg-slogan{
  display:flex;flex-direction:column;
  justify-content:center;
  min-height:180px;padding:20px 10px;
  gap:16px;
}
.pg-slogan p{
  font-size:13px;color:#444;
  font-style:italic;letter-spacing:.5px;
}

/* 네비 */
.nav-bar{
  flex-shrink:0;width:100%;max-width:560px;
  display:flex;justify-content:space-around;align-items:center;
  padding:8px;background:transparent;border-top:none;
}
.nav-bar img{height:88px;object-fit:contain;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
</style>
</head>
<body>
<div class="app-wrap">
  <img class="ttl" src="images/ttl_booklet.png" alt="Booklet"/>
  <div class="code-disp" id="code-disp">—</div>

  <div class="content">
    <!-- 좌: 페이지 버튼 7개 -->
    <div class="page-btns" id="page-btns">
      <button class="pg-btn active" data-pg="1">1</button>
      <button class="pg-btn" data-pg="2">2</button>
      <button class="pg-btn" data-pg="3">3</button>
      <button class="pg-btn" data-pg="4">4</button>
      <button class="pg-btn" data-pg="5">5</button>
      <button class="pg-btn" data-pg="6">6</button>
      <button class="pg-btn" data-pg="7">7</button>
    </div>

    <!-- 우: 미리보기 -->
    <div class="preview-wrap" id="preview-wrap">
      <div id="pg1" class="preview-page active">
        <div id="pg1-c">Loading...</div>
      </div>
      <div id="pg2" class="preview-page">
        <div id="pg2-c"></div>
      </div>
      <div id="pg3" class="preview-page">
        <div id="pg3-c"></div>
      </div>
      <div id="pg4" class="preview-page">
        <div id="pg4-c"></div>
      </div>
      <div id="pg5" class="preview-page">
        <div id="pg5-c"></div>
      </div>
      <div id="pg6" class="preview-page">
        <div id="pg6-c"></div>
      </div>
      <div id="pg7" class="preview-page">
        <div id="pg7-c"></div>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <img src="images/btn_go_home.png"   alt="Home"   id="b-home"/>
    <img src="images/btn_go_before.png" alt="Before" id="b-back"/>
    <img src="images/btn_createpdf.png" alt="PDF"    id="b-pdf"/>
  </div>
</div>
<script src="js/booklet.js"></script>
</body>
</html>
