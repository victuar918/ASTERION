<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Stone</title>

<!-- ▼ 공통 JS (순서 중요) -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #2b1e08;
  background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.title-img {
  display: block;
  width: 95%;
  max-width: 1400px;
  margin-top: 10px;
}

.structure-code {
  margin-top: 4vh;
  font-size: 22px;
  font-weight: 600;
}

.list-container {
  margin-top: 4vh;
  width: 80%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 25px;
  /* 하단 버튼과 겹치지 않게 */
  padding-bottom: 100px;
  overflow-y: auto;
}

.list-box {
  height: 200px;
  background: rgba(255,255,255,0.6);
  border-radius: 6px;
  overflow-y: auto;
  padding: 10px;
}

.stone {
  padding: 6px 8px;
  cursor: pointer;
  font-size: 14px;
  border-radius: 4px;
  transition: background 0.15s;
}

.stone:hover { background: rgba(255,255,255,0.5); }

.empty-msg {
  font-size: 13px;
  opacity: 0.5;
  padding: 6px 8px;
}

.list-label {
  font-size: 11px;
  opacity: 0.6;
  padding: 0 0 4px 2px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.bottom-nav {
  position: fixed;
  bottom: 8%;
  display: flex;
  gap: 30px;
}

.bottom-nav img {
  width: 90px;
  cursor: pointer;
  transition: transform 0.15s;
}

.bottom-nav img:hover { transform: scale(1.08); }
</style>
</head>

<body>

<img src="images/ttl_stoneselect.png" class="title-img" alt="Select Stone">

<div id="structureCodeLabel" class="structure-code"></div>

<div class="list-container">
  <div>
    <div class="list-label">AVAILABLE</div>
    <div id="availableList" class="list-box"></div>
  </div>
  <div>
    <div class="list-label">SELECTED</div>
    <div id="selectedList" class="list-box"></div>
  </div>
</div>

<div class="bottom-nav">
  <img src="images/btn_go_home.png"   alt="홈"    onclick="goHome()">
  <img src="images/btn_go_before.png" alt="뒤로"  onclick="goBefore()">
  <img src="images/btn_go_design.png" alt="저장→디자인" onclick="saveAndGoDesign()">
</div>

<script>
// ── 상태 ──────────────────────────────────────────────────────
// ① WEBAPP_URL 제거 — api.js가 CONFIG.API_BASE 자동 참조
// ④ state.js getStructureCode() 사용 — 키 "structureCode"로 통일
const structureCode = getStructureCode();

let masterList  = []; // 서버 원본 순서 배열
let selectedSet = new Set();

// ── 초기화 ─────────────────────────────────────────────────────
window.onload = function () {
  // structureCode 없으면 worksdesk로 리다이렉트
  // ⑦ selecttasking.html → worksdesk.html 통일
  if (!structureCode) {
    alert("Structure 정보가 없습니다. 목록으로 돌아가세요.");
    location.href = "worksdesk.html";
    return;
  }

  document.getElementById("structureCodeLabel").textContent = structureCode;
  loadStones();
};

// ── 원석 목록 로드 ─────────────────────────────────────────────
// ② fetch → apiGet (URL 조립, 오류 처리 자동)
async function loadStones() {
  try {
    showLoading("원석 목록 불러오는 중...");
    // getAllStones → { success, stones:[{NameKr,...}] }
    const json = await apiGet("getAllStones");

    if (!json.success || !Array.isArray(json.stones)) {
      throw new Error(json.error || "원석 목록 데이터 없음");
    }

    masterList = json.stones.map(function (s) { return s.NameKr; });
    render();

  } catch (err) {
    document.getElementById("availableList").innerHTML =
      '<div class="empty-msg">목록 로드 실패: ' + err.message + '</div>';
  } finally {
    hideLoading();
  }
}

// ── 렌더 (available / selected 분리 표시) ────────────────────
function render() {
  const availBox = document.getElementById("availableList");
  const selBox   = document.getElementById("selectedList");
  availBox.innerHTML = "";
  selBox.innerHTML   = "";

  const available = masterList.filter(function (n) { return !selectedSet.has(n); });
  const selected  = masterList.filter(function (n) { return  selectedSet.has(n); });

  if (!available.length) {
    availBox.innerHTML = '<div class="empty-msg">모든 원석이 선택되었습니다.</div>';
  } else {
    available.forEach(function (name) {
      const div = document.createElement("div");
      div.className   = "stone";
      div.textContent = name;
      div.onclick = function () { selectedSet.add(name); render(); };
      availBox.appendChild(div);
    });
  }

  if (!selected.length) {
    selBox.innerHTML = '<div class="empty-msg">선택된 원석이 없습니다.</div>';
  } else {
    selected.forEach(function (name) {
      const div = document.createElement("div");
      div.className   = "stone";
      div.textContent = name;
      div.onclick = function () { selectedSet.delete(name); render(); };
      selBox.appendChild(div);
    });
  }
}

// ── 저장 후 design.html 이동 ──────────────────────────────────
// ③ fetch → apiPost (Content-Type:text/plain CORS 자동 처리)
// ④ sessionStorage 키 → setStructureCode() 사용
async function saveAndGoDesign() {
  if (!selectedSet.size) { alert("원석을 선택하세요."); return; }

  const stonesArray = masterList.filter(function (n) { return selectedSet.has(n); });

  try {
    showLoading("저장 중...");
    const data = await apiPost({
      action       : "saveUsedStones",
      structureCode: structureCode,
      stones       : stonesArray,
    });

    if (!data.success) {
      alert("저장 실패: " + (data.error || "알 수 없는 오류"));
      return;
    }

    // ④ state.js setStructureCode + selectedStones 저장
    setStructureCode(structureCode);
    sessionStorage.setItem("selectedStones", JSON.stringify(stonesArray));

    location.href = "design.html?code=" + encodeURIComponent(structureCode);

  } catch (err) {
    alert("저장 오류: " + err.message);
  } finally {
    hideLoading();
  }
}

// ── 페이지 이동 ───────────────────────────────────────────────
// ⑤ goHome은 ui.js와 동일 → 삭제 (ui.js가 처리)
// goBefore는 페이지 고유 동작이므로 재정의
function goBefore() {
  // ⑦ worksdesk.html로 통일 (selecttasking 제거)
  location.href = "worksdesk.html?code=" + encodeURIComponent(structureCode || "");
}
</script>

</body>
</html>
