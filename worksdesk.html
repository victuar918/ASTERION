<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works Desk</title>

<!-- ▼ 공통 JS (순서 중요: config → api → state → ui) -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  color: #2b1e08;
  background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.title-img {
  display: block;
  width: 95%;
  max-width: 1400px;
  margin: 10px auto;
}

/* Structure 리스트 */
.structure-list-container {
  flex: 4;
  overflow-y: auto;
  padding: 10px 30px;
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 10px 15px;
  margin-bottom: 5px;
  cursor: pointer;
  font-size: 16px;
  border-radius: 5px;
  transition: background 0.2s;
  background: rgba(255,255,255,0.15);
}

.row:hover   { background: rgba(255,255,255,0.25); }
.row.selected { background: rgba(255,255,255,0.45); font-weight: 600; }

.code   { font-weight: 600; }
.status { opacity: 0.8; }

/* 하단 버튼 영역 */
.button-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 15px;
  padding-bottom: 15px;
}

.button-row {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.button-row img {
  width: 60px;
  cursor: pointer;
  transition: transform 0.15s;
}

.button-row img:hover { transform: scale(1.1); }
</style>
</head>

<body>

<img src="images/ttl_worksdesk.png" class="title-img" alt="Works Desk">

<div class="structure-list-container" id="structureList"></div>

<div class="button-area">
  <div class="button-row">
    <img src="images/btn_stoneselect.png"  alt="원석선택"  onclick="goPage('selectstone.html')">
    <img src="images/btn_go_design.png"    alt="디자인"    onclick="goPage('design.html')">
    <img src="images/btn_analysis.png"     alt="분석메모"  onclick="goPage('analysismemo.html')">
  </div>
  <div class="button-row">
    <img src="images/btn_productimage.png" alt="제품이미지" onclick="goPage('productimage.html')">
    <img src="images/btn_booklet.png"      alt="북릿"      onclick="goPage('booklet.html')">
    <img src="images/btn_forwarding.png"   alt="포워딩"    onclick="goPage('forwarding.html')">
    <img src="images/btn_go_home.png"      alt="홈"        onclick="goHome()">
  </div>
</div>

<script>
// ── worksdesk.html 전용 로직 ───────────────────────────────────
// 공통 goPage / goHome / showLoading / hideLoading → ui.js
// structureCode 관리 → state.js
// API 호출 → api.js / config.js

window.onload = function () {
  loadTasking();
};

async function loadTasking() {
  const listEl = document.getElementById("structureList");
  listEl.innerHTML = "<div style='opacity:0.6; padding:10px;'>불러오는 중...</div>";

  try {
    showLoading("목록 불러오는 중...");
    const json = await apiGet("getTaskingList");

    if (!json.success) throw new Error(json.error || "목록 로드 실패");

    const data     = Array.isArray(json.data) ? json.data : [];
    const filtered = data.filter(function (item) {
      return item.Status === "Tasking" ||
             item.Status === "Forwarding" ||
             item.Status === "A/S";
    });

    listEl.innerHTML = "";

    if (filtered.length === 0) {
      listEl.innerHTML = "<div style='opacity:0.6; padding:10px;'>조회된 Structure가 없습니다.</div>";
      return;
    }

    filtered.forEach(function (item) {
      const row = document.createElement("div");
      row.className = "row";

      const codeEl   = document.createElement("div");
      codeEl.className   = "code";
      codeEl.textContent = item.StructureCode || "";

      const statusEl = document.createElement("div");
      statusEl.className   = "status";
      statusEl.textContent = item.Status || "";

      row.appendChild(codeEl);
      row.appendChild(statusEl);

      row.onclick = function () {
        // 선택 하이라이트
        document.querySelectorAll(".row").forEach(function (r) {
          r.classList.remove("selected");
        });
        row.classList.add("selected");

        // [B7 FIX] state.js setStructureCode 사용 → 키 "structureCode"로 통일
        setStructureCode(item.StructureCode);
      };

      listEl.appendChild(row);
    });

  } catch (err) {
    listEl.innerHTML = "<div style='color:#c0392b; padding:10px;'>목록 로드 실패: " + err.message + "</div>";
  } finally {
    hideLoading();
  }
}
</script>

</body>
</html>
