<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Analysis &amp; Memo</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
}

.content{
  flex:1;
  width:100%;
  max-width:480px;
  display:flex;
  flex-direction:column;
  min-height:0;
  padding:0 12px;
  gap:8px;
}

/* Memo 영역 — 살짝 작게 (flex 0.6) */
.zone-memo{
  flex:0.6;
  display:flex;
  flex-direction:column;
  min-height:0;
}

/* BTR 영역 — 고정 높이 */
.zone-btr{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:4px 0;
}
.btr-label{
  font-size:13px;
  font-weight:700;
  letter-spacing:1.5px;
  color:#1a2e5a;
  flex-shrink:0;
}
.btr-input{
  flex:1;
  padding:9px 12px;
  background:rgba(0,0,0,.20);
  border:1px solid rgba(26,46,90,.25);
  border-radius:10px;
  color:#1a2e5a;
  font-size:14px;
  letter-spacing:2px;
  text-align:center;
  outline:none;
  transition:border-color .15s;
  -moz-appearance:textfield;
}
.btr-input::-webkit-outer-spin-button,
.btr-input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
.btr-input:focus{ border-color:rgba(26,46,90,.55); }
.btr-input::placeholder{ color:rgba(26,46,90,.35); font-size:12px; letter-spacing:1px; }
.btr-preview{
  font-size:10px;
  color:rgba(26,46,90,.55);
  text-align:right;
  letter-spacing:.3px;
  min-height:14px;
  flex-shrink:0;
  padding-bottom:2px;
}

/* Analysis 영역 — 그대로 */
.zone-analysis{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.zone-title{
  font-size:13px;
  font-weight:600;
  letter-spacing:1.2px;
  text-align:center;
  color:#1a2e5a;
  padding:4px 0;
  flex-shrink:0;
}
textarea.memo-area{
  flex:1;
  width:100%;
  min-height:0;
  background:rgba(0,0,0,.20);
  border:1px solid rgba(26,46,90,.25);
  border-radius:10px;
  color:#1a2e5a;
  font-size:13px;
  line-height:1.65;
  padding:10px 12px;
  outline:none;
  resize:none;
  overflow-y:auto;
  transition:border-color .15s;
}
textarea.memo-area:focus{ border-color:rgba(26,46,90,.55); }
textarea.memo-area::placeholder{ color:rgba(26,46,90,.4); }
</style>
</head>
<body>
<div class="app-wrap">
  <img class="ttl" src="images/ttl_analysisnmemo.png" alt="Analysis &amp; Memo"/>
  <div class="code-disp" id="code-disp">—</div>

  <div class="content">

    <!-- Internal Memo -->
    <div class="zone-memo">
      <div class="zone-title">Internal Memo</div>
      <textarea class="memo-area" id="memo-input"
        placeholder="메모를 입력하세요... (기존 내용에 추가됩니다)"></textarea>
    </div>

    <!-- BTR (Birth Time Rectification) -->
    <div class="zone-btr">
      <span class="btr-label">BTR</span>
      <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
        <input class="btr-input" id="btr-input" type="number"
               maxlength="12" placeholder="197911070525"/>
        <div class="btr-preview" id="btr-preview"></div>
      </div>
    </div>

    <!-- Analysis -->
    <div class="zone-analysis">
      <div class="zone-title">Analysis</div>
      <textarea class="memo-area" id="analysis-input"
        placeholder="분석 내용을 입력하세요..."></textarea>
    </div>

  </div>

  <div class="nav-bar">
    <img src="images/btn_go_home.png"   alt="Home"   id="b-home"/>
    <img src="images/btn_go_before.png" alt="Before" id="b-back"/>
    <img src="images/btn_save.png"      alt="Save"   id="b-save"/>
    <img src="images/btn_type.png"      alt="Next"   id="b-next"/>
  </div>
</div>

<script>
"use strict";
var sc = null;

document.addEventListener("DOMContentLoaded", async function(){
  sc = requireStructureCode(); if(!sc) return;
  document.getElementById("code-disp").textContent = sc;

  document.getElementById("b-home").onclick = function(){ clearAndGo("index.html"); };
  document.getElementById("b-back").onclick = function(){ window._sc=null; location.href="worksdesk.html"; };
  document.getElementById("b-save").onclick = onSave;
  document.getElementById("b-next").onclick = function(){ goPage("structuretype.html", sc); };

  // BTR 입력 실시간 프리뷰
  document.getElementById("btr-input").addEventListener("input", function(){
    var raw = this.value.replace(/\D/g, "").slice(0, 12);
    this.value = raw;
    document.getElementById("btr-preview").textContent = parseBTR(raw);
  });

  // 기존 데이터 로드
  try{
    var item = await apiGetArchiveItem(sc);
    if(item){
      // Analysis
      document.getElementById("analysis-input").value =
        String(item.analysis || item.Analysis || "");

      // BTR
      var btrRaw = String(item.btr || item.BTR || item.bTR || "").trim();
      if(btrRaw){
        // 저장된 형식("1979년 11월 07일 05시 25분")에서 숫자만 추출해 입력란에 복원
        var digits = btrRaw.replace(/\D/g, "");
        if(digits.length === 12){
          document.getElementById("btr-input").value = digits;
          document.getElementById("btr-preview").textContent = parseBTR(digits);
        } else {
          // 이미 변환된 텍스트 형태로 저장된 경우 그대로 표시
          document.getElementById("btr-preview").textContent = btrRaw;
        }
      }

      // Memo placeholder
      var prevMemo = String(item.memo || item.Memo || "");
      if(prevMemo){
        document.getElementById("memo-input").placeholder =
          "기존 메모:\n" + prevMemo.slice(0,120) + (prevMemo.length>120?"...":"") +
          "\n\n(새 내용을 입력하면 기존 메모 아래에 추가됩니다)";
      }
    }
  } catch(e){}
});

/* BTR 12자리 → 한국어 날짜시간 변환
   197911070525 → 1979년 11월 07일 05시 25분 */
function parseBTR(raw){
  if(!raw || raw.length < 12) return "";
  var yyyy = raw.slice(0,4);
  var mm   = raw.slice(4,6);
  var dd   = raw.slice(6,8);
  var hh   = raw.slice(8,10);
  var mi   = raw.slice(10,12);
  // 간단한 유효성 체크
  if(Number(mm)<1||Number(mm)>12) return "월 오류";
  if(Number(dd)<1||Number(dd)>31) return "일 오류";
  if(Number(hh)>23)               return "시 오류";
  if(Number(mi)>59)               return "분 오류";
  return yyyy+"년 "+mm+"월 "+dd+"일 "+hh+"시 "+mi+"분";
}

async function onSave(){
  var memo     = document.getElementById("memo-input").value.trim();
  var analysis = document.getElementById("analysis-input").value.trim();
  var btrRaw   = document.getElementById("btr-input").value.replace(/\D/g,"").slice(0,12);
  var btrVal   = btrRaw.length === 12 ? parseBTR(btrRaw) : "";

  // BTR 유효성 — 12자리가 아니면서 비어있지 않으면 경고
  if(btrRaw.length > 0 && btrRaw.length < 12){
    toastErr("BTR은 12자리 숫자로 입력하세요 (예: 197911070525)");
    return;
  }

  showLoading("SAVING...");
  try{
    if(memo) await apiAppendMemo(sc, memo);
    await apiUpdateAnalysisMemo(sc, analysis, btrVal);
    hideLoading();
    document.getElementById("memo-input").value = "";
    toastOk("저장 완료!");
  } catch(err){
    hideLoading();
    toastErr("저장 실패: " + err.message);
  }
}
</script>
</body>
</html>
