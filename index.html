<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ASTERION"/>
<meta name="theme-color" content="#0a0807"/>
<link rel="apple-touch-icon" href="images/btn_icon.png"/>
<!-- index.html은 common.css 로드 안 함 — 독립 스타일 사용 -->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:url('images/bg_home.jpg') center/cover no-repeat fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;   /* 버튼을 하단에 배치 */
  min-height:100vh;
}
#btn-row{
  width:100%;
  max-width:480px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:0 16px 23%;         /* 하단에서 23% 위에 배치 */
  gap:10px;
}
#btn-row img{
  flex:1;
  max-width:93px;
  height:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));
}
#btn-row img:active{opacity:.7;transform:scale(.97)}
</style>
</head>
<body>
<div id="btn-row">
  <img src="images/btn_worksdesk.png"    alt="Structure Design" id="btn-wd"/>
  <img src="images/btn_go_index.png"     alt="Code Index"       id="btn-si"/>
  <img src="images/btn_go_inventory.png" alt="Inventory"        id="btn-inv"/>
</div>
<script>
document.getElementById("btn-wd").onclick  = function(){ location.href="worksdesk.html"; };
document.getElementById("btn-si").onclick  = function(){ location.href="structureindex.html"; };
document.getElementById("btn-inv").onclick = function(){ location.href="inventory.html"; };
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    /* SW 캐시 강제 갱신 — 버전 변경 시 즉시 반영 */
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){ reg.update(); });
    });
    navigator.serviceWorker.register("sw.js")
      .then(function(reg){ console.log("[SW] 등록:", reg.scope); })
      .catch(function(err){ console.warn("[SW] 실패:", err); });
  });
}
</script>
</body>
</html>
