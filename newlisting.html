<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ASTERION – New Listing</title>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:url('images/bg_all.jpg') center/cover no-repeat fixed;font-family:'Arial',sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
.ttl{width:360px;max-width:92vw;display:block;margin:14px auto 6px;flex-shrink:0}

/* NameKr:NameEng:Exp = 20%:20%:60% */
.content{flex:1;width:100%;max-width:400px;display:flex;flex-direction:column;min-height:0;padding:0 18px;gap:4px}
.zone-kr {flex:2;display:flex;align-items:center;gap:10px}
.zone-eng{flex:2;display:flex;align-items:center;gap:10px}
.zone-exp{flex:6;display:flex;flex-direction:column;min-height:0}

.field-label{font-size:12px;color:rgba(255,255,255,.6);white-space:nowrap;flex-shrink:0;width:60px;text-align:right}
.req{color:rgba(220,100,100,.9)}
.exp-title{font-size:12px;color:rgba(255,255,255,.6);text-align:center;padding:3px 0 4px;flex-shrink:0}

/* 투명도 60% */
.txt-input{
  flex:1;padding:9px 12px;
  background:rgba(0,0,0,.60);
  border:1px solid rgba(255,255,255,.15);border-radius:8px;
  color:#fff;font-size:13px;outline:none;transition:border-color .15s;
}
.txt-input:focus{border-color:rgba(210,170,100,.65)}
.txt-input::placeholder{color:rgba(255,255,255,.3)}
textarea.txt-input{flex:1;resize:none;min-height:0;overflow-y:auto;line-height:1.6;width:100%}

.nav-bar{flex-shrink:0;width:100%;max-width:400px;display:flex;justify-content:space-around;align-items:center;padding:8px 8px env(safe-area-inset-bottom,10px);background:transparent;border-top:none}
.nav-bar img{height:88px;object-fit:contain;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
</style>
</head>
<body>
<img class="ttl" src="images/ttl_gemstonelist.png" alt="New Listing"/>
<div class="content">
  <div class="zone-kr">
    <span class="field-label">한글 이름<span class="req">*</span></span>
    <input class="txt-input" id="nk-input" type="text" placeholder="예: 자수정" maxlength="200"/>
  </div>
  <div class="zone-eng">
    <span class="field-label">영어 이름</span>
    <input class="txt-input" id="ne-input" type="text" placeholder="예: Amethyst" maxlength="200"/>
  </div>
  <div class="zone-exp">
    <div class="exp-title">Gemstone Explanation</div>
    <textarea class="txt-input" id="exp-input" placeholder="원석 설명, 특징 등..." maxlength="1000"></textarea>
  </div>
</div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"   alt="Home"    id="b-home"/>
  <img src="images/btn_go_before.png" alt="Before"  id="b-back"/>
  <img src="images/btn_listing.png"   alt="Listing" id="b-listing"/>
</div>
<script>
"use strict";
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("b-home").onclick   =function(){location.href="index.html";};
  document.getElementById("b-back").onclick   =function(){location.href="inventory.html";};
  document.getElementById("b-listing").onclick=onListing;
});
async function onListing(){
  var nk=document.getElementById("nk-input").value.trim();
  var ne=document.getElementById("ne-input").value.trim();
  var ex=document.getElementById("exp-input").value.trim();
  if(!nk){toastErr("한글 이름을 입력하세요");document.getElementById("nk-input").focus();return;}
  // 클라이언트 중복 체크
  try{
    var stones=await apiGetAllStones();
    if(stones.some(function(s){return String(s.nameKr||"").trim().toLowerCase()===nk.toLowerCase();})){
      toastErr("이미 등록된 원석입니다: "+nk);document.getElementById("nk-input").focus();return;
    }
  }catch(e){}
  showLoading("SAVING...");
  try{
    await apiAddStone(nk,ne,ex);
    hideLoading();toastOk("등록 완료!");
    document.getElementById("nk-input").value="";
    document.getElementById("ne-input").value="";
    document.getElementById("exp-input").value="";
  }catch(err){
    hideLoading();
    var msg=err.message||"";
    toastErr(msg.indexOf("이미 존재")!==-1?"이미 등록된 원석입니다":"실패: "+msg);
  }
}
</script>
</body>
</html>
