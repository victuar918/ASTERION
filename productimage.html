<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASTERION – Product Image</title>

<script src="config.js"></script>
<script src="state.js"></script>
<script src="api.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:url('images/bg_main.jpg') center/cover no-repeat fixed;
font-family:Arial;
color:white;

height:100vh;

display:flex;
flex-direction:column;
align-items:center;

padding-bottom:110px;

}

#title{

margin-top:20px;

}

#title img{

width:280px;

}

#image-area{

flex:1;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

}

#image-button{

position:relative;

width:240px;
height:240px;

cursor:pointer;

}

#image-button img{

position:absolute;

width:100%;
height:100%;

object-fit:contain;

}

#preview{

z-index:2;

}

#button-base{

z-index:1;

}

#structure-code{

margin-top:12px;

font-size:16px;
letter-spacing:1px;

}

#nav{

position:fixed;

bottom:0;
left:0;
right:0;

display:flex;

justify-content:space-around;

padding:10px;

background:rgba(0,0,0,0.8);

}

#nav img{

height:48px;
cursor:pointer;

}

#file-input{

display:none;

}

</style>

</head>

<body>

<div id="title">

<img src="images/ttl_productimage.png">

</div>

<div id="image-area">

<div id="image-button">

<img id="preview">

<img id="button-base" src="images/btn_proimageselec.png">

</div>

<div id="structure-code"></div>

</div>

<input type="file" id="file-input" accept="image/png,image/jpeg">

<div id="nav">

<img src="images/btn_go_home.png" id="btn-home">

<img src="images/btn_go_before.png" id="btn-before">

<img src="images/btn_update.png" id="btn-update">

<img src="images/btn_booklet.png" id="btn-next">

</div>

<script>

let structureCode=null
let selectedFile=null

document.addEventListener("DOMContentLoaded",init)

function init(){

structureCode=requireStructureCode()

if(!structureCode)return

document.getElementById("structure-code").innerText=structureCode

document.getElementById("btn-home").onclick=()=>{

location.href="index.html"

}

document.getElementById("btn-before").onclick=()=>{

goPage("analysismemo.html")

}

document.getElementById("btn-next").onclick=()=>{

goPage("booklet.html")

}

document.getElementById("image-button").onclick=()=>{

document.getElementById("file-input").click()

}

document.getElementById("file-input").onchange=previewImage

document.getElementById("btn-update").onclick=uploadImage

loadSavedImage()

}

function previewImage(e){

selectedFile=e.target.files[0]

if(!selectedFile)return

let reader=new FileReader()

reader.onload=function(evt){

document.getElementById("preview").src=evt.target.result

}

reader.readAsDataURL(selectedFile)

}

async function uploadImage(){

if(!selectedFile){

alert("Select Image")

return

}

try{

await apiUploadProductImage(structureCode,selectedFile)

alert("Uploaded")

}catch(e){

alert("Upload Failed")

}

}

async function loadSavedImage(){

try{

let url=await apiGetProductImage(structureCode)

if(url){

document.getElementById("preview").src=url

}

}catch(e){

}

}

</script>

</body>

</html>
