<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure Design</title>

<!-- ▼ 공통 JS -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/layoutFormatter.js"></script>
<script src="js/design.js" defer></script>

<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#fff6da 0%,#f5d97a 40%,#eac45a 70%,#d8ad3c 100%);
  min-height: 100vh;
  color: #2b1e08;
  padding: 16px 12px 90px;
}

/* ── 타이틀 이미지 ── */
#titleContainer {
  text-align: center;
  margin-bottom: 12px;
}

#titleContainer img {
  width: 180px; /* 화면 다른 곳과 동일하게 확대 */
  max-width: 90%;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* ── StructureCode 중앙 표시 ── */
#structureCodeDisplay {
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 18px;
}

/* ── 원석 + Size 행 ── */
.stone-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}

.stone-name {
  min-width: 100px;
  font-weight: bold;
  font-size: 14px;
}

.size-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  background: #f5c542;
  font-weight: bold;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.15s;
}

.size-btn:hover { opacity: 0.72; }

/* ── Details 영역 ── */
#detailsContainer {
  min-height: 50px;
  padding: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 8px;
  line-height: 2.2;
  margin-top: 12px;
}

.plus-btn {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  border: 2px dashed #bbb;
  background: transparent;
  color: #888;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.12s;
  margin: 0 2px;
}

.plus-btn.active-plus {
  border-color: #d8ad3c;
  background: rgba(248,197,66,0.25);
  color: #2b1e08;
}

.detail-btn {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 5px;
  border: none;
  background: rgba(255,255,255,0.65);
  font-size: 13px;
  cursor: pointer;
  margin: 0 2px;
  transition: opacity 0.15s;
}

.detail-btn:hover { opacity: 0.6; }

/* ── Total / Layout ── */
#totalSize {
  margin-top: 10px;
  font-weight: bold;
  font-size: 15px;
}

#layoutSummaryContainer {
  margin-top: 10px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 6px;
  font-size: 13px;
  word-break: break-all;
  min-height: 32px;
}

#layoutSummaryContainer strong { display: block; margin-bottom: 4px; }

/* ── 하단 버튼 ── */
.bottom {
  position: fixed;
  bottom: 16px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 14px;
}

.bottom img {
  width: 50px;
  cursor: pointer;
  transition: opacity 0.15s;
}

.bottom img:hover { opacity: 0.75; }
</style>
</head>
<body>

<!-- 타이틀 -->
<div id="titleContainer">
  <img src="images/ttl_structuredesign.png" alt="Structure Design">
</div>

<!-- StructureCode -->
<div id="structureCodeDisplay"></div>

<!-- Stone + Size 행 (JS에서 동적 생성) -->
<div id="stoneSelectorContainer"></div>

<!-- Details -->
<div id="detailsContainer"></div>

<!-- Total Size -->
<div id="totalSize">Total Size 0mm</div>

<!-- Layout Summary -->
<div id="layoutSummaryContainer">
  <strong>Layout:</strong>
  <span id="layoutSummary"></span>
</div>

<!-- 하단 버튼 -->
<div class="bottom">
  <img src="images/btn_go_home.png"   alt="홈"    onclick="goHome()">
  <img src="images/btn_go_before.png" alt="뒤로"  onclick="goBeforeDesign()">
  <img src="images/btn_analysis.png"  alt="Next"  onclick="goNextDesign()">
  <img src="images/btn_save.png"      alt="Save"  onclick="saveDesign()">
</div>

</body>
</html>
