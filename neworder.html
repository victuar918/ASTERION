<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – New Order</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
body {
  background: url('images/bg_all.jpg') center/cover no-repeat fixed;
}

/* 목록 영역 */
.content {
  flex: 1;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 0 12px;
  gap: 6px;
}

/* 스크롤 목록 */
.reg-list {
  flex: 1;
  overflow-y: auto;
  border-radius: 10px;
  min-height: 0;
}

/* 목록 행 */
.reg-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  padding: 10px 12px;
  font-size: 11px;
  color: #1a2e5a;
  border-bottom: 1px solid rgba(26,46,90,.1);
  cursor: pointer;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
  gap: 4px;
}
.reg-row:active { background: rgba(255,255,255,.2); }
.reg-row.selected {
  background: rgba(255,255,255,.60);
  font-weight: 600;
}
.reg-row .col-ts {
  font-size: 10px;
  color: #555;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.reg-row .col-name {
  text-align: center;
  font-weight: 600;
  color: #1a2e5a;
}
.reg-row .col-sc {
  text-align: right;
  font-size: 10px;
  color: #1a2e5a;
  letter-spacing: .5px;
}
.reg-row .col-sc.empty {
  color: rgba(200,60,60,.8);
  font-style: italic;
}

/* 목록 헤더 */
.reg-header {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding: 6px 12px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .8px;
  color: rgba(26,46,90,.55);
  border-bottom: 1px solid rgba(26,46,90,.15);
  flex-shrink: 0;
}
.reg-header span:last-child { text-align: right; }
.reg-header span:nth-child(2) { text-align: center; }

/* Create Code 버튼 영역 */
.action-area {
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 54px;
  padding: 2px 0;
}
.btn-createcode {
  /* ttl 이미지 width=370px의 70% */
  width: 259px;
  max-width: 68vw;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s;
  display: none;   /* 기본 숨김 */
  object-fit: contain;
}
.btn-createcode.show { display: block; }
.btn-createcode:active { opacity: .6; }
</style>
</head>
<body>
<div class="app-wrap">
  <img class="ttl" src="images/ttl_neworder.png" alt="New Order"/>

  <div class="content">
    <!-- 목록 헤더 -->
    <div class="reg-header">
      <span>Timestamp</span>
      <span>Name</span>
      <span>Code</span>
    </div>

    <!-- 등록 목록 -->
    <div class="reg-list" id="reg-list">
      <div class="empty-row">Loading...</div>
    </div>

    <!-- Create Code 버튼 (조건부 표시) -->
    <div class="action-area">
      <img
        class="btn-createcode"
        id="btn-createcode"
        src="images/btn_createcode.png"
        alt="Create Code"
      />
    </div>
  </div>

  <!-- 하단 네비 -->
  <div class="nav-bar">
    <img src="images/btn_go_home.png"   alt="Home"       id="b-home"/>
    <img src="images/btn_createpdf.png" alt="Create PDF" id="b-pdf"/>
  </div>
</div>

<script>
"use strict";

var selectedRow = null;  // 현재 선택된 행 데이터

document.addEventListener("DOMContentLoaded", async function(){

  document.getElementById("b-home").onclick = function(){
    location.href = "index.html";
  };
  document.getElementById("b-pdf").onclick  = onCreatePdf;
  document.getElementById("btn-createcode").onclick = onCreateCode;

  await loadList();
});

/* ── 목록 로드 ── */
async function loadList(){
  showLoading("LOADING...");
  try {
    var res = await apiPost({ action: A.GET_ALL_REG_ROWS });
    hideLoading();
    renderList(Array.isArray(res.rows) ? res.rows : []);
  } catch(err) {
    hideLoading();
    document.getElementById("reg-list").innerHTML =
      '<div class="empty-row">로드 실패: ' + esc(err.message) + '</div>';
  }
}

/* ── 목록 렌더링 ── */
function renderList(rows){
  var list = document.getElementById("reg-list");
  if(!rows.length){
    list.innerHTML = '<div class="empty-row">등록된 주문이 없습니다.</div>';
    return;
  }
  var html = "";
  rows.forEach(function(r, i){
    var ts    = formatTimestamp(r.timestamp);
    var name  = esc(r.guestName || "—");
    var sc    = r.structureCode ? esc(r.structureCode) : "";
    var scHtml = sc
      ? '<span class="col-sc">' + sc + '</span>'
      : '<span class="col-sc empty">미생성</span>';
    html +=
      '<div class="reg-row" data-idx="' + i + '">' +
      '<span class="col-ts">' + ts + '</span>' +
      '<span class="col-name">' + name + '</span>' +
      scHtml +
      '</div>';
  });
  list.innerHTML = html;

  // 행 클릭 이벤트
  list.querySelectorAll(".reg-row").forEach(function(el){
    el.addEventListener("click", function(){
      // 선택 토글
      list.querySelectorAll(".reg-row").forEach(function(e){ e.classList.remove("selected"); });
      el.classList.add("selected");
      var idx = parseInt(el.getAttribute("data-idx"));
      selectedRow = rows[idx];
      // StructureCode 없으면 Create Code 버튼 표시
      var btn = document.getElementById("btn-createcode");
      if(!selectedRow.structureCode){
        btn.classList.add("show");
      } else {
        btn.classList.remove("show");
      }
    });
  });
}

/* ── Create Code 버튼 ── */
async function onCreateCode(){
  if(!selectedRow || selectedRow.structureCode) return;
  var confirmed = await confirmPopup(
    selectedRow.guestName + " 님의 주문에\nStructureCode를 생성할까요?"
  );
  if(!confirmed) return;

  showLoading("CREATING CODE...");
  try {
    var res = await apiPost({
      action     : A.CREATE_CODE_AND_REGISTER,
      sheetName  : selectedRow.sheetName,
      rowIndex   : selectedRow.rowIndex,
      guestName  : selectedRow.guestName,
      birthDate  : selectedRow.birthDate  || "",
      birthTime  : selectedRow.birthTime  || "",
      phone      : selectedRow.phone      || "",
      address    : selectedRow.address    || "",
      timestamp  : selectedRow.timestamp  || "",
    });
    hideLoading();
    if(res && res.structureCode){
      toastOk("생성 완료: " + res.structureCode);
      selectedRow = null;
      document.getElementById("btn-createcode").classList.remove("show");
      await loadList();
    }
  } catch(err){
    hideLoading();
    toastErr("생성 실패: " + err.message);
  }
}

/* ── Create PDF 버튼 ── */
async function onCreatePdf(){
  if(!selectedRow){
    toastErr("목록에서 항목을 선택하세요.");
    return;
  }
  if(!selectedRow.structureCode){
    toastErr("먼저 Create Code를 실행하세요.");
    return;
  }
  var confirmed = await confirmPopup(
    selectedRow.structureCode + "\nPDF를 재생성할까요?"
  );
  if(!confirmed) return;

  showLoading("CREATING PDF...");
  try {
    var res = await apiPost({
      action        : A.RECREATE_PDF,
      structureCode : selectedRow.structureCode,
    });
    hideLoading();
    if(res && res.url){
      toastOk("PDF 생성 완료!");
      window.open(res.url, "_blank");
    }
  } catch(err){
    hideLoading();
    toastErr("PDF 생성 실패: " + err.message);
  }
}

/* ── 타임스탬프 포맷 ── */
function formatTimestamp(ts){
  if(!ts) return "—";
  var s = String(ts);
  // "2024. 1. 5 오후 3:22:41" 형태 대응
  var d = new Date(s);
  if(isNaN(d.getTime())) return s.slice(0, 16);
  var mm = String(d.getMonth()+1).padStart(2,"0");
  var dd = String(d.getDate()).padStart(2,"0");
  var hh = String(d.getHours()).padStart(2,"0");
  var mi = String(d.getMinutes()).padStart(2,"0");
  return (d.getFullYear()) + "." + mm + "." + dd + " " + hh + ":" + mi;
}
</script>
</body>
</html>
