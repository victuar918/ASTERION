<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Works Desk</title>

<style>

body{
margin:0;
height:100vh;

background-image:url("images/bg_sub.jpg");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
align-items:center;

font-family:sans-serif;
color:white;
}

/* 타이틀 */

.title{
margin-top:20px;
margin-bottom:10px;
}

.title img{
width:240px;
}

/* Structure 리스트 */

.structure-list{

width:90%;
max-width:420px;

flex:1;

background:rgba(0,0,0,0.35);

border-radius:10px;

overflow-y:auto;

padding:10px;
}

.structure-item{

padding:12px;

border-bottom:1px solid rgba(255,255,255,0.2);

cursor:pointer;
}

.structure-item.selected{

background:rgba(255,255,255,0.15);

}

/* 버튼 영역 */

.button-area{

width:100%;

padding:15px;

display:flex;
flex-direction:column;
gap:10px;

}

/* 1행 */

.row1{

display:flex;
justify-content:space-around;

}

/* 2행 */

.row2{

display:flex;
justify-content:space-around;

}

/* 버튼 */

.button-area img{

width:70px;
cursor:pointer;

}

</style>

</head>


<body>

<div class="title">
<img src="images/ttl_worksdesk.png">
</div>


<!-- Structure 리스트 (JS가 채움) -->
<div id="structureList" class="structure-list">

<!-- 예시 -->
<!--
<div class="structure-item" data-code="ST24050101">
ST24050101
</div>
-->

</div>


<div class="button-area">

<div class="row1">

<a href="index.html">
<img src="images/btn_go_home.png">
</a>

<a href="selectstone.html">
<img src="images/btn_stoneselect.png">
</a>

<a href="design.html">
<img src="images/btn_go_design.png">
</a>

</div>


<div class="row2">

<a href="analysismemo.html">
<img src="images/btn_analysis.png">
</a>

<a href="productimage.html">
<img src="images/btn_productimage.png">
</a>

<a href="booklet.html">
<img src="images/btn_booklet.png">
</a>

<a href="forwarding.html">
<img src="images/btn_forwarding.png">
</a>

</div>

</div>


<!-- 시스템 JS 유지 -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>


<script>

/* Structure 목록 로드 */

async function loadStructures(){

if(!API || !API.getStructures) return

const list = document.getElementById("structureList")

const data = await API.getStructures()

list.innerHTML=""

data
.filter(s =>
s.Status==="Tasking" ||
s.Status==="A/S" ||
s.Status==="Forwarding"
)
.forEach(s=>{

const div=document.createElement("div")

div.className="structure-item"

div.textContent=s.StructureCode

div.onclick=()=>selectStructure(s.StructureCode,div)

list.appendChild(div)

})

}


/* Structure 선택 */

function selectStructure(code,element){

STATE.activeStructure=code

document.querySelectorAll(".structure-item")
.forEach(i=>i.classList.remove("selected"))

element.classList.add("selected")

}


/* 페이지 시작 */

document.addEventListener("DOMContentLoaded",loadStructures)

</script>

</body>
</html>
