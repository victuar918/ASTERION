<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ASTERION – Structure Design</title>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:url('images/bg_all.jpg') center/cover no-repeat fixed;font-family:'Arial',sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
.ttl{width:360px;max-width:92vw;display:block;margin:14px auto 4px;flex-shrink:0}
.code-disp{font-size:13px;letter-spacing:1.5px;text-align:center;color:rgba(220,188,128,.9);padding:3px 0 4px;flex-shrink:0}

/* 4구역: Selected List 40% / Details 30% / Total ~auto / Layout 20% */
.content{flex:1;width:100%;max-width:480px;display:flex;flex-direction:column;min-height:0;padding:0 8px 2px}
.zone-sel{flex:4;display:flex;flex-direction:column;min-height:0}
.zone-det{flex:3;display:flex;flex-direction:column;min-height:0}
.zone-tot{flex-shrink:0;padding:4px 2px}
.zone-lay{flex:2;display:flex;flex-direction:column;min-height:0}
.zone-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.35);padding:2px 4px;flex-shrink:0}
.scroll-pane{flex:1;overflow-y:auto;min-height:0;-webkit-overflow-scrolling:touch}
.scroll-pane::-webkit-scrollbar{width:3px}
.scroll-pane::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

/* Stone 행 */
.stone-row{display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.05)}
.stone-name{font-size:12px;color:rgba(255,255,255,.85);min-width:72px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.btn-size{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.22);border-radius:5px;color:#fff;font-size:11px;padding:4px 9px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s}
.btn-size:active,.btn-size.flash{background:rgba(180,140,90,.6)}

/* Details 가로 스크롤 */
.details-wrap{flex:1;overflow-x:auto;overflow-y:hidden;min-height:0;display:flex;align-items:center;flex-wrap:nowrap;gap:3px;padding:4px;-webkit-overflow-scrolling:touch}
.btn-plus{width:28px;height:28px;background:rgba(255,255,255,.07);border:1px dashed rgba(255,255,255,.28);border-radius:5px;color:rgba(255,255,255,.5);font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:background .12s}
.btn-plus.active-plus{background:rgba(170,130,75,.55);border:1px solid rgba(210,170,100,.9);color:#fff}
.btn-item{background:rgba(90,68,38,.5);border:1px solid rgba(190,150,90,.48);border-radius:7px;color:#fff;font-size:11px;padding:4px 8px;cursor:pointer;flex-shrink:0;line-height:1.4;text-align:center;-webkit-tap-highlight-color:transparent;transition:background .12s}
.btn-item:active{background:rgba(190,150,90,.45)}
.btn-item .sub{font-size:9px;color:rgba(255,255,255,.55);display:block}

/* Total */
.total-disp{font-size:14px;font-weight:bold;text-align:center;color:rgba(220,188,128,1);padding:3px}

/* Layout */
.layout-text{font-size:11px;color:rgba(255,255,255,.7);line-height:1.75;white-space:pre-wrap;word-break:break-all;padding:2px 4px}

/* 네비 */
.nav-bar{flex-shrink:0;width:100%;max-width:480px;display:flex;justify-content:space-around;align-items:center;padding:8px 8px env(safe-area-inset-bottom,10px);background:transparent;border-top:none}
.nav-bar img{height:88px;object-fit:contain;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
</style>
</head>
<body>
<img class="ttl" src="images/ttl_structuredesign.png" alt="Structure Design"/>
<div class="code-disp" id="code-disp">—</div>
<div class="content">
  <div class="zone-sel">
    <div class="zone-label">Select Stone &amp; Size</div>
    <div class="scroll-pane" id="sel-list"><div style="padding:10px;font-size:12px;color:rgba(255,255,255,.3)">Loading...</div></div>
  </div>
  <div class="zone-det">
    <div class="zone-label">Details</div>
    <div class="details-wrap" id="details-wrap"></div>
  </div>
  <div class="zone-tot"><div class="total-disp" id="total-disp">Total Size 0mm</div></div>
  <div class="zone-lay">
    <div class="zone-label">Layout for PDF</div>
    <div class="scroll-pane"><div class="layout-text" id="layout-text">—</div></div>
  </div>
</div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"   alt="Home"   id="b-home"/>
  <img src="images/btn_go_before.png" alt="Before" id="b-back"/>
  <img src="images/btn_save.png"      alt="Save"   id="b-save"/>
  <img src="images/btn_analysis.png"  alt="Next"   id="b-next"/>
</div>
<script src="js/design.js"></script>
</body>
</html>
