<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Inventory</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
}
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
  font-family:'Arial',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;overflow:hidden;
}

/* 타이틀 — worksdesk 기준 */
.ttl{
  width:360px;max-width:92vw;
  display:block;margin:14px auto 8px;flex-shrink:0;
}

/* 스크롤 창 — 100% 투명, 타이틀 ~ 버튼 사이 공간 전부 사용 */
#stone-list{
  flex:1;
  width:100%;max-width:480px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0;min-height:0;
  background:transparent;      /* 100% 투명 */
}
#stone-list::-webkit-scrollbar{width:3px}
#stone-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

/* 목록 행 */
.s-row{
  color:#2c3e6b;
  padding:13px 16px;
  font-size:15px;
  text-align:center;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.07);
  transition:background .15s;
  -webkit-tap-highlight-color:transparent;
  
}
/* 선택 시 투명도 60% */
.s-row.selected{background:rgba(255,255,255,.60);color:#1a2e5a;font-weight:600;}
.s-row:active{background:rgba(255,255,255,.15)}

.empty-row{
  padding:32px;text-align:center;
  font-size:13px;color:rgba(255,255,255,.3);
}

/* 네비 — worksdesk 기준: 투명 배경, 테두리 없음 */
.nav-bar{
  flex-shrink:0;
  width:100%;max-width:480px;
  display:flex;justify-content:space-around;align-items:center;
  padding:8px;
  background:transparent;
  border-top:none;
}
.nav-bar img{
  height:88px;
  object-fit:contain;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s;
}
.nav-bar img:active{opacity:.6}
</style>
</head>
<body>
<div class="app-wrap">

<img class="ttl" src="images/ttl_inventory.png" alt="Inventory"/>

<!-- 100% 투명 스크롤 창 — NameKr 목록 -->
<div id="stone-list">
  <div class="empty-row">Loading...</div>
</div>

<!-- 하단 버튼 4개 1열 -->
<div class="nav-bar">
  <img src="images/btn_go_home.png"      alt="Home"        id="b-home"/>
  <img src="images/btn_stonelisting.png" alt="New Listing" id="b-new"/>
  <img src="images/btn_information.png"  alt="Information" id="b-info"/>
  <img src="images/btn_management.png"   alt="Stock"       id="b-stock"/>
</div>

<script>
"use strict";
var selName = null;

document.addEventListener("DOMContentLoaded", async function(){

  /* Home: NameKr 초기화 후 index로 */
  document.getElementById("b-home").onclick = function(){
    clearAndGoFromInventory("index.html");
  };

  /* New Listing: 선택한 NameKr 값을 유지한 채로 이동
     (선택 없으면 NameKr 없이 이동 — newlisting은 NameKr 불필요) */
  document.getElementById("b-new").onclick = function(){
    if(selName) setCurrentNameKr(selName);
    window.location.href = "newlisting.html";
  };

  /* Information: 선택된 NameKr 유지하며 stoneinfo로 */
  document.getElementById("b-info").onclick = function(){
    if(!selName){ toastErr("원석을 먼저 선택하세요"); return; }
    setCurrentNameKr(selName);
    goPageWithName("stoneinfo.html", selName);
  };

  /* Stock: 선택된 NameKr 유지하며 invenmanage로 */
  document.getElementById("b-stock").onclick = function(){
    if(!selName){ toastErr("원석을 먼저 선택하세요"); return; }
    setCurrentNameKr(selName);
    goPageWithName("invenmanage.html", selName);
  };

  await loadStones();
});

async function loadStones(){
  var el = document.getElementById("stone-list");
  try {
    var stones = await apiGetAllStones();

    if(!stones || !stones.length){
      el.innerHTML = '<div class="empty-row">등록된 원석 없음</div>';
      return;
    }

    el.innerHTML = "";
    stones.forEach(function(s){
      var name = s.nameKr || s;
      var row  = document.createElement("div");
      row.className = "s-row";
      row.textContent = name;

      row.addEventListener("click", function(){
        if(selName === name){
          /* 재클릭 → 선택 해제 */
          selName = null;
          row.classList.remove("selected");
        } else {
          /* 다른 항목 선택 */
          document.querySelectorAll(".s-row.selected")
            .forEach(function(r){ r.classList.remove("selected"); });
          selName = name;
          row.classList.add("selected");
        }
      });

      el.appendChild(row);
    });

  } catch(err){
    el.innerHTML =
      '<div class="empty-row" style="color:rgba(220,80,80,.8)">' +
      '로드 실패: ' + esc(err.message) + '</div>';
  }
}
</script>
</div>
</body>
</html>
