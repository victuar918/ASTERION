<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Gemstone Select</title>

<script src="config.js"></script>
<script src="api_contract.js"></script>
<script src="state.js"></script>
<script src="api.js"></script>

<style>

body{
margin:0;
height:100vh;

background:url("images/bg_sub.jpg");
background-size:cover;
background-position:center;

display:flex;
flex-direction:column;
align-items:center;

font-family:sans-serif;
color:white;
}

/* Title */

#title-img{
width:260px;
margin-top:15px;
}

/* Container */

#stone-area{

flex:1;

width:90%;
max-width:420px;

display:flex;
flex-direction:column;

margin-top:10px;
}

/* Stone List */

#stone-list{

flex:1;

overflow-y:auto;

background:rgba(255,255,255,0.1);

border-radius:6px;

margin-bottom:8px;
}

/* Selected List */

#selected-list{

flex:1;

overflow-y:auto;

background:transparent;

border-radius:6px;

}

/* Item */

.stone-item{

padding:12px;

text-align:center;

border-bottom:1px solid rgba(255,255,255,0.2);

cursor:pointer;

}

/* Buttons */

#nav-bar{

width:100%;

display:flex;
justify-content:space-around;

padding:10px;

}

#nav-bar img{

width:70px;
cursor:pointer;

}

</style>
</head>


<body>

<img id="title-img" src="images/ttl_stoneselect.png">

<div id="stone-area">

<div id="stone-list"></div>

<div id="selected-list"></div>

</div>


<div id="nav-bar">

<img src="images/btn_go_home.png" onclick="goHome()">

<img src="images/btn_go_before.png" onclick="goPage('worksdesk.html')">

<img src="images/btn_design.png" onclick="goDesign()">

</div>



<script>

"use strict";

var structureCode=null
var allStones=[]
var selectedStones=[]

document.addEventListener("DOMContentLoaded",init)


async function init(){

structureCode=requireStructureCode()

if(!structureCode)return

await loadStones()

}


async function loadStones(){

allStones=await apiGetAllStones()

render()

}


function render(){

const list=document.getElementById("stone-list")
const selected=document.getElementById("selected-list")

list.innerHTML=""
selected.innerHTML=""

allStones.forEach(stone=>{

if(selectedStones.includes(stone.nameKr)){

const div=document.createElement("div")

div.className="stone-item"
div.textContent=stone.nameKr

div.onclick=()=>removeStone(stone.nameKr)

selected.appendChild(div)

}else{

const div=document.createElement("div")

div.className="stone-item"
div.textContent=stone.nameKr

div.onclick=()=>addStone(stone.nameKr)

list.appendChild(div)

}

})

}


function addStone(name){

selectedStones.push(name)

render()

}


function removeStone(name){

selectedStones=selectedStones.filter(n=>n!==name)

render()

}


function goHome(){

location.href="index.html"

}


async function goDesign(){

if(selectedStones.length===0){

alert("원석을 선택하세요")
return

}

try{

await apiSaveUsedStones(structureCode,selectedStones)

goPage("design.html")

}catch(err){

alert("저장 실패 "+err.message)

}

}

</script>

</body>
</html>
