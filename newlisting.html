<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Listing</title>

<!-- ▼ 공통 JS -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
  min-height: 100vh;
  color: #2b1e08;
  text-align: center;
}

.title-img {
  width: 90%;
  margin-top: 20px;
}

.form-area {
  margin-top: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding-bottom: 100px;
}

input, textarea {
  width: 80%;
  max-width: 500px;
  padding: 10px;
  font-size: 15px;
  border-radius: 6px;
  border: none;
  background: rgba(255,255,255,0.55);
  box-sizing: border-box;
  outline: none;
}

input:focus, textarea:focus {
  background: rgba(255,255,255,0.85);
}

textarea {
  height: 100px;
  resize: none;
}

.field-label {
  width: 80%;
  max-width: 500px;
  text-align: left;
  font-size: 12px;
  opacity: 0.65;
  margin-bottom: -4px;
}

.bottom-nav {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
}

.bottom-nav img {
  width: 60px;
  cursor: pointer;
  transition: transform 0.15s;
}

.bottom-nav img:hover { transform: scale(1.1); }
</style>
</head>

<body>

<img src="images/ttl_newlisting.png" class="title-img" alt="New Listing">

<div class="form-area">
  <div class="field-label">한글명 NameKr *필수</div>
  <input id="nameKr"  type="text" placeholder="예) 자수정">

  <div class="field-label">영문명 NameEng</div>
  <input id="nameEng" type="text" placeholder="예) Amethyst">

  <div class="field-label">설명 Exp</div>
  <textarea id="exp"  placeholder="원석에 대한 간단한 설명"></textarea>
</div>

<div class="bottom-nav">
  <img src="images/btn_go_home.png"   alt="홈"   onclick="goHome()">
  <img src="images/btn_go_before.png" alt="뒤로" onclick="goBefore()">
  <img src="images/btn_register.png"  alt="등록"  onclick="registerStone()">
</div>

<script>
// ── 원석 등록 ─────────────────────────────────────────────────
// Code.gs doPost case "addStone"
// payload: { action:"addStone", data:{ NameKr, NameEng, Exp } }
// 응답:    { success:true } | { success:false, error }
async function registerStone() {
  const nameKr  = document.getElementById("nameKr").value.trim();
  const nameEng = document.getElementById("nameEng").value.trim();
  const exp     = document.getElementById("exp").value.trim();

  if (!nameKr) {
    alert("한글명(NameKr)은 필수입니다.");
    document.getElementById("nameKr").focus();
    return;
  }

  try {
    showLoading("원석 등록 중...");
    // ② apiPost → CONFIG.API_BASE, Content-Type:text/plain 자동 처리
    const data = await apiPost({
      action: "addStone",
      data  : { NameKr: nameKr, NameEng: nameEng, Exp: exp },
    });

    if (data.success) {
      alert(nameKr + " 등록 완료 ✓\n이미지는 Stone Info 페이지에서 등록할 수 있습니다.");
      // 등록 성공 후 state에 저장 → 바로 stoneinfo로 이동 가능하도록
      setSelectedStone({ NameKr: nameKr, NameEng: nameEng, Exp: exp, Image: "" });
      clearForm();
    } else {
      alert("등록 실패: " + (data.error || "알 수 없는 오류"));
    }
  } catch (err) {
    alert("등록 오류: " + err.message);
  } finally {
    hideLoading();
  }
}

function clearForm() {
  document.getElementById("nameKr").value  = "";
  document.getElementById("nameEng").value = "";
  document.getElementById("exp").value     = "";
}

// goBefore 재정의 — inventory.html로 이동
function goBefore() { location.href = "inventory.html"; }
</script>

</body>
</html>
