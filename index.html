<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>ASTERION</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:url('bg_main.png') center/cover no-repeat fixed;
      font-family:'Arial',sans-serif;color:#fff;
      min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:20px 20px 40px;
    }
    #logo-img{
      width:220px;max-width:80vw;
      display:block;margin:0 auto 48px;
    }
    #menu-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;
      width:100%;max-width:360px;
    }
    .menu-btn{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.13);
      border-radius:14px;padding:20px 10px 18px;
      display:flex;flex-direction:column;align-items:center;gap:9px;
      cursor:pointer;text-decoration:none;color:#fff;
      transition:background .15s,border-color .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .menu-btn:active{background:rgba(170,130,75,0.25);border-color:rgba(210,170,100,0.5)}
    .menu-btn img{width:48px;height:48px;object-fit:contain}
    .menu-btn span{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.65)}
    /* Works Desk는 wide */
    .menu-btn.wide{grid-column:1/-1}
    .menu-btn.wide img{width:52px;height:52px}
    .menu-btn.wide span{font-size:12px}
  </style>
</head>
<body>
  <img id="logo-img" src="logo_asterion.png" alt="ASTERION"/>

  <div id="menu-grid">
    <!-- Works Desk (메인 진입점) -->
    <a class="menu-btn wide" href="worksdesk.html">
      <img src="icon_worksdesk.png" alt=""/>
      <span>Works Desk</span>
    </a>
    <!-- Inventory -->
    <a class="menu-btn" href="inventory.html">
      <img src="icon_inventory.png" alt=""/>
      <span>Inventory</span>
    </a>
    <!-- New Listing -->
    <a class="menu-btn" href="newlisting.html">
      <img src="icon_newlisting.png" alt=""/>
      <span>New Listing</span>
    </a>
  </div>
</body>
</html>
