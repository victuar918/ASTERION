<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Structure Design</title>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/layoutFormatter.js"></script>
<script src="js/design.js" defer></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#fff6da 0%,#f5d97a 40%,#eac45a 70%,#d8ad3c 100%);
  min-height: 100vh;
  color: #2b1e08;
  padding: 16px 12px 90px;
  text-align: center;
}

#titleContainer {
  margin-bottom: 8px;
}
#titleContainer img {
  max-width: 180px;
}

#structureCodeDisplay {
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 12px;
}

/* ── 원석 + Size 버튼 ── */
#stoneSelector, #sizeButtons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin-bottom: 12px;
}

.stone-select-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 2px solid #c9a830;
  background: rgba(255,255,255,0.35);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  color: #2b1e08;
}
.stone-select-btn.active-stone {
  background: #2b1e08;
  color: #f5d97a;
  border-color: #2b1e08;
  font-weight: 600;
}

.size-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: none;
  background: #f5c542;
  font-weight: bold;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.size-btn:hover { opacity: 0.72; }

/* ── Details ── */
#detailsContainer {
  min-height: 180px;
  padding: 8px;
  background: rgba(255,255,255,0.0); /* 완전 투명 */
  border-radius: 8px;
  line-height: 2.2;
}

.plus-btn {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  border: 2px dashed #bbb;
  background: transparent;
  color: #888;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.12s;
  margin: 0 2px;
}
.plus-btn.active-plus {
  border-color: #d8ad3c;
  background: rgba(248,197,66,0.25);
  color: #2b1e08;
}

.detail-btn {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 5px;
  border: none;
  background: rgba(255,255,255,0.6); /* 60% 투명 */
  font-size: 13px;
  cursor: pointer;
  margin: 0 2px;
  transition: opacity 0.15s;
}
.detail-btn:hover { opacity: 0.6; }

/* ── Total / Layout ── */
#totalSize {
  margin-top: 10px;
  font-weight: bold;
  font-size: 15px;
}

#layoutSummaryContainer {
  margin-top: 10px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.0); /* 완전 투명 */
  border-radius: 6px;
  font-size: 13px;
  word-break: break-all;
  min-height: 32px;
}
#layoutSummaryContainer strong { display: block; margin-bottom: 4px; }

/* ── 하단 버튼 ── */
.bottom {
  position: fixed;
  bottom: 16px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 14px;
}
.bottom img {
  width: 50px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.bottom img:hover { opacity: 0.75; }
</style>
</head>
<body>

<div id="titleContainer">
  <img src="images/ttl_structuredesign.png" alt="Structure Design">
</div>

<div id="structureCodeDisplay"></div>

<div id="stoneSelector"></div>
<div id="sizeButtons"></div>
<div id="detailsContainer"></div>
<div id="totalSize">Total Size 0mm</div>

<div id="layoutSummaryContainer">
  <strong>Layout:</strong>
  <span id="layoutSummary"></span>
</div>

<div class="bottom">
  <img src="images/btn_go_home.png"   alt="홈"    onclick="goHome()">
  <img src="images/btn_go_before.png" alt="뒤로"  onclick="goBeforeDesign()">
  <img src="images/btn_analysis.png"  alt="Next"  onclick="goNextDesign()">
  <img src="images/btn_save.png"      alt="Save"  onclick="saveDesign()">
</div>

</body>
</html>
