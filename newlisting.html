<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Listing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1e08;
      background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
      min-height: 100vh;
    }

    .container {
      padding: 20px 40px 160px 40px; /* 하단 버튼 공간 확보 */
    }

    /* 타이틀 이미지 */
    .title-img {
      width: 95%;
      display: block;
      margin: 20px auto 30px auto;
    }

    /* 입력 그룹 */
    .input-group {
      display: flex;
      flex-direction: column;
      max-width: 400px;
      margin: 0 auto 20px auto;
      font-size: 13px;
    }

    .input-group input,
    .input-group textarea {
      font-size: 13px;
      padding: 8px;
      margin-bottom: 10px;
      border: 2px solid #d8ad3c;
      border-radius: 4px;
      background-color: rgba(255, 255, 255, 0.6);
      width: 100%;
      box-sizing: border-box;
    }

    /* Exp 입력창 */
    #expInput {
      min-height: 300px;
      resize: vertical;
      overflow-y: auto;
    }

    /* 하단 네비게이션 */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      gap: 30px; /* 버튼 간격 확대 */
      z-index: 1000;
    }

    .bottom-nav img {
      width: 90px; /* 버튼 크기 키움 */
      cursor: pointer;
      transition: transform 0.2s;
      object-fit: contain;
    }

    .bottom-nav img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <!-- 타이틀 -->
  <img src="images/ttl_gemstonelist.png" alt="New Listing" class="title-img">

  <div class="container">

    <!-- Name 입력 -->
    <div class="input-group">
      <input type="text" id="nameEng" placeholder="Name">
      <input type="text" id="nameKr" placeholder="원석명">
    </div>

    <!-- Exp 입력창 -->
    <div class="input-group">
      <textarea id="expInput" placeholder="원석에 대한 해설"></textarea>
    </div>

  </div>

  <!-- 하단 버튼 (이미지 업로드 버튼 제거) -->
  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()">
    <img src="images/btn_go_before.png" onclick="goBack()">
    <img src="images/btn_stonelisting.png" onclick="submitListing()">
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxHIwm4XKlANkJLpbkaHN6kPG2z0C6ad3FbagTR_qyAdTUU9M40-R4-sr1E_vXoh_wYNQ/exec";

    function goHome() {
      window.location.href = "index.html";
    }

    function goBack() {
      window.location.href = "inventory.html";
    }

    async function submitListing() {
      const nameEng = document.getElementById("nameEng").value.trim();
      const nameKr = document.getElementById("nameKr").value.trim();
      const expText = document.getElementById("expInput").value.trim();

      if (!nameEng || !nameKr) return alert("NameEng와 NameKr를 입력해주세요.");

      const stones = [{
        nameEng: nameEng,
        nameKr: nameKr,
        exp: expText
      }];

      try {
        const res = await fetch(WEBAPP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "addStones", data: stones })
        });
        const result = await res.json();

        if (result.success) {
          alert(`성공적으로 등록되었습니다.: ${result.inserted}개`);
          // 등록 후 nameKr는 남겨두고, 나머지는 초기화
          document.getElementById("nameEng").value = "";
          document.getElementById("expInput").value = "";
        } else if (result.partialSuccess) {
          alert(`부분 등록: ${result.inserted}개\n오류: ${result.errors.map(e => e.error).join(", ")}`);
        } else {
          alert(`오류 발생: ${result.errors?.map(e => e.error).join(", ") || result.error || "알 수 없는 오류"}`);
        }
      } catch (err) {
        console.error(err);
        alert("서버 호출 중 오류가 발생했습니다.");
      }
    }
  </script>

</body>

</html>
