<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Stone</title>

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:#2b1e08;
  background:linear-gradient(
    135deg,
    #fff6da 0%,
    #f5d97a 40%,
    #eac45a 70%,
    #d8ad3c 100%
  );
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 타이틀 */
.title-img{
  display:block;
  width:95%;
  max-width:1400px;
  margin-top:10px;
}

/* StructureCode */
.structure-code{
  margin-top:3vh;
  font-size:22px;
  font-weight:600;
  background:transparent;
}

/* 리스트 영역 */
.list-container{
  margin-top:3vh;
  width:80%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

/* 리스트 박스 */
.list-box{
  height:200px;
  background:rgba(255,255,255,0.6);
  border-radius:6px;
  overflow-y:auto;
  padding:10px;
}

/* 리스트 아이템 */
.stone{
  padding:6px 8px;
  cursor:pointer;
  font-size:14px;
  border-radius:4px;
  transition:background 0.15s;
}

.stone:hover{
  background:rgba(255,255,255,0.5);
}

/* 빈 목록 안내 */
.empty-msg{
  font-size:13px;
  opacity:0.5;
  padding:6px 8px;
}

/* 버튼 */
.bottom-nav{
  position:absolute;
  bottom:3%;
  display:flex;
  gap:30px;
}

.bottom-nav img{
  width:90px;
  cursor:pointer;
  transition:0.2s;
}

.bottom-nav img:hover{
  transform:scale(1.08);
}

</style>
</head>

<body>

<img src="images/ttl_stoneselect.png" class="title-img" alt="Select Stone">

<div id="structureCode" class="structure-code"></div>

<div class="list-container">
  <div id="availableList" class="list-box"></div>
  <div id="selectedList"  class="list-box"></div>
</div>

<div class="bottom-nav">
  <img src="images/btn_go_home.png"    alt="홈"    onclick="goHome()">
  <img src="images/btn_go_before.png"  alt="뒤로"  onclick="goBefore()">
  <img src="images/btn_go_design.png"  alt="디자인" onclick="saveAndGoDesign()">
</div>

<script>

// ── 상수 ─────────────────────────────────────────────────────
// [FIX-E1] YOUR_DEPLOY_ID → 다른 HTML과 동일한 WEBAPP_URL 사용
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzhIqVX9OpMxq0mdO2sBgvho9789qE-bW7EZletFaIjtHj4qLwxDaJIzKkIG1dhXCm81Q/exec";

// ── structureCode 수신 ────────────────────────────────────────
// [FIX-E4] URL param → sessionStorage 순으로 폴백
// SelectTasking.html이 두 방식 모두 전달하므로 항상 수신 가능
const params        = new URLSearchParams(window.location.search);
const structureCode = params.get("code")
                   || sessionStorage.getItem("selectedStructureCode")
                   || "";

// ── 상태 ─────────────────────────────────────────────────────
// masterList: 원본 순서 보존용 (re-render 시 정렬 기준)
// [FIX-E12] available 배열 끝에 push → masterList 기준 재정렬로 대체
let masterList = []; // 서버에서 받은 원본 순서 배열
let selected   = []; // 선택된 NameKr 목록 (Set으로 관리)
let selectedSet= new Set();

// ── 초기 진입 검증 + 로드 ────────────────────────────────────
// [FIX-E11] window.onload 안에서 실행 — 다른 HTML과 일관성 유지
window.onload = function () {

  // [FIX-E4] structureCode 없으면 진입 차단
  if (!structureCode) {
    alert("Structure 정보가 없습니다. 목록으로 돌아가세요.");
    window.location.href = "selecttasking.html";
    return;
  }

  document.getElementById("structureCode").textContent = structureCode;

  loadStones();
};

// ── StoneMaster 로드 ──────────────────────────────────────────
// [FIX-E1] 올바른 WEBAPP_URL 사용
// [FIX-E2] json.data → json.stones (Code.gs getAllStones 반환 구조 일치)
// [FIX-E5] try/catch 추가
// [FIX-E8] res.ok HTTP 레벨 오류 체크
async function loadStones() {
  try {
    const res = await fetch(WEBAPP_URL + "?action=getStones");

    // [FIX-E8] HTTP 레벨 오류 체크
    if (!res.ok) throw new Error("서버 응답 오류: HTTP " + res.status);

    const json = await res.json();

    // [FIX-E2] Code.gs getAllStones: { success:true, stones:[{NameKr,...}] }
    if (!json.success || !Array.isArray(json.stones)) {
      throw new Error(json.error || "원석 목록 데이터 없음");
    }

    if (json.stones.length === 0) {
      const availBox = document.getElementById("availableList");
      const msg = document.createElement("div");
      msg.className   = "empty-msg";
      msg.textContent = "등록된 원석이 없습니다.";
      availBox.appendChild(msg);
      return;
    }

    // [FIX-E12] 원본 순서 masterList에 저장
    masterList = json.stones.map(function (s) { return s.NameKr; });

    render();

  } catch (err) {
    // [FIX-E5] 에러 안내
    const availBox = document.getElementById("availableList");
    const msg = document.createElement("div");
    msg.className   = "empty-msg";
    msg.textContent = "목록 로드 실패: " + err.message;
    availBox.appendChild(msg);
  }
}

// ── 렌더 ─────────────────────────────────────────────────────
// [FIX-E12] masterList 기준으로 available/selected 분류
//            → 선택 해제 시 원본 순서 복원
function render() {
  const availBox = document.getElementById("availableList");
  const selBox   = document.getElementById("selectedList");

  availBox.innerHTML = "";
  selBox.innerHTML   = "";

  // available = masterList에서 선택되지 않은 항목 (원본 순서 유지)
  const availableList = masterList.filter(function (name) {
    return !selectedSet.has(name);
  });

  if (availableList.length === 0) {
    const msg = document.createElement("div");
    msg.className   = "empty-msg";
    msg.textContent = "모든 원석이 선택되었습니다.";
    availBox.appendChild(msg);
  }

  availableList.forEach(function (name) {
    const div = document.createElement("div");
    div.className   = "stone";
    div.textContent = name;
    div.onclick = function () {
      selectedSet.add(name);
      render();
    };
    availBox.appendChild(div);
  });

  if (selectedSet.size === 0) {
    const msg = document.createElement("div");
    msg.className   = "empty-msg";
    msg.textContent = "선택된 원석이 없습니다.";
    selBox.appendChild(msg);
  }

  // selectedList = masterList 순서 기준으로 selected 항목만 표시
  masterList.filter(function (name) {
    return selectedSet.has(name);
  }).forEach(function (name) {
    const div = document.createElement("div");
    div.className   = "stone";
    div.textContent = name;
    div.onclick = function () {
      selectedSet.delete(name);
      render();
    };
    selBox.appendChild(div);
  });
}

// ── 저장 후 design.html 이동 ─────────────────────────────────
// [FIX-E1]  올바른 WEBAPP_URL 사용
// [FIX-E3]  action: "saveUsedStones" → Code.gs doPost 케이스 일치
// [FIX-E6]  try/catch 추가
// [FIX-E7]  서버 응답 success 확인 후 이동
// [FIX-E9]  Content-Type: application/json 헤더 추가
// [FIX-E13] sessionStorage 병행 저장
async function saveAndGoDesign() {

  if (selectedSet.size === 0) {
    alert("원석을 선택하세요.");
    return;
  }

  // selectedSet → masterList 순서 기준 배열 변환
  const stonesArray = masterList.filter(function (name) {
    return selectedSet.has(name);
  });

  try {
    // [FIX-E9] Content-Type 헤더 추가
    const res = await fetch(WEBAPP_URL, {
      method : "POST",
      headers: { "Content-Type": "application/json" },
      body   : JSON.stringify({
        action        : "saveUsedStones",   // [FIX-E3] Code.gs 케이스 일치
        structureCode : structureCode,
        stones        : stonesArray,
      }),
    });

    // [FIX-E8] HTTP 레벨 오류 체크
    if (!res.ok) throw new Error("서버 응답 오류: HTTP " + res.status);

    const data = await res.json();

    // [FIX-E7] 서버 응답 확인 후 이동
    if (!data.success) {
      alert("저장 실패: " + (data.error || "알 수 없는 오류"));
      return;
    }

    // [FIX-E13] sessionStorage 병행 저장 — design.html 및 이후 페이지 호환
    sessionStorage.setItem("selectedStructureCode", structureCode);
    sessionStorage.setItem("selectedStones", JSON.stringify(stonesArray));

    window.location.href = "design.html?code=" + encodeURIComponent(structureCode);

  } catch (err) {
    // [FIX-E6] 네트워크/JSON 오류 표시
    alert("저장 오류: " + err.message);
  }
}

// ── 페이지 이동 ───────────────────────────────────────────────
function goHome() {
  window.location.href = "index.html";
}

// [FIX-E10] structureCode null 방어 — 없으면 selecttasking으로 이동
function goBefore() {
  if (!structureCode) {
    window.location.href = "selecttasking.html";
    return;
  }
  // sessionStorage 병행 저장 후 이동 (worksdesk.html이 양쪽 지원)
  sessionStorage.setItem("selectedStructureCode", structureCode);
  window.location.href = "worksdesk.html?code=" + encodeURIComponent(structureCode);
}

</script>

</body>
</html>
