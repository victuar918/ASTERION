<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Product Image</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
body{
  background:url('images/bg_all.jpg') center/cover no-repeat fixed;
}

/* 타이틀~버튼 사이 공간: 이미지 선택 버튼을 중앙에 배치 */
.content{
  flex:1;
  width:100%;
  max-width:480px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;   /* 수직 중앙 */
  padding:10px 16px;
  min-height:0;
}

/* 이미지 선택 박스
   btn_proimageselec.png 위에 선택 이미지가 오버레이 */
.img-wrap{
  position:relative;
  width:200px;
  height:200px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.img-wrap input[type=file]{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
  width:100%;
  height:100%;
  z-index:3;
}
.img-bg{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  position:relative;
  z-index:1;
}
.img-ov{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:8px;
  z-index:2;
  display:none;
}
.img-ov.show{display:block}

/* StructureCode 표시 — 짙은 네이비 */
.code-under{
  font-size:13px;
  color:#1a2e5a;
  font-weight:600;
  letter-spacing:1.5px;
  text-align:center;
  margin-top:12px;
}
</style>
</head>
<body>
<div class="app-wrap">

  <img class="ttl" src="images/ttl_productimage.png" alt="Product Image"/>

  <div class="content">
    <div class="img-wrap" id="img-wrap">
      <input type="file" id="file-input"
             accept="image/jpeg,image/jpg,image/png,image/webp,image/gif"/>
      <img class="img-bg" src="images/btn_proimageselec.png" alt="Select Image"/>
      <img class="img-ov" id="img-ov" src="" alt=""/>
    </div>
    <div class="code-under" id="code-under">—</div>
  </div>

  <div class="nav-bar">
    <img src="images/btn_go_home.png"   alt="Home"   id="b-home"/>
    <img src="images/btn_go_before.png" alt="Before" id="b-back"/>
    <img src="images/btn_update.png"    alt="Update" id="b-update"/>
    <img src="images/btn_booklet.png"   alt="Next"   id="b-next"/>
  </div>

</div>
<script>
"use strict";

/* Drive URL을 thumbnail URL로 변환 (CORS 문제 해결) */
function convertDriveUrl(url) {
  if(!url) return "";
  // 이미 thumbnail 형식이면 그대로
  if(url.indexOf("thumbnail") !== -1) return url;
  // uc?export=view&id=XXX → thumbnail?id=XXX&sz=w600
  var m = url.match(/[?&]id=([a-zA-Z0-9_\-]+)/);
  if(m) return "https://drive.google.com/thumbnail?id=" + m[1] + "&sz=w600";
  // /d/XXX/view 형식
  m = url.match(/\/d\/([a-zA-Z0-9_\-]+)/);
  if(m) return "https://drive.google.com/thumbnail?id=" + m[1] + "&sz=w600";
  return url;
}

var sc = null, selFile = null;

document.addEventListener("DOMContentLoaded", async function(){
  sc = requireStructureCode(); if(!sc) return;
  document.getElementById("code-under").textContent = sc;

  document.getElementById("b-home").onclick   = function(){ clearAndGo("index.html"); };
  document.getElementById("b-back").onclick   = function(){ goPage("analysismemo.html", sc); };
  document.getElementById("b-update").onclick = onUpdate;
  document.getElementById("b-next").onclick   = function(){ goPage("booklet.html", sc); };
  document.getElementById("file-input").addEventListener("change", onFileChange);

  /* 기존 저장된 이미지 로드 */
  try{
    var item = await apiGetArchiveItem(sc);
    if(item && (item.productImage || item.ProductImage)){
      var ov = document.getElementById("img-ov");
      ov.src = convertDriveUrl(item.productImage || item.ProductImage);
      ov.classList.add("show");
    }
  } catch(e){}
});

function onFileChange(e){
  var f = e.target.files && e.target.files[0]; if(!f) return;
  if(f.size > 4*1024*1024){ toastErr("4MB 이하 이미지를 선택하세요"); e.target.value = ""; return; }
  selFile = f;
  var r = new FileReader();
  r.onload = function(ev){
    var ov = document.getElementById("img-ov");
    ov.src = ev.target.result;
    ov.classList.add("show");
  };
  r.readAsDataURL(f);
}

async function onUpdate(){
  if(!selFile){ toastErr("이미지를 먼저 선택하세요"); return; }
  showLoading("UPLOADING...");
  try{
    await apiUploadProductImage(sc, selFile);
    hideLoading();
    toastOk("업로드 완료!");
    selFile = null;
  } catch(err){
    hideLoading();
    toastErr("업로드 실패: " + err.message);
  }
}
</script>
</body>
</html>
