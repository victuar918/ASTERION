<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #2b1e08;
      background: linear-gradient(135deg, #fff6da 0%, #f5d97a 40%, #eac45a 70%, #d8ad3c 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .title-img {
      width: 95%;
      display: block;
      margin: 20px auto 10px auto;
    }

    .stone-list-container {
      flex: 1;
      overflow-y: auto;
      margin: 0 20px 120px 20px; /* 하단 버튼 공간 확보 */
    }

    .stone-item {
      padding: 12px 16px;
      margin-bottom: 10px;
      border-radius: 6px;
      background-color: transparent; /* 완전 투명 */
      font-size: 12px; /* 30% 축소 */
      cursor: pointer;
      border: 1px solid rgba(216, 173, 60, 0.5);
      transition: background 0.2s;
    }

    .stone-item:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 1000; /* 리스트보다 위 */
    }

    .bottom-nav img {
      width: 50px; /* 네 개 버튼이 균형있게 들어가도록 조정 */
      cursor: pointer;
      transition: transform 0.2s;
      object-fit: contain;
    }

    .bottom-nav img:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <!-- 타이틀 -->
  <img src="images/ttl_inventory.png" alt="Inventory" class="title-img">

  <!-- 원석 리스트 영역 -->
  <div class="stone-list-container" id="stoneListContainer">
    <!-- JS에서 원석 아이템 추가 -->
  </div>

  <!-- 하단 버튼 -->
  <div class="bottom-nav">
    <img src="images/btn_go_home.png" onclick="goHome()">
    <img src="images/btn_management.png" onclick="goManagement()">
    <img src="images/btn_information.png" onclick="goInformation()">
    <img src="images/btn_stonelisting.png" onclick="goNewListing()">
  </div>

  <script>
    const stones = [
      { nameKr: "아파타이트", nameEng: "Apatite", exp: "샘플 설명" },
      { nameKr: "루비", nameEng: "Ruby", exp: "샘플 설명" },
      { nameKr: "사파이어", nameEng: "Sapphire", exp: "샘플 설명" }
      // 실제 원석 데이터는 GAS에서 불러오면 됩니다.
    ];

    const stoneListContainer = document.getElementById("stoneListContainer");

    function renderStoneList() {
      stoneListContainer.innerHTML = "";
      stones.forEach(stone => {
        const div = document.createElement("div");
        div.className = "stone-item";
        div.textContent = `${stone.nameKr} (${stone.nameEng})`;
        div.onclick = () => {
          // 선택한 원석 NameKr을 가지고 화면 이동
          sessionStorage.setItem("selectedNameKr", stone.nameKr);
          goInformation();
        };
        stoneListContainer.appendChild(div);
      });
    }

    renderStoneList();

    function goHome() {
      window.location.href = "index.html";
    }

    function goManagement() {
      // 선택된 원석 없으면 alert
      const selected = sessionStorage.getItem("selectedNameKr");
      if (!selected) return alert("원석을 선택해주세요.");
      window.location.href = "invenmanage.html";
    }

    function goInformation() {
      const selected = sessionStorage.getItem("selectedNameKr");
      if (!selected) return alert("원석을 선택해주세요.");
      window.location.href = "stoneinfo.html";
    }

    function goNewListing() {
      window.location.href = "newlisting.html";
    }
  </script>

</body>

</html>
