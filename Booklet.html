<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Booklet</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
}
body{background:url('images/bg_all.jpg') center/cover no-repeat fixeddisplay:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
.ttl{width:360px;max-width:92vw;display:block;margin:14px auto 4px;flex-shrink:0}
.code-disp{font-size:13px;letter-spacing:1.5px;text-align:center;color:rgba(220,188,128,.9);padding:3px 0 5px;flex-shrink:0}

/* 콘텐츠: 좌(페이지 버튼 7개) + 우(미리보기) */
.content{flex:1;width:100%;max-width:560px;display:flex;min-height:0;padding:0 8px;gap:8px}

/* 좌: 페이지 버튼 세로 7개 */
.page-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0;padding:4px 0;justify-content:center}
.pg-btn{width:38px;height:38px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);border-radius:7px;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-tap-highlight-color:transparent}
.pg-btn.active{background:rgba(170,130,75,.5);border-color:rgba(210,170,100,.9);color:#fff}

/* 우: 미리보기 */
.preview-wrap{flex:1;min-height:0;overflow-y:auto;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(0,0,0,.3)}
.preview-wrap::-webkit-scrollbar{width:3px}
.preview-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
.preview-page{display:none;padding:14px;min-height:140px}
.preview-page.active{display:block}
.pg-title{font-size:10px;letter-spacing:1.5px;color:rgba(220,188,128,.6);margin-bottom:8px}
.pg-content{font-size:12px;line-height:1.8;color:rgba(255,255,255,.8);white-space:pre-wrap}
.stone-block{margin-bottom:10px}
.stone-block .s-name{font-size:13px;font-weight:bold;color:rgba(220,188,128,.9)}
.stone-block .s-eng{font-size:11px;color:rgba(255,255,255,.55)}
.stone-block .s-exp{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}
.pg-img{max-width:100%;border-radius:8px;margin-top:8px;display:none}
.pg-img.show{display:block}

.nav-bar{flex-shrink:0;width:100%;max-width:560px;display:flex;justify-content:space-around;align-items:center;padding:8px;background:transparent;border-top:none}
.nav-bar img{height:88px;object-fit:contain;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.nav-bar img:active{opacity:.6}
</style>
</head>
<body>
<div class="app-wrap">
<img class="ttl" src="images/ttl_booklet.png" alt="Booklet"/>
<div class="code-disp" id="code-disp">—</div>
<div class="content">
  <div class="page-btns" id="page-btns">
    <button class="pg-btn active" data-pg="1">1</button>
    <button class="pg-btn" data-pg="2">2</button>
    <button class="pg-btn" data-pg="3">3</button>
    <button class="pg-btn" data-pg="4">4</button>
    <button class="pg-btn" data-pg="5">5</button>
    <button class="pg-btn" data-pg="6">6</button>
    <button class="pg-btn" data-pg="7">7</button>
  </div>
  <div class="preview-wrap" id="preview-wrap">
    <div id="pg1" class="preview-page active"><div class="pg-title">PAGE 1 — Cover</div><div class="pg-content" id="pg1-c">Loading...</div></div>
    <div id="pg2" class="preview-page"><div class="pg-title">PAGE 2 — Stone Info</div><div id="pg2-c"></div></div>
    <div id="pg3" class="preview-page"><div class="pg-title">PAGE 3 — Product Image</div><img class="pg-img" id="pg3-img" src="" alt=""/><div class="pg-content" id="pg3-c"></div></div>
    <div id="pg4" class="preview-page"><div class="pg-title">PAGE 4 — Layout Summary</div><div class="pg-content" id="pg4-c"></div></div>
    <div id="pg5" class="preview-page"><div class="pg-title">PAGE 5 — Analysis</div><div class="pg-content" id="pg5-c"></div></div>
    <div id="pg6" class="preview-page"><div class="pg-title">PAGE 6 — Memo</div><div class="pg-content" id="pg6-c"></div></div>
    <div id="pg7" class="preview-page"><div class="pg-title">PAGE 7 — Sign / Name</div><div class="pg-content" id="pg7-c"></div></div>
  </div>
</div>
<div class="nav-bar">
  <img src="images/btn_go_home.png"   alt="Home"   id="b-home"/>
  <img src="images/btn_go_before.png" alt="Before" id="b-back"/>
  <img src="images/btn_createpdf.png" alt="PDF"    id="b-pdf"/>
</div>
<script src="js/booklet.js"></script>
</div>
</body>
</html>
