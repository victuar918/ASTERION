<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>ASTERION – Check Stock</title>
<link rel="stylesheet" href="css/common.css"/>
<script src="js/config.js"></script>
<script src="js/api_contract.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<style>
body{ background:url('images/bg_all.jpg') center/cover no-repeat fixed; }

.search-bar{
  width:100%;max-width:480px;
  display:flex;align-items:center;gap:10px;
  padding:0 16px;flex-shrink:0;margin-bottom:10px;
}
.search-label{ font-size:12px;color:rgba(26,46,90,.7);white-space:nowrap;letter-spacing:.5px; }
.search-input{
  width:72px;padding:8px 10px;text-align:center;
  background:rgba(255,255,255,.55);border:1px solid rgba(26,46,90,.2);
  border-radius:8px;color:#1a2e5a;font-size:15px;font-weight:600;outline:none;
  -moz-appearance:textfield;
}
.search-input::-webkit-outer-spin-button,
.search-input::-webkit-inner-spin-button{ -webkit-appearance:none;margin:0; }
.search-input:focus{ border-color:rgba(26,46,90,.5); }
.search-btn{
  padding:8px 18px;background:rgba(26,46,90,.75);border:none;
  border-radius:8px;color:#fff;font-size:12px;letter-spacing:1.5px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity .15s;flex-shrink:0;
}
.search-btn:active{ opacity:.7; }
.search-unit{ font-size:12px;color:rgba(26,46,90,.6);white-space:nowrap; }
.search-count{ margin-left:auto;font-size:11px;color:rgba(26,46,90,.5);white-space:nowrap; }

.list-wrap{
  flex:1;width:100%;max-width:480px;
  overflow-y:auto;padding:0 16px;min-height:0;
  -webkit-overflow-scrolling:touch;
}
.list-wrap::-webkit-scrollbar{ width:3px; }
.list-wrap::-webkit-scrollbar-thumb{ background:rgba(26,46,90,.2);border-radius:2px; }

.list-header{
  display:grid;grid-template-columns:1fr 72px 60px;
  padding:8px 14px;margin-bottom:2px;
  border-bottom:1px solid rgba(26,46,90,.15);
}
.list-header span{ font-size:10px;letter-spacing:1.5px;color:rgba(26,46,90,.45);font-weight:600; }
.list-header span:not(:first-child){ text-align:center; }

.stock-item{
  display:grid;grid-template-columns:1fr 72px 60px;
  padding:13px 14px;border-radius:10px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:background .12s;
  margin-bottom:2px;background:transparent;border:1px solid transparent;
}
.stock-item:active{ background:rgba(26,46,90,.08); }
.stock-item.selected{ background:rgba(26,46,90,.10);border-color:rgba(26,46,90,.2); }

.item-name{
  font-size:14px;color:#1a2e5a;font-weight:500;
  letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.item-size{ font-size:13px;color:rgba(26,46,90,.6);text-align:center; }
.item-stock{ font-size:14px;font-weight:700;text-align:center; }
.item-stock.lvl-danger{ color:#c0392b; }
.item-stock.lvl-warn  { color:#e67e22; }
.item-stock.lvl-low   { color:#f39c12; }
.item-stock.lvl-ok    { color:#27ae60; }

.empty-msg{
  text-align:center;padding:48px 0;
  color:rgba(26,46,90,.4);font-size:13px;letter-spacing:.5px;
}
</style>
</head>
<body>
<div class="app-wrap">
  <img class="ttl" src="images/ttl_stock.png" alt="Check Stock"/>

  <div class="search-bar">
    <span class="search-label">기준</span>
    <input class="search-input" id="threshold-input" type="number" min="1" max="9999" value="10"/>
    <span class="search-unit">개 미만</span>
    <button class="search-btn" id="btn-search">SEARCH</button>
    <span class="search-count" id="result-count"></span>
  </div>

  <div style="width:100%;max-width:480px;padding:0 16px;flex-shrink:0;">
    <div class="list-header">
      <span>원석명</span><span>사이즈</span><span>재고</span>
    </div>
  </div>

  <div class="list-wrap" id="stock-list">
    <div class="empty-msg">SEARCH를 눌러 조회하세요</div>
  </div>

  <div class="nav-bar">
    <img src="images/btn_go_home.png"    alt="Home"       id="b-home"/>
    <img src="images/btn_management.png" alt="Management" id="b-manage"/>
  </div>
</div>

<script>
"use strict";
var selectedItem = null;

document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("b-home").onclick    = function(){ location.href="index.html"; };
  document.getElementById("b-manage").onclick  = onManage;
  document.getElementById("btn-search").onclick = onSearch;
  document.getElementById("threshold-input").addEventListener("keydown", function(e){
    if(e.key==="Enter") onSearch();
  });
});

async function onSearch(){
  var threshold = parseInt(document.getElementById("threshold-input").value, 10);
  if(isNaN(threshold)||threshold<1){ toastErr("기준 수량을 올바르게 입력하세요."); return; }
  showLoading("LOADING...");
  selectedItem = null;
  try{
    // Inventory 시트에 ID 등록된 항목만 반환
    var res = await apiPost({ action: A.GET_STOCK_LIST, threshold: threshold });
    hideLoading();
    if(!res||!res.success){ toastErr(res&&res.error?res.error:"조회 실패"); return; }
    renderList(res.items||[], threshold);
  }catch(err){ hideLoading(); toastErr("오류: "+err.message); }
}

function renderList(items, threshold){
  var list  = document.getElementById("stock-list");
  var count = document.getElementById("result-count");
  count.textContent = items.length+"개";
  if(!items.length){
    list.innerHTML='<div class="empty-msg">'+threshold+'개 미만 항목이 없습니다</div>';
    return;
  }
  list.innerHTML = items.map(function(r,i){
    var lvl = r.stock<=4?"lvl-danger":r.stock<=9?"lvl-warn":r.stock<=19?"lvl-low":"lvl-ok";
    return '<div class="stock-item" data-idx="'+i+'">'
      +'<span class="item-name">'+esc(r.nameKr)+'</span>'
      +'<span class="item-size">'+esc(r.size)+'</span>'
      +'<span class="item-stock '+lvl+'">'+r.stock+'</span>'
      +'</div>';
  }).join("");
  list.querySelectorAll(".stock-item").forEach(function(el,i){
    el.addEventListener("click", function(){
      list.querySelectorAll(".stock-item").forEach(function(e){ e.classList.remove("selected"); });
      el.classList.add("selected");
      selectedItem = items[i];
    });
  });
}

function onManage(){
  if(!selectedItem){ toastErr("원석을 먼저 선택하세요."); return; }
  goPageWithName("invenmanage.html", selectedItem.nameKr);
}

function esc(s){
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
</script>
</body>
</html>
